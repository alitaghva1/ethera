name: Build & Release Ethera

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: "electron/dist/Ethera Setup *.exe"
            glob: "electron/dist/*.exe"
          - os: macos-latest
            platform: mac
            artifact: "electron/dist/Ethera-*.dmg"
            glob: "electron/dist/*.dmg"
          - os: ubuntu-latest
            platform: linux
            artifact: "electron/dist/Ethera-*.AppImage"
            glob: "electron/dist/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: electron
        run: npm ci || npm install --include=dev

      - name: Build for ${{ matrix.platform }}
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ''
        run: npx electron-builder --${{ matrix.platform }}

      - name: List build output
        shell: bash
        run: ls -la electron/dist/ || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ethera ${{ github.ref_name }}
          files: |
            electron/dist/*.exe
            electron/dist/*.dmg
            electron/dist/*.AppImage
            electron/dist/*.blockmap
            electron/dist/latest*.yml
