name: Build & Release Ethera

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # First, create the GitHub Release so build jobs can upload to it
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ethera ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: "Ethera ${{ github.ref_name }} release"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: electron
        run: npm ci || npm install --include=dev

      - name: Build for ${{ matrix.platform }}
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ''
        run: npx electron-builder --${{ matrix.platform }} --publish always
