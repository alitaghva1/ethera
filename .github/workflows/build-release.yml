name: Build & Release Ethera

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: electron
        run: npm ci || npm install --include=dev

      - name: Build for ${{ matrix.platform }}
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ''
        run: npx electron-builder --${{ matrix.platform }}

      - name: List build output
        shell: bash
        run: find electron/dist -type f -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.blockmap" -o -name "*.yml" 2>/dev/null || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/dist/*.exe
            electron/dist/*.exe.blockmap
            electron/dist/*.dmg
            electron/dist/*.dmg.blockmap
            electron/dist/*.AppImage
            electron/dist/latest*.yml
