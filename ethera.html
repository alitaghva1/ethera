}

// ============================================================
//  SKELETON FORM — Complete mechanics
// ============================================================

const skeletonState = {
    stamina: 100,
    maxStamina: 100,
    staminaRegen: 15,     // per second
    staminaRegenDelay: 0.5,
    staminaDelayTimer: 0,
    boneAmmo: 6,
    maxBoneAmmo: 6,
    boneRegenTimer: 0,
    boneRegenRate: 2.0,   // seconds per bone
    shieldUp: false,
    shieldTimer: 0,
    shieldDuration: 0.4,
    shieldHP: 50,
    shieldMaxHP: 50,
    rolling: false,
    rollTimer: 0,
    rollDirRow: 0,
    rollDirCol: 0,
    boneFragments: [],    // bone pickups on ground from dead skeleton enemies
    warCryTimer: 0,
    warCryCooldown: 8,
};

function updateSkeleton(dt) {
    const config = FORM_CONFIGS.skeleton;

    // === MOVEMENT ===
    let inputRow = 0, inputCol = 0;
    if (keys['w'] || keys['arrowup'])    inputRow -= 1;
    if (keys['s'] || keys['arrowdown'])  inputRow += 1;
    if (keys['a'] || keys['arrowleft'])  inputCol -= 1;
    if (keys['d'] || keys['arrowright']) inputCol += 1;
    if (inputRow && inputCol) {
        const diag = 1 / Math.sqrt(2);
        inputRow *= diag; inputCol *= diag;
    }

    const accel = config.moveAccel;
    const maxSpd = config.moveMaxSpeed * getTalismanBonus().speedMult;
    const decel = config.moveDecel;

    // Rolling overrides movement
    if (skeletonState.rolling) {
        skeletonState.rollTimer -= dt;
        player.row += skeletonState.rollDirRow * 8 * dt;
        player.col += skeletonState.rollDirCol * 8 * dt;
        player.row = Math.max(0.5, Math.min(MAP_SIZE - 0.5, player.row));
        player.col = Math.max(0.5, Math.min(MAP_SIZE - 0.5, player.col));
        if (skeletonState.rollTimer <= 0) {
            skeletonState.rolling = false;
        }
    } else {
        if (inputRow || inputCol) {
            player.vx += inputRow * accel * dt;
            player.vy += inputCol * accel * dt;
            player.state = 'walk';
            if (inputCol !== 0) player.facing = inputCol > 0 ? 1 : -1;
        } else {
            player.state = 'idle';
        }

        // Deceleration
        const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
        if (speed > 0) {
            const dec = decel * dt;
            const newSpeed = Math.max(0, speed - dec);
            if (speed > 0.01) {
                player.vx *= newSpeed / speed;
                player.vy *= newSpeed / speed;
            } else { player.vx = 0; player.vy = 0; }
        }

        // Clamp speed
        const spd2 = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
        if (spd2 > maxSpd) {
            player.vx *= maxSpd / spd2;
            player.vy *= maxSpd / spd2;
        }

        // Move with collision
        const newRow = player.row + player.vx * dt;
        const newCol = player.col + player.vy * dt;
        if (canMoveTo(newRow, player.col)) player.row = newRow;
        else player.vx = 0;
        if (canMoveTo(player.row, newCol)) player.col = newCol;
        else player.vy = 0;
    }

    // Facing
    if (player.vy > 0.1) player.lastHorizDir = 1;
    else if (player.vy < -0.1) player.lastHorizDir = -1;
    player.facing = player.lastHorizDir;

    // === STAMINA ===
    if (skeletonState.staminaDelayTimer > 0) {
        skeletonState.staminaDelayTimer -= dt;
    } else {
        const regenMult = 1 + getUpgrade('quick_recovery') * 0.3;
        skeletonState.stamina = Math.min(skeletonState.maxStamina,
            skeletonState.stamina + skeletonState.staminaRegen * regenMult * dt);
    }

    // === BONE AMMO REGEN ===
    if (skeletonState.boneAmmo < skeletonState.maxBoneAmmo) {
        skeletonState.boneRegenTimer += dt;
        if (skeletonState.boneRegenTimer >= skeletonState.boneRegenRate) {
            skeletonState.boneRegenTimer = 0;
            skeletonState.boneAmmo = Math.min(skeletonState.maxBoneAmmo, skeletonState.boneAmmo + 1);
        }
    }

    // === BONE THROW ATTACK (LMB) ===
    if (player.attackCooldown > 0) player.attackCooldown -= dt;
    if (mouse.down && !skeletonState.rolling && !skeletonState.shieldUp &&
        player.attackCooldown <= 0 && skeletonState.boneAmmo > 0 &&
        gamePhase === 'playing' && !menuOpen && !gamePaused) {
        player.attackCooldown = config.atkCooldown;
        player.attacking = true;
        player.attackTimer = config.atkDuration;

        const boneCount = 1 + getUpgrade('bone_barrage');
        const spread = boneCount > 1 ? 0.15 : 0;

        for (let b = 0; b < boneCount && skeletonState.boneAmmo > 0; b++) {
            skeletonState.boneAmmo--;
            const tgt = screenToTile(mouse.x, mouse.y);
            let dx = tgt.row - player.row;
            let dy = tgt.col - player.col;
            // Add spread for multiple bones
            if (boneCount > 1) {
                const angle = Math.atan2(dy, dx) + (b - (boneCount - 1) / 2) * spread;
                dx = Math.cos(angle);
                dy = Math.sin(angle);
            }
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const proj = getPooledProj();
            proj.row = player.row;
            proj.col = player.col;
            proj.vr = (dx / dist) * config.atkSpeed;
            proj.vc = (dy / dist) * config.atkSpeed;
            proj.life = config.projLife;
            proj.size = config.projSize;
            proj.damage = config.primaryDmg * (1 + getUpgrade('marrow_leech') * 0.1);
            proj.pierce = 0;
            proj.explode = false;
            proj.bounce = 1; proj.bounceLeft = 1; // bones ricochet off walls once
            proj.isBone = true;
            proj.isBoomerang = getUpgrade('bone_boomerang') > 0;
            proj.boomerangTimer = 0;
            proj.marrowLeech = getUpgrade('marrow_leech') > 0;
            proj.trail = [];
            projectiles.push(proj);
        }
        if (sfxCtx) sfxFireball(); // reuse SFX
    }

    // Attack animation
    if (player.attacking) {
        player.attackTimer -= dt;
        if (player.attackTimer <= 0) player.attacking = false;
    }

    // === SHIELD TIMER ===
    if (skeletonState.shieldUp) {
        skeletonState.shieldTimer -= dt;
        if (skeletonState.shieldTimer <= 0) {
            skeletonState.shieldUp = false;
        }
    }

    // === DODGE COOLDOWN ===
    if (player.dodgeCoolTimer > 0) player.dodgeCoolTimer -= dt;

    // === BONE FRAGMENT PICKUPS (from dead skeleton enemies) ===
    for (let i = skeletonState.boneFragments.length - 1; i >= 0; i--) {
        const f = skeletonState.boneFragments[i];
        f.life -= dt;
        if (f.life <= 0) { skeletonState.boneFragments.splice(i, 1); continue; }
        // Auto-pickup if near
        const dist = Math.sqrt((f.row - player.row) ** 2 + (f.col - player.col) ** 2);
        if (dist < 1.0) {
            skeletonState.boneFragments.splice(i, 1);
            FormSystem.formData.skeleton.bonesCollected++;
            player.hp = Math.min(config.maxHp * (1 + getUpgrade('calcium_fort') * 0.15),
                player.hp + 8);
            pickupTexts.push({
                row: player.row, col: player.col,
                text: '+8 HP (Bone)', color: '#ddddaa',
                life: 1.5, offsetY: 0,
            });
        }
    }

    // Drop bone fragments from skeleton-type enemy deaths
    for (const e of enemies) {
        if (e.state === 'death' && !e._boneDropped &&
            (e.type === 'skeleton' || e.type === 'skelarch' || e.type === 'armoredskel')) {
            e._boneDropped = true;
            if (Math.random() < 0.5) {
                skeletonState.boneFragments.push({
                    row: e.row, col: e.col,
                    life: 12, bobTime: Math.random() * 10,
                });
            }
        }
    }

    // === WAR CRY upgrade ===
    if (getUpgrade('war_cry') > 0) {
        skeletonState.warCryTimer -= dt;
        if (skeletonState.warCryTimer <= 0) {
            skeletonState.warCryTimer = skeletonState.warCryCooldown / (1 + getUpgrade('war_cry') * 0.3);
            // Stun nearby enemies briefly
            for (const e of enemies) {
                if (e.state === 'death') continue;
                const dist = Math.sqrt((e.row - player.row) ** 2 + (e.col - player.col) ** 2);
                if (dist < 3) {
                    e.stunTimer = (e.stunTimer || 0) + 1.0;
                }
            }
            addScreenShake(2, 0.2);
        }
    }

    // === UNDYING RESOLVE upgrade ===
    if (getUpgrade('undying_resolve') > 0 && player.hp <= 0 && !skeletonState._undyingUsed) {
        skeletonState._undyingUsed = true;
        player.hp = 1;
        addScreenShake(6, 0.5);
        addSlowMo(0.3, 0.2);
        pickupTexts.push({
            row: player.row, col: player.col,
            text: 'UNDYING RESOLVE!', color: '#ffdd44',
            life: 2.0, offsetY: 0,
        });
    }

    // === ANIMATION (speed-aware) ===
    const skelSpeed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
    const skelAnimSpd = player.state === 'walk'
        ? Math.max(5, Math.min(12, 12 * (skelSpeed / config.moveMaxSpeed)))
        : 4;
    player.animFrame += dt * skelAnimSpd;

    // === EVOLUTION CHECK ===
    checkSkeletonEvolution();

    // === INVULNERABILITY ===
    if (playerInvTimer > 0) playerInvTimer -= dt;
}

function checkSkeletonEvolution() {
    const fd = FormSystem.formData.skeleton;
    const req = EVOLUTION_REQUIREMENTS.skeleton_to_wizard;
    if (fd.totalKills >= req.kills &&
        fd.bonesCollected >= req.bonesCollected &&
        FormSystem.talisman.level >= req.talismanLevel) {
        triggerEvolution('wizard');
    }
}

function drawSkeleton() {
    const pos = tileToScreen(player.row, player.col);
    const sx = pos.x + cameraX;
    const sy = pos.y + cameraY;
    const scale = WIZARD_SCALE;

    // Select sprite
    let spriteKey;
    if (skeletonState.shieldUp) spriteKey = 'skel_p_block';
    else if (player.attacking) spriteKey = 'skel_p_attack';
    else if (skeletonState.rolling) spriteKey = 'skel_p_hurt'; // reuse hurt as roll
    else if (player.state === 'walk') spriteKey = 'skel_p_walk';
    else spriteKey = 'skel_p_idle';

    if (playerInvTimer > PLAYER_STATS.invTime * 0.5) spriteKey = 'skel_p_hurt';

    const img = images[spriteKey];
    if (!img) return;

    const frameCount = Math.floor(img.width / 100);
    const frame = Math.floor(player.animFrame) % Math.max(1, frameCount);
    const fw = 100, fh = 100;

    ctx.save();

    // Ground shadow
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(sx, sy + 4, 12, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1.0;
    if (playerInvTimer > 0 && Math.sin(playerInvTimer * 20) > 0) ctx.globalAlpha = 0.4;

    // Roll visual: slight transparency + spin effect
    if (skeletonState.rolling) {
        ctx.globalAlpha *= 0.6;
    }

    const drawW = fw * scale;
    const drawH = fh * scale;
    const drawY = sy - 50 * scale;

    if (player.facing < 0) {
        ctx.translate(sx, drawY);
        ctx.scale(-1, 1);
        ctx.drawImage(img, frame * fw, 0, fw, fh, -drawW / 2, 0, drawW, drawH);
    } else {
        ctx.drawImage(img, frame * fw, 0, fw, fh, sx - drawW / 2, drawY, drawW, drawH);
    }

    // Shield visual overlay
    if (skeletonState.shieldUp) {
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.3 + Math.sin(performance.now() / 200) * 0.1;
        const shieldGrad = ctx.createRadialGradient(sx, sy - 20, 0, sx, sy - 20, 30);
        shieldGrad.addColorStop(0, 'rgba(200, 200, 220, 0.4)');
        shieldGrad.addColorStop(1, 'rgba(100, 100, 140, 0)');
        ctx.fillStyle = shieldGrad;
        ctx.beginPath();
        ctx.arc(sx, sy - 20, 30, 0, Math.PI * 2);
        ctx.fill();
    }

    // Talisman orbiting glow
    if (FormSystem.talisman.found) {
        const t = performance.now() / 1000;
        const orbitR = 16;
        const tx = sx + Math.cos(t * 2.5) * orbitR;
        const ty = sy - 35 + Math.sin(t * 2.5) * orbitR * 0.4;
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.5 + Math.sin(t * 4) * 0.15;
        const tGlow = ctx.createRadialGradient(tx, ty, 0, tx, ty, 7);
        tGlow.addColorStop(0, 'rgba(220, 180, 60, 0.7)');
        tGlow.addColorStop(1, 'rgba(100, 60, 10, 0)');
        ctx.fillStyle = tGlow;
        ctx.fillRect(tx - 9, ty - 9, 18, 18);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#e8c840';
        ctx.beginPath();
        ctx.moveTo(tx, ty - 4);
        ctx.lineTo(tx + 3, ty);
        ctx.lineTo(tx, ty + 4);
        ctx.lineTo(tx - 3, ty);
        ctx.closePath();
        ctx.fill();
    }

    ctx.restore();

    // Draw bone fragment pickups
    for (const f of skeletonState.boneFragments) {
        const fp = tileToScreen(f.row, f.col);
        const fx = fp.x + cameraX;
        const fy = fp.y + cameraY;
        const bob = Math.sin(f.bobTime + performance.now() / 500) * 3;
        ctx.save();
        ctx.globalAlpha = Math.min(1, f.life / 2) * 0.8;
        ctx.fillStyle = '#ddd8cc';
        // Small bone shape
        ctx.beginPath();
        ctx.ellipse(fx, fy - 8 + bob, 4, 2, 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff8e8';
        ctx.beginPath();
        ctx.arc(fx - 3, fy - 8 + bob, 2, 0, Math.PI * 2);
        ctx.arc(fx + 3, fy - 8 + bob, 2, 0, Math.PI * 2);
        ctx.fill();
        // Subtle glow
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.15;
        const bGlow = ctx.createRadialGradient(fx, fy - 8, 0, fx, fy - 8, 15);
        bGlow.addColorStop(0, 'rgba(220, 210, 180, 0.4)');
        bGlow.addColorStop(1, 'rgba(100, 90, 60, 0)');
        ctx.fillStyle = bGlow;
        ctx.fillRect(fx - 15, fy - 23 + bob, 30, 30);
        ctx.restore();
    }
}

function drawSkeletonHUD() {
    if (gamePhase !== 'playing') return;

    const barW = 180, barH = 12, gap = 5;
    const x = 28;
    const yHP = canvasH - 84;
    const yStam = yHP + barH + gap;
    const yXP = yStam + barH + gap;

    ctx.save();

    // Dark backing panel
    const panelX = x - 14, panelY = yHP - 18;
    const panelW = barW + 36;
    const panelH = (yXP + barH) - yHP + 26;
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#000';
    ctx.fillRect(panelX - 2, panelY - 2, panelW + 4, panelH + 4);
    ctx.globalAlpha = 0.88;
    const hudBg = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
    hudBg.addColorStop(0, '#1a1814');
    hudBg.addColorStop(1, '#0a0806');
    ctx.fillStyle = hudBg;
    ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 4); ctx.fill();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#8a8060';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 4); ctx.stroke();

    // HP Bar (bone white)
    const maxHP = FORM_CONFIGS.skeleton.maxHp * (1 + getUpgrade('calcium_fort') * 0.15);
    const hpFrac = Math.max(0, player.hp / maxHP);
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#0a0808';
    ctx.beginPath(); ctx.roundRect(x, yHP, barW, barH, 3); ctx.fill();
    if (hpFrac > 0) {
        ctx.globalAlpha = 0.9;
        const hpGrad = ctx.createLinearGradient(x, yHP, x, yHP + barH);
        hpGrad.addColorStop(0, '#ddccaa');
        hpGrad.addColorStop(0.5, '#bbaa88');
        hpGrad.addColorStop(1, '#998866');
        ctx.fillStyle = hpGrad;
        ctx.beginPath(); ctx.roundRect(x, yHP, Math.max(2, barW * hpFrac), barH, 3); ctx.fill();
    }
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#ffeedd';
    ctx.font = '9px monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText(`HP ${Math.ceil(player.hp)}/${Math.ceil(maxHP)}`, x + 4, yHP + barH / 2 + 1);

    // Stamina Bar (yellow-orange)
    const stamFrac = skeletonState.stamina / skeletonState.maxStamina;
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#0a0804';
    ctx.beginPath(); ctx.roundRect(x, yStam, barW, barH, 3); ctx.fill();
    if (stamFrac > 0) {
        ctx.globalAlpha = 0.85;
        const stamGrad = ctx.createLinearGradient(x, yStam, x, yStam + barH);
        stamGrad.addColorStop(0, '#eecc44');
        stamGrad.addColorStop(0.5, '#ccaa30');
        stamGrad.addColorStop(1, '#aa8820');
        ctx.fillStyle = stamGrad;
        ctx.beginPath(); ctx.roundRect(x, yStam, Math.max(2, barW * stamFrac), barH, 3); ctx.fill();
    }
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#ffeeaa';
    ctx.font = '9px monospace';
    ctx.fillText(`STA ${Math.ceil(skeletonState.stamina)}/${skeletonState.maxStamina}`, x + 4, yStam + barH / 2 + 1);

    // Bone ammo indicators (small circles)
    const ammoY = yStam - 2;
    const ammoStartX = x + barW + 8;
    for (let i = 0; i < skeletonState.maxBoneAmmo; i++) {
        ctx.globalAlpha = i < skeletonState.boneAmmo ? 0.8 : 0.15;
        ctx.fillStyle = i < skeletonState.boneAmmo ? '#ddd8cc' : '#443830';
        ctx.beginPath();
        ctx.arc(ammoStartX + i * 8, ammoY, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // XP Bar
    const xpFrac = xpState.xpToNext > 0 ? xpState.xp / xpState.xpToNext : 0;
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#0a0804';
    ctx.beginPath(); ctx.roundRect(x, yXP, barW, barH, 3); ctx.fill();
    if (xpFrac > 0) {
        ctx.globalAlpha = 0.7;
        const xpGrad = ctx.createLinearGradient(x, yXP, x, yXP + barH);
        xpGrad.addColorStop(0, '#ddb040');
        xpGrad.addColorStop(0.5, '#c49030');
        xpGrad.addColorStop(1, '#a07020');
        ctx.fillStyle = xpGrad;
        ctx.beginPath(); ctx.roundRect(x, yXP, Math.max(2, barW * xpFrac), barH, 3); ctx.fill();
    }
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = '#ddcc88';
    ctx.font = '9px monospace';
    ctx.fillText(`Lv${xpState.level}  ${xpState.xp}/${xpState.xpToNext}`, x + 4, yXP + barH / 2 + 1);

    // Talisman indicator
    if (FormSystem.talisman.found) {
        const tX = canvasW - 60, tY = 30;
        const t = performance.now() / 1000;
        ctx.globalAlpha = 0.7 + Math.sin(t * 2) * 0.15;
        ctx.fillStyle = '#e8c840';
        ctx.beginPath();
        ctx.moveTo(tX, tY - 10);
        ctx.lineTo(tX + 7, tY);
        ctx.lineTo(tX, tY + 10);
        ctx.lineTo(tX - 7, tY);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#c4a878';
        ctx.fillText(`Lv${FormSystem.talisman.level}`, tX, tY + 20);
        ctx.textAlign = 'left';
    }

    // Form indicator
    ctx.globalAlpha = 0.3;
    ctx.font = '9px monospace';
    ctx.fillStyle = '#bbaa88';
    ctx.fillText('SKELETON', x, yHP - 8);

    // Ability hints (right side)
    const hintX = canvasW - 170;
    const hintY = canvasH - 90;
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.roundRect(hintX - 8, hintY - 6, 164, 80, 4); ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.font = '9px monospace';
    ctx.fillStyle = '#bbaa88';
    ctx.fillText('LMB  Bone Throw', hintX, hintY + 6);
    ctx.fillText('RMB  Shield Bash', hintX, hintY + 20);
    ctx.fillText('SPC  Bone Roll', hintX, hintY + 34);
    ctx.fillText('E    Consume Corpse', hintX, hintY + 48);
    ctx.fillText('TAB  Menu', hintX, hintY + 62);

    ctx.restore();
}

// Register skeleton handlers
formHandlers.skeleton.update = function(dt) { updateSkeleton(dt); };
formHandlers.skeleton.draw = function() { drawSkeleton(); };
formHandlers.skeleton.drawHUD = function() { drawSkeletonHUD(); };

// Shield Bash (RMB)
formHandlers.skeleton.onSecondaryAbility = function() {
    if (skeletonState.shieldUp) return;
    if (skeletonState.stamina < 25) return;
    skeletonState.stamina -= 25;
    skeletonState.staminaDelayTimer = skeletonState.staminaRegenDelay;
    skeletonState.shieldUp = true;
    skeletonState.shieldTimer = skeletonState.shieldDuration;
    FormSystem.formData.skeleton.shieldBashes++;
    // Push nearby enemies back
    for (const e of enemies) {
        if (e.state === 'death') continue;
        const dx = e.row - player.row;
        const dy = e.col - player.col;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1.5 && dist > 0) {
            e.row += (dx / dist) * 2;
            e.col += (dy / dist) * 2;
            e.hp -= 5;
            if (e.hp <= 0) e.state = 'death';
        }
    }
    // Shrapnel Shield upgrade
    if (getUpgrade('shrapnel_shield') > 0) {
        const shrapCount = 3 + getUpgrade('shrapnel_shield') * 2;
        for (let i = 0; i < shrapCount; i++) {
            const angle = (i / shrapCount) * Math.PI * 2;
            const proj = getPooledProj();
            proj.row = player.row;
            proj.col = player.col;
            proj.vr = Math.cos(angle) * 8;
            proj.vc = Math.sin(angle) * 8;
            proj.life = 0.6;
            proj.size = 4;
            proj.damage = 8;
            proj.pierce = 0;
            proj.explode = false;
            proj.bounce = 0;
            proj.isBone = true;
            proj.trail = [];
            projectiles.push(proj);
        }
    }
    addScreenShake(2, 0.15);
};

// Roll Dodge (Space)
formHandlers.skeleton.onDodge = function() {
    if (skeletonState.rolling) return;
    if (player.dodgeCoolTimer > 0) return;
    if (skeletonState.stamina < 20) return;
    skeletonState.stamina -= 20;
    skeletonState.staminaDelayTimer = skeletonState.staminaRegenDelay;
    skeletonState.rolling = true;
    skeletonState.rollTimer = 0.25;
    player.dodgeCoolTimer = DODGE_COOLDOWN * 0.6; // faster cooldown

    let dr = 0, dc = 0;
    if (keys['w'] || keys['arrowup'])    dr -= 1;
    if (keys['s'] || keys['arrowdown'])  dr += 1;
    if (keys['a'] || keys['arrowleft'])  dc -= 1;
    if (keys['d'] || keys['arrowright']) dc += 1;
    if (dr === 0 && dc === 0) { dr = 0; dc = player.facing; }
    const mag = Math.sqrt(dr * dr + dc * dc) || 1;
    skeletonState.rollDirRow = dr / mag;
    skeletonState.rollDirCol = dc / mag;

    // Brief invulnerability
    playerInvTimer = 0.25;
};

// Reassemble (E key — consume bone fragments AND corpses)
formHandlers.skeleton.onInteract = function() {
    let healed = 0;
    let bonesGained = 0;

    // 1. Absorb nearby bone fragments
    for (let i = skeletonState.boneFragments.length - 1; i >= 0; i--) {
        const f = skeletonState.boneFragments[i];
        const dist = Math.sqrt((f.row - player.row) ** 2 + (f.col - player.col) ** 2);
        if (dist < 2.5) {
            skeletonState.boneFragments.splice(i, 1);
            FormSystem.formData.skeleton.bonesCollected++;
            healed += 12;
        }
    }

    // 2. Consume a nearby corpse — rip bones from the dead for HP and ammo
    let corpseTarget = null, bestDist = 2.0;
    for (const e of enemies) {
        if (e.state === 'death' && e.deathTimer > 0) {
            const dist = Math.sqrt((e.row - player.row) ** 2 + (e.col - player.col) ** 2);
            if (dist < bestDist) { bestDist = dist; corpseTarget = e; }
        }
    }
    if (corpseTarget) {
        const idx = enemies.indexOf(corpseTarget);
        if (idx !== -1) enemies.splice(idx, 1);
        healed += 15;
        bonesGained = 3; // rip bones from the corpse
        skeletonState.boneAmmo = Math.min(skeletonState.maxBoneAmmo, skeletonState.boneAmmo + bonesGained);
        // Bone-rip particle effect
        const corpPos = tileToScreen(corpseTarget.row, corpseTarget.col);
        for (let i = 0; i < 5; i++) {
            particles.push({
                x: corpPos.x + cameraX, y: corpPos.y + cameraY,
                angle: Math.random() * Math.PI * 2, speed: 25 + Math.random() * 35,
                life: 0.4 + Math.random() * 0.3, maxLife: 0.7,
                size: 2 + Math.random() * 2, color: '#ddccaa', drift: Math.random() * 3,
            });
        }
    }

    if (healed > 0 || bonesGained > 0) {
        const maxHP = FORM_CONFIGS.skeleton.maxHp * (1 + getUpgrade('calcium_fort') * 0.15) + getTalismanBonus().hpBonus;
        player.hp = Math.min(maxHP, player.hp + healed);
        let txt = `+${healed} HP`;
        if (bonesGained > 0) txt += ` +${bonesGained} Bones`;
        pickupTexts.push({
            row: player.row, col: player.col,
            text: txt, color: '#ddddcc',
            life: 1.5, offsetY: 0,
        });
        addScreenShake(1.5, 0.1);
    }
};

// ----- DUST PARTICLE SYSTEM (awakening burst) -----
function spawnDustBurst(cx, cy, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 40 + 15;
        dustParticles.push({
            x: cx + (Math.random() - 0.5) * 10,
            y: cy + (Math.random() - 0.5) * 6,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed * 0.5 - Math.random() * 20,
            size: Math.random() * 2.5 + 1,
            life: Math.random() * 1.2 + 0.6,
            maxLife: 0,
            alpha: Math.random() * 0.4 + 0.3,
            color: Math.random() > 0.5 ? '#a0907060' : '#80706050',
        });
        dustParticles[dustParticles.length - 1].maxLife = dustParticles[dustParticles.length - 1].life;
    }
}

function updateDustParticles(dt) {
    // --- Spawn ambient particles during gameplay ---
    if (gamePhase === 'playing' && dustParticles.length < 25) {
        // Sparse dust motes in lit area around player
        if (Math.random() < 0.08) { // ~5 per second
            const angle = Math.random() * Math.PI * 2;
            const dist = 50 + Math.random() * 200;
            const pos = tileToScreen(player.row, player.col);
            const px = pos.x + cameraX + Math.cos(angle) * dist;
            const py = pos.y + cameraY + Math.sin(angle) * dist * 0.5;
            dustParticles.push({
                x: px, y: py,
                vx: (Math.random() - 0.5) * 8,
                vy: -Math.random() * 6 - 2,
                life: 3 + Math.random() * 4,
                maxLife: 3 + Math.random() * 4,
                size: 0.8 + Math.random() * 1.2,
                alpha: 0.15 + Math.random() * 0.15,
            });
        }
        // Ember sparks near enemies (combat atmosphere)
        if (enemies.length > 0 && Math.random() < 0.04) {
            const e = enemies[Math.floor(Math.random() * enemies.length)];
            if (e.state !== 'death') {
                const epos = tileToScreen(e.row, e.col);
                dustParticles.push({
                    x: epos.x + cameraX + (Math.random() - 0.5) * 30,
                    y: epos.y + cameraY - Math.random() * 20,
                    vx: (Math.random() - 0.5) * 15,
                    vy: -Math.random() * 20 - 8,
                    life: 0.8 + Math.random() * 1.5,
                    maxLife: 0.8 + Math.random() * 1.5,
                    size: 0.5 + Math.random() * 0.8,
                    alpha: 0.3 + Math.random() * 0.2,
                    isEmber: true,
                });
            }
        }
    }

    for (let i = dustParticles.length - 1; i >= 0; i--) {
        const d = dustParticles[i];
        d.life -= dt;
        if (d.life <= 0) { dustParticles.splice(i, 1); continue; }
        d.x += d.vx * dt;
        d.y += d.vy * dt;
        d.vy += 30 * dt; // gravity
        d.vx *= 0.97;     // air resistance
    }
}

function drawDustParticles() {
    if (dustParticles.length === 0) return;
    ctx.save();
    for (const d of dustParticles) {
        const lifeFrac = d.life / d.maxLife;
        ctx.globalAlpha = d.alpha * lifeFrac;

        if (d.isEmber) {
            ctx.fillStyle = `rgba(255, ${120 + Math.random() * 80}, 40, ${d.alpha * lifeFrac})`;
        } else {
            ctx.fillStyle = `rgba(160, 140, 110, ${d.alpha * lifeFrac})`;
        }

        ctx.beginPath();
        ctx.arc(d.x + cameraX, d.y + cameraY, d.size * (0.5 + lifeFrac * 0.5), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

// ----- CINEMATIC NARRATIVE TEXT (canvas-rendered) -----
const CINEMATIC_LINES = [
    'You awaken on cold stone.',
    'Darkness presses in from every side.',
    'They left you for dead.',
    'They were wrong.'
];
const CINEMATIC_LINE_TIMINGS = [0.3, 1.2, 2.4, 8.0]; // when each line starts fading in (tightened)
//  Phase 1: lines 0-1 fade at 3.8, leaving "left you for dead" alone
//  Phase 2: "left you for dead" fades at 5.0, screen goes dark
//  Phase 3: ~1s empty beat, then "They were wrong" at 8.0
const CINEMATIC_01_FADE_OUT = 3.8;     // lines 0-1 begin fading
const CINEMATIC_2_FADE_OUT = 5.0;      // "left you for dead" begins fading (alone moment: 4.0-5.0)
const CINEMATIC_TEXT_FADE_OUT = 9.5;    // "They were wrong" begins fading
const CINEMATIC_PAN_DURATION = 8.0;     // camera reaches wizard (was 12.5 — tighter)
const CINEMATIC_RISE_START = 9.5;       // wizard begins stirring (synced with text fade)
const CINEMATIC_RISE_DURATION = 2.2;    // how long the rise takes (slightly snappier)
const CINEMATIC_LIGHT_SWELL_START = 10.5; // light begins expanding
const CINEMATIC_TOTAL = 13.0;          // total cinematic length (was 16.5)
let cinematicFlashAlpha = 0;         // screen flash on transition
// --- Cinematic SFX flags (prevent repeat triggers) ---
let cinematicSFX_heartbeat = false;
let cinematicSFX_stir = false;
let cinematicSFX_stand = false;
let cinematicSFX_ducked = false;
let cinematicSFX_unducked = false;
// --- Cinematic screen shake tracking ---
let cinematicShakeTriggered = false;

function drawCinematicText() {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const cx = canvasW / 2;
    const baseY = canvasH * 0.35;
    const t = cinematicTimer;

    // --- Lines 0-2: stacked narrative, muted tones ---
    for (let i = 0; i < 3; i++) {
        if (cinematicTextAlpha[i] <= 0.01) continue;
        const a = cinematicTextAlpha[i];
        const fadeAge = Math.max(0, t - CINEMATIC_LINE_TIMINGS[i]);
        const drift = Math.min(6, fadeAge * 2);

        if (i === 2) {
            ctx.font = '19px Georgia, serif';
            ctx.fillStyle = `rgba(195, 170, 135, ${a})`;
            ctx.shadowColor = `rgba(195, 170, 135, ${a * 0.4})`;
            ctx.shadowBlur = 14;
        } else {
            ctx.font = '18px Georgia, serif';
            ctx.fillStyle = `rgba(170, 155, 130, ${a * 0.9})`;
            ctx.shadowColor = `rgba(170, 155, 130, ${a * 0.3})`;
            ctx.shadowBlur = 12;
        }
        const lineY = baseY + i * 34 - drift;
        ctx.fillText(CINEMATIC_LINES[i], cx, lineY);
        if (i === 2) ctx.fillText(CINEMATIC_LINES[i], cx, lineY);
    }

    // --- "They were wrong." — alone, centered, defiant ---
    if (cinematicTextAlpha[3] > 0.01) {
        const a = cinematicTextAlpha[3];
        const fadeAge = Math.max(0, t - CINEMATIC_LINE_TIMINGS[3]);

        // Positioned at true screen center — isolated, not stacked
        const lineY = canvasH * 0.44;

        // Smooth scale: starts slightly large (1.08x), settles to 1.0x — feels like it lands
        const scaleT = Math.min(1, fadeAge / 2.0);
        const scaleEase = 1 - Math.pow(1 - scaleT, 2.5);
        const scale = 1.08 - 0.08 * scaleEase;
        const size = Math.round(28 * scale);

        ctx.font = `italic ${size}px Georgia, serif`;

        // Glow bloom builds with alpha — starts invisible, grows warm
        const glowRamp = Math.min(1, fadeAge / 1.5);
        const glow = a * glowRamp;

        // Pass 1: outer halo (wide, faint)
        ctx.shadowColor = `rgba(200, 155, 70, ${glow * 0.18})`;
        ctx.shadowBlur = 55;
        ctx.fillStyle = `rgba(230, 205, 155, ${a * 0.3})`;
        ctx.fillText(CINEMATIC_LINES[3], cx, lineY);

        // Pass 2: mid glow
        ctx.shadowColor = `rgba(225, 180, 90, ${glow * 0.45})`;
        ctx.shadowBlur = 25;
        ctx.fillStyle = `rgba(235, 212, 165, ${a * 0.6})`;
        ctx.fillText(CINEMATIC_LINES[3], cx, lineY);

        // Pass 3: crisp text on top
        ctx.shadowColor = `rgba(240, 200, 110, ${glow * 0.7})`;
        ctx.shadowBlur = 12;
        ctx.fillStyle = `rgba(240, 220, 175, ${a})`;
        ctx.fillText(CINEMATIC_LINES[3], cx, lineY);

        // Thin underline accent that fades in with the text
        if (a > 0.15) {
            const lineW = ctx.measureText(CINEMATIC_LINES[3]).width;
            const underT = Math.min(1, Math.max(0, (fadeAge - 0.8) / 1.0));
            const underEase = 1 - Math.pow(1 - underT, 3);
            const halfW = (lineW * 0.5) * underEase;
            if (halfW > 2) {
                ctx.globalAlpha = a * 0.25 * underEase;
                ctx.strokeStyle = '#cc9944';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(cx - halfW, lineY + size * 0.55);
                ctx.lineTo(cx + halfW, lineY + size * 0.55);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
    }

    // Screen flash overlay (on transition to gameplay)
    if (cinematicFlashAlpha > 0) {
        ctx.globalAlpha = cinematicFlashAlpha;
        ctx.fillStyle = 'rgba(220, 190, 130, 1)';
        ctx.globalCompositeOperation = 'screen';
        ctx.fillRect(0, 0, canvasW, canvasH);
    }

    ctx.restore();
}

function drawDarkness() {
    // Town zones use bright outdoor lighting — no torch radius
    const zoneCfg = ZONE_CONFIGS[currentZone];
    if (zoneCfg && zoneCfg.lighting === 'outdoor') {
        // Soft outdoor ambient — gentle warm tint, no darkness
        ctx.save();
        ctx.globalCompositeOperation = 'multiply';
        // Bright daylight with slight warm golden tone
        ctx.fillStyle = 'rgba(220, 210, 190, 0.92)';
        ctx.fillRect(0, 0, canvasW, canvasH);
        ctx.restore();

        // Subtle blue sky tint at edges (vignette)
        ctx.save();
        ctx.globalCompositeOperation = 'multiply';
        const pos = tileToScreen(player.row, player.col);
        const px = pos.x + cameraX;
        const py = pos.y + cameraY - 20;
        const vig = ctx.createRadialGradient(px, py, canvasW * 0.3, px, py, canvasW * 0.8);
        vig.addColorStop(0, 'rgba(255, 255, 255, 1)');
        vig.addColorStop(1, 'rgba(180, 190, 210, 1)');
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, canvasW, canvasH);
        ctx.restore();
        return;
    }

    // Dungeon zones: radial torch light
    let px, py;
    if (gamePhase === 'cinematic') {
        px = canvasW / 2;
        py = canvasH / 2 - 20;
    } else {
        const pos = tileToScreen(player.row, player.col);
        px = pos.x + cameraX;
        py = pos.y + cameraY - 20;
    }

    const flickerScale = gamePhase === 'cinematic' ? 0.3 : 1.0;
    const flicker = (Math.sin(lightFlicker * 3.7) * 8 +
                    Math.sin(lightFlicker * 5.3) * 4 +
                    Math.sin(lightFlicker * 1.1) * 12) * flickerScale;
    const radius = Math.max(5, lightRadius + flicker);

    // Pass 1: radial torch light (same proven structure as original)
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    const grad = ctx.createRadialGradient(px, py, 0, px, py, radius);
    grad.addColorStop(0, 'rgba(210, 185, 135, 1)');
    grad.addColorStop(0.3, 'rgba(160, 120, 75, 1)');
    grad.addColorStop(0.65, 'rgba(50, 32, 14, 1)');
    grad.addColorStop(1, 'rgba(8, 4, 2, 1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.restore();

    // Pass 2: overall darkness film — dims everything including the lit center
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = 'rgba(48, 35, 25, 0.58)';
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.restore();
}

// ============================================================
//  PLAYER UPDATE (physics-based free movement + phase jump)
// ============================================================
// Cached equipment bonuses — recalculated each frame in updatePlayer
let equipBonus = {};

function updatePlayer(dt) {
    // Freeze player when dead
    if (gameDead) return;
    // Freeze player during victory
    if (wave.phase === 'victory') return;

    // Recalculate equipment bonuses
    equipBonus = getEquipBonuses();

    // --- Tick cooldowns ---
    if (player.dodgeCoolTimer > 0) player.dodgeCoolTimer -= dt;
    if (player.dodgeFlashTimer > 0) player.dodgeFlashTimer -= dt;
    if (player.attackCooldown > 0) player.attackCooldown -= dt;

    // --- Screen-relative input ---
    let inputRow = 0, inputCol = 0;
    if (keys['w'] || keys['arrowup'])    { inputRow--; inputCol--; }
    if (keys['s'] || keys['arrowdown'])  { inputRow++; inputCol++; }
    if (keys['a'] || keys['arrowleft'])  { inputRow++; inputCol--; }
    if (keys['d'] || keys['arrowright']) { inputRow--; inputCol++; }

    const inputLen = Math.sqrt(inputRow * inputRow + inputCol * inputCol);
    if (inputLen > 0) { inputRow /= inputLen; inputCol /= inputLen; }

    // --- Phase Jump trigger (Space) ---
    if (keys[' '] && !player.dodging && player.dodgeCoolTimer <= 0) {
        player.dodging = true;
        player.dodgeTimer = DODGE_DURATION;
        player.dodgeCoolTimer = Math.max(0.3, DODGE_COOLDOWN - (equipBonus.dodgeCdReduc || 0));
        player.dodgeFlashTimer = 0.12; // brief arcane flash
        sfxDodge();

        // Direction: use current input, or facing direction if idle
        if (inputLen > 0) {
            player.dodgeDirRow = inputRow;
            player.dodgeDirCol = inputCol;
        } else {
            // Phase in facing direction (screen-right or screen-left)
            if (player.facing === 1) {
                // screen-right → row--, col++
                player.dodgeDirRow = -0.707;
                player.dodgeDirCol = 0.707;
            } else {
                // screen-left → row++, col--
                player.dodgeDirRow = 0.707;
                player.dodgeDirCol = -0.707;
            }
        }

        // Spawn ghost afterimages along the path
        for (let i = 0; i < DODGE_GHOST_COUNT; i++) {
            const t = i / DODGE_GHOST_COUNT;
            ghosts.push({
                row: player.row + player.dodgeDirRow * DODGE_DISTANCE * t * 0.5,
                col: player.col + player.dodgeDirCol * DODGE_DISTANCE * t * 0.5,
                facing: player.facing,
                animFrame: player.animFrame,
                state: player.state,
                alpha: 0.6 - t * 0.3,
                life: DODGE_GHOST_LIFE * (1 - t * 0.3),
            });
        }

        // Consume the key so it doesn't retrigger
        keys[' '] = false;
    }

    // --- Phase Jump movement (override normal movement) ---
    if (player.dodging) {
        player.dodgeTimer -= dt;
        const dodgeSpeed = DODGE_DISTANCE / DODGE_DURATION;
        const moveRow = player.dodgeDirRow * dodgeSpeed * dt;
        const moveCol = player.dodgeDirCol * dodgeSpeed * dt;
        const newRow = player.row + moveRow;
        const newCol = player.col + moveCol;

        // Phase jump uses same collision but stops the dodge on hit
        if (canMoveTo(newRow, newCol)) {
            player.row = newRow;
            player.col = newCol;
        } else {
            // Try per-axis sliding during dodge
            if (canMoveTo(newRow, player.col)) {
                player.row = newRow;
            }
            if (canMoveTo(player.row, newCol)) {
                player.col = newCol;
            }
            // End dodge early on wall hit
            player.dodgeTimer = 0;
        }

        // Spawn trailing ghosts during the dash
        if (Math.random() < 0.6) {
            ghosts.push({
                row: player.row,
                col: player.col,
                facing: player.facing,
                animFrame: player.animFrame,
                state: 'walk',
                alpha: 0.45,
                life: DODGE_GHOST_LIFE * 0.7,
            });
        }

        if (player.dodgeTimer <= 0) {
            player.dodging = false;
            player.vx = player.dodgeDirRow * MOVE_MAX_SPEED * 0.3; // residual momentum
            player.vy = player.dodgeDirCol * MOVE_MAX_SPEED * 0.3;
        }

        // Keep walk animation going during dodge
        player.state = 'walk';
        player.animFrame = (player.animFrame + 14 * dt) % 8; // fast animation
        return; // skip normal movement while dodging
    }

    // --- Normal movement (lerp-based velocity) ---
    const effMoveSpeed = MOVE_MAX_SPEED * (1 + (equipBonus.moveSpeedMult || 0)) * getTalismanBonus().speedMult;
    const targetVr = inputRow * effMoveSpeed;
    const targetVc = inputCol * effMoveSpeed;
    const resp = Math.min(1, 25 * dt);
    player.vx += (targetVr - player.vx) * resp;
    player.vy += (targetVc - player.vy) * resp;

    if (Math.abs(player.vx) < 0.01 && inputRow === 0) player.vx = 0;
    if (Math.abs(player.vy) < 0.01 && inputCol === 0) player.vy = 0;

    // --- Collision with clean wall sliding ---
    const newRow = player.row + player.vx * dt;
    const newCol = player.col + player.vy * dt;

    if (canMoveTo(newRow, newCol)) {
        player.row = newRow;
        player.col = newCol;
    } else {
        if (player.vx !== 0 && canMoveTo(newRow, player.col)) {
            player.row = newRow;
        } else {
            player.vx = 0;
        }
        if (player.vy !== 0 && canMoveTo(player.row, newCol)) {
            player.col = newCol;
        } else {
            player.vy = 0;
        }
    }

    // --- Facing ---
    const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
    if (speed > 0.3) {
        const screenVx = player.vy - player.vx;
        if (screenVx > 0.15) player.facing = 1;
        else if (screenVx < -0.15) player.facing = -1;
    }

    // --- Mana regeneration (capped by locked mana from summons) ---
    const lockedMana = summons.reduce((sum, s) => sum + s.manaLocked, 0);
    const effMaxMana = (MAX_MANA + (equipBonus.maxManaBonus || 0)) - lockedMana;
    const effManaRegen = MANA_REGEN * (1 + (equipBonus.manaRegenMult || 0) + getUpgrade('manasurge') * 0.25);
    if (player.manaRegenTimer > 0) {
        player.manaRegenTimer -= dt;
    } else if (player.mana < effMaxMana) {
        player.mana = Math.min(effMaxMana, player.mana + effManaRegen * dt);
    }

    // --- Summon tower placement (right click toggles placement mode) ---
    if (mouse.rightDown && !player.dodging && !player.attacking && !placement.active) {
        mouse.rightDown = false;
        const effSummonMax = SUMMON_MAX_COUNT + getUpgrade('tower_extra');
        if (summons.length < effSummonMax && player.mana >= SUMMON_MANA_COST) {
            placement.active = true;
        }
    }

    // --- Wand attack trigger (left click) ---
    const effManaCost = Math.max(3, ATK_MANA_COST - (equipBonus.manaCostReduc || 0));
    const effAtkCooldown = (ATK_COOLDOWN / (1 + (equipBonus.atkSpeedMult || 0))) * Math.pow(0.85, getUpgrade('firerate'));
    if (!player.attacking && !player.dodging && mouse.down && player.attackCooldown <= 0 && player.mana >= effManaCost) {
        const aimDir = getAimDirection();
        player.attacking = true;
        player.attackTimer = ATK_DURATION;
        player.attackFrame = 0;
        player.attackCooldown = effAtkCooldown;
        player.attackFired = false;
        player.facing = aimDir.screenX >= 0 ? 1 : -1;
    }

    // --- Attack animation update ---
    if (player.attacking) {
        player.attackTimer -= dt;
        const elapsed = ATK_DURATION - player.attackTimer;

        player.attackFrame = Math.min(5, Math.floor((elapsed / ATK_DURATION) * 6));

        if (!player.attackFired && elapsed >= ATK_FIRE_AT) {
            player.attackFired = true;
            player.mana -= effManaCost;
            player.manaRegenTimer = MANA_REGEN_DELAY;
            spawnProjectile();
            sfxFireballShoot();
        }

        if (player.attackTimer <= 0) {
            player.attacking = false;
        }

        player.state = 'attack';
        player.animFrame = player.attackFrame;
        return;
    }

    // --- Animation state ---
    player.state = speed > 0.2 ? 'walk' : 'idle';

    // --- Facing toward mouse when idle (subtle) ---
    if (speed <= 0.3) {
        const aimDir = getAimDirection();
        if (Math.abs(aimDir.screenX) > 30) {
            player.facing = aimDir.screenX >= 0 ? 1 : -1;
        }
    }

    // --- Animation frame ---
    const frameCount = player.state === 'walk' ? 8 : 6;
    const animSpeed = player.state === 'walk'
        ? Math.max(4, Math.min(12, 12 * (speed / MOVE_MAX_SPEED)))
        : 6;
    player.animFrame = (player.animFrame + animSpeed * dt) % frameCount;
}

// --- Aim direction helper ---
function getAimDirection() {
    // Convert mouse screen position to direction from wizard
    const pos = tileToScreen(player.row, player.col);
    const wizScreenX = pos.x + cameraX;
    const wizScreenY = pos.y + cameraY - WIZARD_FRAME_H * WIZARD_SCALE * 0.4;
    const dx = mouse.x - wizScreenX;
    const dy = mouse.y - wizScreenY;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    return { screenX: dx, screenY: dy, nx: dx / len, ny: dy / len };
}

// --- Convert screen direction to tile-space direction ---
function screenDirToTile(nx, ny) {
    // Inverse of tileToScreen: screenX = (col-row)*HALF_DW, screenY = (col+row)*HALF_DH
    // So: col-row = screenX/HALF_DW, col+row = screenY/HALF_DH
    // row = (screenY/HALF_DH - screenX/HALF_DW) / 2
    // col = (screenY/HALF_DH + screenX/HALF_DW) / 2
    const dr = (ny / HALF_DH - nx / HALF_DW) / 2;
    const dc = (ny / HALF_DH + nx / HALF_DW) / 2;
    const len = Math.sqrt(dr * dr + dc * dc) || 1;
    return { dr: dr / len, dc: dc / len };
}

// --- Spawn projectile ---
function spawnProjectile() {
    const aim = getAimDirection();
    const tileDir = screenDirToTile(aim.nx, aim.ny);

    // Compute angle from velocity for fireball rotation
    const screenVx = tileDir.dc - tileDir.dr; // screen X direction
    const screenVy = (tileDir.dc + tileDir.dr) * 0.5; // screen Y direction
    const baseAngle = Math.atan2(screenVy, screenVx);

    const shotCount = 1 + getUpgrade('multishot');
    const spreadAngle = shotCount > 1 ? 0.15 : 0; // radians spread per extra shot

    for (let i = 0; i < shotCount; i++) {
        let angle = baseAngle;
        if (shotCount > 1) {
            const offset = (i - (shotCount - 1) / 2) * spreadAngle;
            angle = baseAngle + offset;
        }
        // Convert screen-space angle back to tile-space velocity
        const screenNx = Math.cos(angle);
        const screenNy = Math.sin(angle);
        const td = screenDirToTile(screenNx, screenNy);

        const sizeBonus = getUpgrade('bigshot');
        const projSize = ATK_PROJ_SIZE + sizeBonus * 3;

        projectiles.push({
            row: player.row, col: player.col,
            vr: td.dr * ATK_SPEED, vc: td.dc * ATK_SPEED,
            life: ATK_PROJ_LIFE,
            trail: [], hit: false,
            size: projSize,
            animTime: 0,
            angle: angle,
            pierceLeft: getUpgrade('pierce'),
            bounceLeft: getUpgrade('bounce'),
            canExplode: getUpgrade('explode') > 0,
            explodeScale: getUpgrade('explode'),
            hitEnemies: new Set(),
        });
        FormSystem.formData.wizard.spellsCast++;
    }
}

// Register wizard form handler (now that updatePlayer is defined)
formHandlers.wizard.update = function(dt) {
    updatePlayer(dt);
    // Check wizard→lich evolution
    const fd = FormSystem.formData.wizard;
    const req = EVOLUTION_REQUIREMENTS.wizard_to_lich;
    if (fd.totalKills >= req.kills &&
        FormSystem.talisman.level >= req.talismanLevel &&
        fd.spellsCast >= req.spellsCast) {
        triggerEvolution('lich');
    }
};

// ============================================================
//  GHOST AFTERIMAGES (phase jump trail)
// ============================================================
function updateGhosts(dt) {
    for (let i = ghosts.length - 1; i >= 0; i--) {
        ghosts[i].life -= dt;
        ghosts[i].alpha *= 0.92; // exponential fade
        if (ghosts[i].life <= 0 || ghosts[i].alpha < 0.01) {
            ghosts.splice(i, 1);
        }
    }
}

function drawGhost(g) {
    const sheet = g.state === 'walk' ? images.wiz_walk : images.wiz_idle;
    if (!sheet) return;

    const frameCount = g.state === 'walk' ? 8 : 6;
    const frame = Math.floor(g.animFrame) % frameCount;
    const pos = tileToScreen(g.row, g.col);
    const sx = pos.x + cameraX;
    const sy = pos.y + cameraY;
    const dw = WIZARD_FRAME_W * WIZARD_SCALE;
    const dh = WIZARD_FRAME_H * WIZARD_SCALE;
    const drawY = sy - dh * 0.75;

    ctx.save();
    ctx.globalAlpha = g.alpha;
    // Arcane blue-purple tint
    try { ctx.filter = 'hue-rotate(200deg) saturate(2.5) brightness(1.8)'; } catch(e) {}

    if (g.facing === -1) {
        ctx.translate(sx, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(sheet,
            frame * WIZARD_FRAME_W, 0, WIZARD_FRAME_W, WIZARD_FRAME_H,
            -dw / 2, drawY, dw, dh);
    } else {
        ctx.drawImage(sheet,
            frame * WIZARD_FRAME_W, 0, WIZARD_FRAME_W, WIZARD_FRAME_H,
            sx - dw / 2, drawY, dw, dh);
    }
    ctx.restore();
}

// ============================================================
//  PROJECTILE SYSTEM
// ============================================================
function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.life -= dt;

        if (p.hit) {
            // Impact explosion — just decay
            p.life -= dt * 3; // faster death after impact
            if (p.life <= 0) { recycleProj(projectiles.splice(i, 1)[0]); }
            continue;
        }

        // Move projectile
        const newRow = p.row + p.vr * dt;
        const newCol = p.col + p.vc * dt;

        // Save trail points
        p.trail.push({ row: p.row, col: p.col, age: 0 });
        if (p.trail.length > 10) p.trail.shift();

        // Check wall collision
        if (!canMoveTo(newRow, newCol)) {
            // Handle bounce
            if (p.bounceLeft > 0) {
                p.bounceLeft--;
                // Reflect velocity: try bouncing off either row or col axis
                const rowOk = canMoveTo(newRow, p.col);
                const colOk = canMoveTo(p.row, newCol);
                if (rowOk && colOk) {
                    // Both available, bounce off the axis we hit
                    const rowDist = Math.abs(newRow - p.row);
                    const colDist = Math.abs(newCol - p.col);
                    if (rowDist > colDist) {
                        p.vr = -p.vr;
                        p.row = newRow;
                    } else {
                        p.vc = -p.vc;
                        p.col = newCol;
                    }
                } else if (rowOk) {
                    p.vr = -p.vr;
                    p.row = newRow;
                } else if (colOk) {
                    p.vc = -p.vc;
                    p.col = newCol;
                } else {
                    // Stuck, die
                    p.hit = true;
                    p.life = 0.3;
                }
            } else {
                p.hit = true;
                p.life = 0.3; // linger for impact effect
            }
            continue;
        }

        p.row = newRow;
        p.col = newCol;

        // Tick fireball animation
        p.animTime += dt;

        // Age trail points
        for (const t of p.trail) t.age += dt;

        // Remove if expired or out of map
        const mapBound = floorMap.length;
        if (p.life <= 0 || p.row < -1 || p.row > mapBound + 1 || p.col < -1 || p.col > mapBound + 1) {
            recycleProj(projectiles.splice(i, 1)[0]);
        }
    }
}

function drawProjectiles() {
    for (const p of projectiles) {
        const pos = tileToScreen(p.row, p.col);
        const px = pos.x + cameraX;
        const py = pos.y + cameraY;

        if (p.hit) {
            drawImpact(px, py, p);
            continue;
        }

        // Ground shadow for projectile
        ctx.save();
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(px, py + 8, 8, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // === ACID PROJECTILE (slime — red spit) ===
        if (p.isAcid) {
            // Acid pool glow on ground
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            const acidR = 40;
            const acidGlow = ctx.createRadialGradient(px, py + 6, 0, px, py + 6, acidR);
            acidGlow.addColorStop(0, 'rgba(220, 80, 80, 0.4)');
            acidGlow.addColorStop(0.5, 'rgba(180, 50, 50, 0.2)');
            acidGlow.addColorStop(1, 'rgba(100, 30, 30, 0)');
            ctx.fillStyle = acidGlow;
            ctx.beginPath();
            ctx.ellipse(px, py + 6, acidR, acidR * 0.45, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Acid blob (red slimy)
            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 0.75;
            ctx.fillStyle = 'rgba(220, 70, 70, 0.8)';
            ctx.beginPath();
            ctx.arc(px, py, p.size, 0, Math.PI * 2);
            ctx.fill();
            // Shiny spot
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = '#ffcccc';
            ctx.beginPath();
            ctx.arc(px - p.size * 0.3, py - p.size * 0.3, p.size * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            continue;
        }

        // === BONE PROJECTILE (skeleton) ===
        if (p.isBone) {
            // Bone shard glow on ground
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            const boneR = 30;
            const boneGlow = ctx.createRadialGradient(px, py + 6, 0, px, py + 6, boneR);
            boneGlow.addColorStop(0, 'rgba(230, 220, 180, 0.3)');
            boneGlow.addColorStop(0.5, 'rgba(180, 170, 140, 0.12)');
            boneGlow.addColorStop(1, 'rgba(100, 90, 70, 0)');
            ctx.fillStyle = boneGlow;
            ctx.beginPath();
            ctx.ellipse(px, py + 6, boneR, boneR * 0.45, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Bone shard (ivory jagged shape)
            ctx.save();
            ctx.globalAlpha = 0.85;
            const bAngle = Math.atan2(p.vy, p.vx);
            ctx.translate(px, py);
            ctx.rotate(bAngle);
            ctx.fillStyle = '#e8e0c8';
            ctx.beginPath();
            ctx.moveTo(-p.size * 1.2, 0);
            ctx.lineTo(-p.size * 0.4, -p.size * 0.5);
            ctx.lineTo(p.size * 1.2, 0);
            ctx.lineTo(-p.size * 0.4, p.size * 0.5);
            ctx.closePath();
            ctx.fill();
            // Highlight edge
            ctx.strokeStyle = 'rgba(255,255,240,0.6)';
            ctx.lineWidth = 0.8;
            ctx.stroke();
            ctx.restore();
            continue;
        }

        // === DARK PROJECTILE (lich) ===
        if (p.isDark) {
            // Soul energy pool glow on ground
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            const darkR = 35;
            const darkGlow = ctx.createRadialGradient(px, py + 6, 0, px, py + 6, darkR);
            darkGlow.addColorStop(0, 'rgba(180, 60, 255, 0.35)');
            darkGlow.addColorStop(0.5, 'rgba(120, 40, 200, 0.15)');
            darkGlow.addColorStop(1, 'rgba(60, 20, 100, 0)');
            ctx.fillStyle = darkGlow;
            ctx.beginPath();
            ctx.ellipse(px, py + 6, darkR, darkR * 0.45, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Soul bolt (dark purple sphere with glow)
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = 'rgba(150, 60, 220, 0.9)';
            ctx.beginPath();
            ctx.arc(px, py, p.size, 0, Math.PI * 2);
            ctx.fill();
            // Dark inner core
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = 'rgba(80, 20, 140, 0.8)';
            ctx.beginPath();
            ctx.arc(px, py, p.size * 0.6, 0, Math.PI * 2);
            ctx.fill();
            // Magical sparkle spot
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = '#dd88ff';
            ctx.beginPath();
            ctx.arc(px - p.size * 0.35, py - p.size * 0.35, p.size * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            continue;
        }

        // --- Ground fire light pool ---
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const groundR = 45;
        const flicker = 0.9 + Math.sin(p.animTime * 18) * 0.1;
        const groundGrad = ctx.createRadialGradient(px, py + 6, 0, px, py + 6, groundR);
        groundGrad.addColorStop(0, `rgba(255, 160, 40, ${0.35 * flicker})`);
        groundGrad.addColorStop(0.4, `rgba(255, 80, 20, ${0.15 * flicker})`);
        groundGrad.addColorStop(1, 'rgba(120, 30, 0, 0)');
        ctx.fillStyle = groundGrad;
        ctx.beginPath();
        ctx.ellipse(px, py + 6, groundR, groundR * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- Fire trail with color/scale interpolation ---
        ctx.save();
        for (let i = 0; i < p.trail.length; i++) {
            const t = p.trail[i];
            const tp = tileToScreen(t.row, t.col);
            const tx = tp.x + cameraX;
            const ty = tp.y + cameraY;
            const frac = i / p.trail.length; // 0=oldest, 1=newest
            const ageFade = Math.max(0, 1 - t.age * 3); // fade by actual age

            // Outer glow: orange→red as it ages
            ctx.globalCompositeOperation = 'screen';
            const r = Math.round(255 - (1-frac) * 80);
            const g = Math.round(120 * frac + 30);
            const b = Math.round(20 * frac);
            ctx.globalAlpha = frac * 0.4 * ageFade;
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.beginPath();
            ctx.arc(tx, ty, p.size * frac * 1.6, 0, Math.PI * 2);
            ctx.fill();

            // Inner yellow-white hot center — shrinks with age
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = frac * 0.75 * ageFade;
            ctx.fillStyle = `rgba(255, 230, 120, ${frac * 0.7})`;
            ctx.beginPath();
            ctx.arc(tx, ty, p.size * frac * 0.5 * (0.5 + ageFade * 0.5), 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();

        // --- Outer fire bloom ---
        ctx.save();
        const bloom = ctx.createRadialGradient(px, py, 0, px, py, p.size * 4.5);
        bloom.addColorStop(0, `rgba(255, 200, 60, ${0.7 * flicker})`);
        bloom.addColorStop(0.2, `rgba(255, 120, 30, ${0.4 * flicker})`);
        bloom.addColorStop(0.5, `rgba(200, 50, 10, ${0.15 * flicker})`);
        bloom.addColorStop(1, 'rgba(100, 20, 0, 0)');
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = bloom;
        ctx.fillRect(px - p.size * 4.5, py - p.size * 4.5, p.size * 9, p.size * 9);
        ctx.restore();

        // --- Fireball sprite ---
        const fbImg = images.fireball;
        if (fbImg) {
            const frame = Math.floor(p.animTime * 14) % FIREBALL_FRAMES;
            const fbScale = 0.55; // scale the 100x100 sprite down
            const dw = FIREBALL_FRAME_W * fbScale;
            const dh = FIREBALL_FRAME_H * fbScale;

            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(p.angle);
            ctx.globalCompositeOperation = 'screen';
            ctx.drawImage(fbImg,
                frame * FIREBALL_FRAME_W, 0, FIREBALL_FRAME_W, FIREBALL_FRAME_H,
                -dw / 2, -dh / 2, dw, dh);
            // Draw again brighter for intensity
            ctx.globalAlpha = 0.5;
            ctx.drawImage(fbImg,
                frame * FIREBALL_FRAME_W, 0, FIREBALL_FRAME_W, FIREBALL_FRAME_H,
                -dw / 2, -dh / 2, dw, dh);
            ctx.restore();
        }

        // --- White-yellow hot core ---
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#fff8e0';
        ctx.globalAlpha = 0.85;
        ctx.beginPath();
        ctx.arc(px, py, p.size * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- Orbiting embers ---
        ctx.save();
        for (let s = 0; s < 5; s++) {
            const ang = (s / 5) * Math.PI * 2 + p.animTime * 10;
            const dist = p.size * 1.0 + Math.sin(p.animTime * 16 + s) * 3;
            ctx.globalAlpha = 0.6 + Math.sin(p.animTime * 12 + s * 2) * 0.4;
            ctx.fillStyle = s % 2 === 0 ? '#ffaa30' : '#ff6600';
            ctx.beginPath();
            ctx.arc(px + Math.cos(ang) * dist, py + Math.sin(ang) * dist, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

function drawImpact(px, py, p) {
    const frac = Math.max(0, p.life / 0.3);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    // Ground fire flash
    const groundR = 60;
    const gndGrad = ctx.createRadialGradient(px, py + 4, 0, px, py + 4, groundR * frac);
    gndGrad.addColorStop(0, `rgba(255, 200, 60, ${0.5 * frac})`);
    gndGrad.addColorStop(0.4, `rgba(255, 100, 20, ${0.3 * frac})`);
    gndGrad.addColorStop(1, 'rgba(120, 30, 0, 0)');
    ctx.fillStyle = gndGrad;
    ctx.beginPath();
    ctx.ellipse(px, py + 4, groundR * frac, groundR * frac * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    // Fire burst
    const r = (1 - frac) * 45 + 10;
    const grad = ctx.createRadialGradient(px, py, 0, px, py, r);
    grad.addColorStop(0, `rgba(255, 240, 180, ${0.85 * frac})`);
    grad.addColorStop(0.25, `rgba(255, 160, 40, ${0.6 * frac})`);
    grad.addColorStop(0.5, `rgba(220, 60, 10, ${0.3 * frac})`);
    grad.addColorStop(1, 'rgba(100, 20, 0, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(px - r, py - r, r * 2, r * 2);

    // Expanding fire ring
    ctx.strokeStyle = `rgba(255, 140, 30, ${0.5 * frac})`;
    ctx.lineWidth = 2.5 * frac;
    ctx.beginPath();
    ctx.arc(px, py, r * 0.7, 0, Math.PI * 2);
    ctx.stroke();

    // Ember scatter
    for (let i = 0; i < 10; i++) {
        const ang = (i / 10) * Math.PI * 2 + (p.life || 0) * 8;
        const dist = (1 - frac) * 30 + 5;
        ctx.globalAlpha = frac * 0.8;
        ctx.fillStyle = i % 3 === 0 ? '#ffe080' : (i % 3 === 1 ? '#ff8030' : '#ff4400');
        ctx.beginPath();
        ctx.arc(px + Math.cos(ang) * dist, py + Math.sin(ang) * dist, 2.2 * frac, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

// ============================================================
//  ORBIT FIREBALLS (Arcane Orbit upgrade)
// ============================================================
function updateOrbitFireballs(dt) {
    const count = getUpgrade('orbit');
    if (count <= 0) return;
    if (gamePaused || gameDead) return;
    orbitAngle += dt * 3.0; // rotation speed
    // Check collision with enemies
    for (let i = 0; i < count; i++) {
        const a = orbitAngle + (i / count) * Math.PI * 2;
        const orbRow = player.row + Math.cos(a) * 1.8;
        const orbCol = player.col + Math.sin(a) * 1.8;
        for (const e of enemies) {
            if (e.state === 'death' || e.orbitHitCooldown > 0) continue;
            const dr = orbRow - e.row;
            const dc = orbCol - e.col;
            if (Math.sqrt(dr*dr + dc*dc) < e.def.hitboxR + 0.3) {
                e.hp -= 12;
                e.orbitHitCooldown = 0.5; // prevent rapid re-hits
                sfxOrbitHit();
                e.state = 'hurt'; e.hurtTimer = 0.15; e.animFrame = 0;
                if (e.hp <= 0) {
                    e.hp = 0; e.state = 'death'; e.deathTimer = 0.7; e.animFrame = 0;
                    sfxEnemyDeath();
                    rollEnemyLoot(e);
                }
            }
        }
    }
}

function drawOrbitFireballs() {
    const count = getUpgrade('orbit');
    if (count <= 0) return;
    for (let i = 0; i < count; i++) {
        const a = orbitAngle + (i / count) * Math.PI * 2;
        const orbRow = player.row + Math.cos(a) * 1.8;
        const orbCol = player.col + Math.sin(a) * 1.8;
        const pos = tileToScreen(orbRow, orbCol);
        const sx = pos.x + cameraX;
        const sy = pos.y + cameraY;

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        // Glow
        const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 14);
        g.addColorStop(0, 'rgba(255, 180, 40, 0.7)');
        g.addColorStop(0.5, 'rgba(255, 80, 10, 0.3)');
        g.addColorStop(1, 'rgba(100, 20, 0, 0)');
        ctx.fillStyle = g;
        ctx.fillRect(sx - 14, sy - 14, 28, 28);
        // Core
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#ffe080';
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.arc(sx, sy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// Generate dynamic wave data for waves beyond the fixed definitions
function generateDynamicWave(waveIdx) {
    const tier = waveIdx - WAVES.length + 1; // 1, 2, 3... for each wave past the defined set
    const baseMult = 1.6 + tier * 0.25;
    // Shift composition toward archers in later waves
    const slimePct = Math.max(0.15, 0.4 - tier * 0.05);
    const archPct = Math.min(0.45, 0.2 + tier * 0.05);
    const skelPct = 1 - slimePct - archPct;
    const totalCount = Math.min(30, 12 + tier * 3);
    const slimeCount = Math.round(totalCount * slimePct);
    const skelCount = Math.round(totalCount * skelPct);
    const archCount = totalCount - slimeCount - skelCount;
    const titles = ['The Darkness Deepens', 'Bones Rattle', 'Death Approaches', 'No Mercy', 'Endless Night'];
    return {
        enemies: [
            { type: 'slime', count: slimeCount },
            { type: 'skeleton', count: skelCount },
            { type: 'skelarch', count: archCount },
        ],
        statMult: baseMult * DIFFICULTY.scale,
        title: titles[tier % titles.length],
    };
}

function beginNextWave() {

    const waveArray = currentZone === 1 ? WAVES : currentZone === 2 ? ZONE2_WAVES : ZONE3_WAVES;
    if (wave.current < waveArray.length) {
        w = waveArray[wave.current];
    } else {
        w = generateDynamicWave(wave.current);
    }
    wave.phase = 'countdown';
    wave.timer = 4.0;

    const STIR_MESSAGES = currentZone === 1

            { text: 'Shadows Converge',         sub: 'The tower descends upon you.' },
            { text: 'The Spire Trembles',       sub: 'Reinforcements surge forth.' },
            { text: 'Spirits Manifest',         sub: 'The tower demands sacrifice.' },
        ];

    const msg = STIR_MESSAGES[Math.min(wave.current, STIR_MESSAGES.length - 1)];

    const combatTrack = musicArray[Math.min(wave.current, musicArray.length - 1)];
