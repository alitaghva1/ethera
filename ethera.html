function getLevelUpChoice(mx, my) {
    const choices = xpState.levelUpChoices;
    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const cardW = 170, cardH = 220, cardGap = 20;
    const totalW = choices.length * cardW + (choices.length - 1) * cardGap;
    const startX = cx - totalW / 2;

    for (let i = 0; i < choices.length; i++) {
        const cardX = startX + i * (cardW + cardGap);
        const cardY = cy - cardH / 2 + 20;
        if (mx >= cardX && mx <= cardX + cardW && my >= cardY && my <= cardY + cardH) {
            return i;
        }
    }
    return -1;
}

function drawUpgradeIcon(cx, cy, iconType, color, size) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    const s = size;

    switch(iconType) {
        case 'split':
            // Forking lines
            ctx.beginPath();
            ctx.moveTo(cx, cy + s); ctx.lineTo(cx, cy);
            ctx.lineTo(cx - s * 0.7, cy - s); ctx.moveTo(cx, cy);
            ctx.lineTo(cx + s * 0.7, cy - s);
            ctx.stroke();
            break;
        case 'pierce':
            // Arrow through circles
            ctx.beginPath();
            ctx.moveTo(cx - s, cy); ctx.lineTo(cx + s, cy);
            ctx.moveTo(cx + s * 0.5, cy - s * 0.4); ctx.lineTo(cx + s, cy); ctx.lineTo(cx + s * 0.5, cy + s * 0.4);
            ctx.stroke();
            ctx.globalAlpha = 0.4;
            ctx.beginPath(); ctx.arc(cx - s * 0.3, cy, 4, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx + s * 0.3, cy, 4, 0, Math.PI * 2); ctx.stroke();
            break;
        case 'explode':
            // Starburst
            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                const r = i % 2 === 0 ? s : s * 0.5;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
                ctx.stroke();
            }
            break;
        case 'speed':
            // Lightning bolt
            ctx.beginPath();
            ctx.moveTo(cx - s * 0.3, cy - s); ctx.lineTo(cx + s * 0.1, cy - s * 0.1);
            ctx.lineTo(cx - s * 0.1, cy + s * 0.1); ctx.lineTo(cx + s * 0.3, cy + s);
            ctx.stroke();
            break;
        case 'big':
            // Large circle with radiating lines
            ctx.beginPath(); ctx.arc(cx, cy, s * 0.5, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 0.4;
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(a) * s * 0.6, cy + Math.sin(a) * s * 0.6);
                ctx.lineTo(cx + Math.cos(a) * s, cy + Math.sin(a) * s);
                ctx.stroke();
            }
            break;
        case 'bounce':
            // Zigzag line
            ctx.beginPath();
            ctx.moveTo(cx - s, cy + s * 0.5);
            ctx.lineTo(cx - s * 0.3, cy - s * 0.5);
            ctx.lineTo(cx + s * 0.3, cy + s * 0.5);
            ctx.lineTo(cx + s, cy - s * 0.5);
            ctx.stroke();
            break;
        case 'orbit':
            // Circle with orbiting dot
            ctx.globalAlpha = 0.4;
            ctx.beginPath(); ctx.arc(cx, cy, s * 0.7, 0, Math.PI * 2); ctx.stroke();
            ctx.globalAlpha = 1;
            const oa = performance.now() / 500;
            ctx.beginPath(); ctx.arc(cx + Math.cos(oa) * s * 0.7, cy + Math.sin(oa) * s * 0.7, 3, 0, Math.PI * 2); ctx.fill();
            break;
        case 'thorns':
            // Spikes outward
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(a) * s * 0.25, cy + Math.sin(a) * s * 0.25);
                ctx.lineTo(cx + Math.cos(a) * s, cy + Math.sin(a) * s);
                ctx.stroke();
            }
            break;
        case 'regen':
            // Plus/cross (health)
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx, cy - s * 0.7); ctx.lineTo(cx, cy + s * 0.7);
            ctx.moveTo(cx - s * 0.7, cy); ctx.lineTo(cx + s * 0.7, cy);
            ctx.stroke();
            break;
        case 'mana':
            // Diamond (mana crystal)
            ctx.beginPath();
            ctx.moveTo(cx, cy - s); ctx.lineTo(cx + s * 0.6, cy);
            ctx.lineTo(cx, cy + s); ctx.lineTo(cx - s * 0.6, cy); ctx.closePath();
            ctx.fill();
            break;
        case 'phase':
            // Dashed circle (phase/teleport)
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.arc(cx, cy, s * 0.7, 0, Math.PI * 2); ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();
            break;
        case 'tower':
            // Small obelisk
            ctx.beginPath();
            ctx.moveTo(cx - s * 0.2, cy + s); ctx.lineTo(cx - s * 0.35, cy - s * 0.3);
            ctx.lineTo(cx, cy - s); ctx.lineTo(cx + s * 0.35, cy - s * 0.3);
            ctx.lineTo(cx + s * 0.2, cy + s); ctx.closePath();
            ctx.fill();
            break;
        case 'chain':
            // Chain links
            ctx.beginPath(); ctx.ellipse(cx - s * 0.3, cy, s * 0.35, s * 0.5, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(cx + s * 0.3, cy, s * 0.35, s * 0.5, 0, 0, Math.PI * 2); ctx.stroke();
            break;
        case 'slow':
            // Snowflake-ish
            for (let i = 0; i < 3; i++) {
                const a = (i / 3) * Math.PI;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(a) * s, cy + Math.sin(a) * s);
                ctx.lineTo(cx - Math.cos(a) * s, cy - Math.sin(a) * s);
                ctx.stroke();
            }
            break;
    }
    ctx.restore();
}

function drawLevelUpScreen() {
    const choices = xpState.levelUpChoices;
    if (choices.length === 0) return;

    const fade = xpState.levelUpFadeIn;
    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const t = performance.now() / 1000;

    ctx.save();

    // Dim overlay
    ctx.globalAlpha = fade * 0.6;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvasW, canvasH);

    // Golden vignette
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = fade * 0.1;
    const vig = ctx.createRadialGradient(cx, cy, 0, cx, cy, canvasH * 0.5);
    vig.addColorStop(0, 'rgba(200, 160, 40, 0.3)');
    vig.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.globalCompositeOperation = 'source-over';

    // "LEVEL UP" title
    ctx.globalAlpha = fade;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '36px Georgia';
    ctx.shadowColor = 'rgba(200, 160, 40, 0.5)';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#e8c840';
    ctx.fillText('LEVEL UP', cx, cy - 140);
    ctx.shadowBlur = 0;

    // Level number
    ctx.font = '14px monospace';
    ctx.fillStyle = '#a89060';
    ctx.globalAlpha = fade * 0.6;
    ctx.fillText(`Level ${xpState.level}  —  Choose an upgrade`, cx, cy - 108);

    // Draw upgrade cards
    const cardW = 170, cardH = 220, cardGap = 20;
    const totalW = choices.length * cardW + (choices.length - 1) * cardGap;
    const startX = cx - totalW / 2;

    // Update hover
    xpState.levelUpHover = getLevelUpChoice(mouse.x, mouse.y);

    for (let i = 0; i < choices.length; i++) {
        const u = choices[i];
        const cardX = startX + i * (cardW + cardGap);
        const cardY = cy - cardH / 2 + 20;
        const hovered = xpState.levelUpHover === i;
        const stacks = upgrades[u.id] || 0;

        // Card float animation
        const floatY = Math.sin(t * 2 + i * 1.5) * 3;
        const cy2 = cardY + floatY;

        ctx.globalAlpha = fade;

        // Card background
        ctx.fillStyle = hovered ? '#14100a' : '#0c0906';
        ctx.globalAlpha = fade * (hovered ? 0.95 : 0.88);
        ctx.beginPath();
        ctx.roundRect(cardX, cy2, cardW, cardH, 6);
        ctx.fill();

        // Card border
        const catColor = u.category === 'wand' ? '#dd8833' : (u.category === 'passive' ? '#44bb88' : '#8866cc');
        ctx.strokeStyle = hovered ? catColor : 'rgba(140, 120, 80, 0.3)';
        ctx.lineWidth = hovered ? 2 : 1;
        ctx.globalAlpha = fade * (hovered ? 0.8 : 0.4);
        ctx.beginPath();
        ctx.roundRect(cardX, cy2, cardW, cardH, 6);
        ctx.stroke();

        // Hover glow
        if (hovered) {
            ctx.globalCompositeOperation = 'screen';
            ctx.globalAlpha = fade * 0.08;
            const hg = ctx.createRadialGradient(cardX + cardW/2, cy2 + cardH/2, 0, cardX + cardW/2, cy2 + cardH/2, cardW * 0.7);
            hg.addColorStop(0, catColor);
            hg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = hg;
            ctx.fillRect(cardX - 20, cy2 - 20, cardW + 40, cardH + 40);
            ctx.globalCompositeOperation = 'source-over';
        }

        // Category tag
        ctx.globalAlpha = fade * 0.5;
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = catColor;
        ctx.fillText(u.category.toUpperCase(), cardX + cardW / 2, cy2 + 18);

        // Icon
        ctx.globalAlpha = fade;
        drawUpgradeIcon(cardX + cardW / 2, cy2 + 65, u.icon, catColor, 16);

        // Name
        ctx.font = '14px Georgia';
        ctx.fillStyle = hovered ? '#e8d8b0' : '#c4a878';
        ctx.globalAlpha = fade;
        ctx.fillText(u.name, cardX + cardW / 2, cy2 + 110);

        // Description (word-wrap)
        ctx.font = '10px Georgia';
        ctx.fillStyle = '#9a8a6a';
        ctx.globalAlpha = fade * 0.8;
        const words = u.desc.split(' ');
        let line = '';
        let lineY = cy2 + 132;
        for (const w of words) {
            const test = line + (line ? ' ' : '') + w;
            if (ctx.measureText(test).width > cardW - 24) {
                ctx.fillText(line, cardX + cardW / 2, lineY);
                line = w;
                lineY += 14;
            } else {
                line = test;
            }
        }
        if (line) ctx.fillText(line, cardX + cardW / 2, lineY);

        // Stack count
        if (stacks > 0) {
            ctx.globalAlpha = fade * 0.6;
            ctx.font = '9px monospace';
            ctx.fillStyle = catColor;
            ctx.fillText(`${stacks}/${u.maxStack}`, cardX + cardW / 2, cy2 + cardH - 16);
        } else {
            ctx.globalAlpha = fade * 0.3;
            ctx.font = '9px monospace';
            ctx.fillStyle = '#666';
            ctx.fillText('NEW', cardX + cardW / 2, cy2 + cardH - 16);
        }
    }

    ctx.restore();
}

//  UI PANEL RENDERING
// ============================================================
function drawPanel9Slice(img, x, y, w, h, border, scale) {
    if (!img) return;
    const s = border;           // source border size
    const d = border * scale;   // dest border size
    const sw = img.width;       // source width
    const sh = img.height;      // source height
    const si = sw - s * 2;      // source inner width
    const sih = sh - s * 2;    // source inner height
    const di = w - d * 2;       // dest inner width
    const dih = h - d * 2;     // dest inner height

    ctx.imageSmoothingEnabled = false;

    // Corners
    ctx.drawImage(img, 0, 0, s, s, x, y, d, d);                           // TL
    ctx.drawImage(img, sw - s, 0, s, s, x + w - d, y, d, d);              // TR
    ctx.drawImage(img, 0, sh - s, s, s, x, y + h - d, d, d);              // BL
    ctx.drawImage(img, sw - s, sh - s, s, s, x + w - d, y + h - d, d, d); // BR

    // Edges
    ctx.drawImage(img, s, 0, si, s, x + d, y, di, d);                     // Top
    ctx.drawImage(img, s, sh - s, si, s, x + d, y + h - d, di, d);        // Bottom
    ctx.drawImage(img, 0, s, s, sih, x, y + d, d, dih);                   // Left
    ctx.drawImage(img, sw - s, s, s, sih, x + w - d, y + d, d, dih);      // Right

    // Center
    ctx.drawImage(img, s, s, si, sih, x + d, y + d, di, dih);

    ctx.imageSmoothingEnabled = true;
}

// ============================================================
//  HP & MANA BARS
// ============================================================
function drawHPMana() {
    if (gamePhase !== 'playing') return;

    const barW = 180;
    const barH = 12;
    const gap = 5;
    const x = 28;
    const yHP = canvasH - 84;
    const yMana = yHP + barH + gap;
    const yXP = yMana + barH + gap;

    ctx.save();

    // --- Dark HUD backing panel (procedural) ---
    {
        const panelX = x - 14;
        const panelY = yHP - 18;
        const panelW = barW + 36;
        const panelH = (yXP + barH) - yHP + 26;

        // Shadow underneath
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#000';
        ctx.fillRect(panelX - 2, panelY - 2, panelW + 4, panelH + 4);

        // Dark gradient fill
        ctx.globalAlpha = 0.88;
        const hudBg = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
        hudBg.addColorStop(0, '#1a1510');
        hudBg.addColorStop(1, '#0e0a06');
        ctx.fillStyle = hudBg;
        ctx.beginPath();
        ctx.roundRect(panelX, panelY, panelW, panelH, 4);
        ctx.fill();

        // Gold border
        ctx.globalAlpha = 0.35;
        ctx.strokeStyle = '#8a7030';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(panelX, panelY, panelW, panelH, 4);
        ctx.stroke();
        ctx.globalAlpha = 1.0;
    }

    // --- HP Bar ---
    const totalMaxHP = MAX_HP + (equipBonus.maxHpBonus || 0) + getTalismanBonus().hpBonus;
    const hpFrac = Math.max(0, player.hp / totalMaxHP);

    // Dark track
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#0a0404';
    ctx.beginPath();
    ctx.roundRect(x, yHP, barW, barH, 3);
    ctx.fill();

    // HP gradient fill
    if (hpFrac > 0) {
        ctx.globalAlpha = 0.9;
        const hpGrad = ctx.createLinearGradient(x, yHP, x, yHP + barH);
        hpGrad.addColorStop(0, '#ee5544');
        hpGrad.addColorStop(0.5, '#cc2222');
        hpGrad.addColorStop(1, '#aa1818');
        ctx.fillStyle = hpGrad;
        ctx.beginPath();
        ctx.roundRect(x, yHP, Math.max(2, barW * hpFrac), barH, 3);
        ctx.fill();
        // Highlight stripe
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#fff';
        ctx.fillRect(x + 1, yHP + 1, Math.max(1, barW * hpFrac - 2), 2);
    }

    // HP border
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#8a7040';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(x, yHP, barW, barH, 3);
    ctx.stroke();

    // HP label
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#ffcccc';
    ctx.font = '9px monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText(`HP ${Math.ceil(player.hp)}/${totalMaxHP}`, x + 4, yHP + barH / 2 + 1);

    // --- Mana Bar ---
    const lockedMana = summons.reduce((sum, s) => sum + s.manaLocked, 0);
    const totalMaxMana = MAX_MANA + (equipBonus.maxManaBonus || 0);
    const manaFrac = Math.max(0, player.mana / totalMaxMana);
    const lockedFrac = lockedMana / totalMaxMana;

    // Dark track
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#04040a';
    ctx.beginPath();
    ctx.roundRect(x, yMana, barW, barH, 3);
    ctx.fill();

    // Locked mana region
    if (lockedFrac > 0) {
        ctx.globalAlpha = 0.6;
        const lockX = x + barW * (1 - lockedFrac);
        ctx.fillStyle = '#2a1540';
        ctx.beginPath();
        ctx.roundRect(lockX, yMana, barW * lockedFrac, barH, 3);
        ctx.fill();
        const lockPulse = 0.15 + Math.sin(performance.now() / 400) * 0.1;
        ctx.globalAlpha = lockPulse;
        ctx.fillStyle = '#6633aa';
        ctx.beginPath();
        ctx.roundRect(lockX, yMana, barW * lockedFrac, barH, 3);
        ctx.fill();
    }

    // Mana gradient fill
    if (manaFrac > 0) {
        ctx.globalAlpha = 0.9;
        const manaGrad = ctx.createLinearGradient(x, yMana, x, yMana + barH);
        manaGrad.addColorStop(0, '#4488ee');
        manaGrad.addColorStop(0.5, '#2244cc');
        manaGrad.addColorStop(1, '#1a33aa');
        ctx.fillStyle = manaGrad;
        ctx.beginPath();
        ctx.roundRect(x, yMana, Math.max(2, barW * manaFrac), barH, 3);
        ctx.fill();
        // Highlight stripe
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#fff';
        ctx.fillRect(x + 1, yMana + 1, Math.max(1, barW * manaFrac - 2), 2);
    }

    // Mana border
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#8a7040';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(x, yMana, barW, barH, 3);
    ctx.stroke();

    // Mana label
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#aabbff';
    ctx.font = '9px monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText(`MP ${Math.ceil(player.mana)}/${totalMaxMana}`, x + 4, yMana + barH / 2 + 1);

    // --- XP Bar ---
    const xpFrac = xpState.xpToNext > 0 ? xpState.xp / xpState.xpToNext : 0;

    // Dark track
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#0a0804';
    ctx.beginPath();
    ctx.roundRect(x, yXP, barW, barH, 3);
    ctx.fill();

    // XP gradient fill
    if (xpFrac > 0) {
        ctx.globalAlpha = 0.7;
        const xpGrad = ctx.createLinearGradient(x, yXP, x, yXP + barH);
        xpGrad.addColorStop(0, '#ddb040');
        xpGrad.addColorStop(0.5, '#c49030');
        xpGrad.addColorStop(1, '#a07020');
        ctx.fillStyle = xpGrad;
        ctx.beginPath();
        ctx.roundRect(x, yXP, Math.max(2, barW * xpFrac), barH, 3);
        ctx.fill();
        // Highlight stripe
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#fff';
        ctx.fillRect(x + 1, yXP + 1, Math.max(1, barW * xpFrac - 2), 2);
    }

    // XP border
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#8a7040';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(x, yXP, barW, barH, 3);
    ctx.stroke();

    // XP label
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = '#ddcc88';
    ctx.font = '9px monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText(`Lv${xpState.level}  ${xpState.xp}/${xpState.xpToNext}`, x + 4, yXP + barH / 2 + 1);

    // --- Active Upgrade Icons ---
    const CAT_COLORS = { wand: '#e8a040', passive: '#60cc80', tower: '#80aaee' };
    const hudHandler = FormSystem.getHandler();
    const hudPool = (hudHandler && hudHandler.getUpgradePool) ? hudHandler.getUpgradePool() : UPGRADE_POOL;
    const activeUps = hudPool.filter(u => (upgrades[u.id] || 0) > 0);
    if (activeUps.length > 0) {
        const iconSize = 7;
        const badgeR = 11;
        const gap = badgeR * 2 + 4;
        const startX = x + badgeR + 2;
        const iconY = yXP + barH + badgeR + 6;

        for (let i = 0; i < activeUps.length; i++) {
            const u = activeUps[i];
            const count = upgrades[u.id];
            const bx = startX + i * gap;
            const catColor = CAT_COLORS[u.category] || '#ccbb88';

            // Badge background circle
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = '#0a0806';
            ctx.beginPath();
            ctx.arc(bx, iconY, badgeR, 0, Math.PI * 2);
            ctx.fill();

            // Border ring — color by category
            ctx.globalAlpha = 0.5;
            ctx.strokeStyle = catColor;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(bx, iconY, badgeR, 0, Math.PI * 2);
            ctx.stroke();

            // Draw the icon
            ctx.globalAlpha = 0.75;
            drawUpgradeIcon(bx, iconY, u.icon, catColor, iconSize);

            // Stack count (bottom-right)
            if (count > 1) {
                ctx.globalAlpha = 0.9;
                ctx.font = 'bold 8px monospace';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(count, bx + badgeR * 0.6, iconY + badgeR * 0.55);
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            }
        }
    }

    // Ability hints (right side)
    const hintX = canvasW - 170;
    const hintY = canvasH - 104;
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.roundRect(hintX - 8, hintY - 6, 164, 94, 4); ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.font = '9px monospace';
    ctx.fillStyle = '#bbaa88';
    ctx.fillText('LMB  Fireball', hintX, hintY + 6);
    ctx.fillText('RMB  Summon Tower', hintX, hintY + 20);
    ctx.fillText('SPC  Phase Jump', hintX, hintY + 34);
    ctx.fillText('E    Interact', hintX, hintY + 48);
    ctx.fillText('I    Equipment', hintX, hintY + 62);
    ctx.fillText('TAB  Menu', hintX, hintY + 76);

    ctx.restore();
}

// Register wizard form HUD handler
formHandlers.wizard.drawHUD = function() { drawHPMana(); };

// ============================================================
//  CROSSHAIR
// ============================================================
function drawCrosshair() {
    if (gamePhase !== 'playing') return;

    const mx = mouse.x;
    const my = mouse.y;
    const r = 8;

    ctx.save();

    // Form-specific crosshair colors
    const form = FormSystem.currentForm;
    const crossColors = {
        slime:    { ring: '#ff4444', cross: '#ff6655', dot: '#ff8877', progress: '#ff3333' },
        skeleton: { ring: '#aabbcc', cross: '#ccddee', dot: '#eeeeff', progress: '#88aacc' },
        wizard:   { ring: '#887766', cross: '#bbaa88', dot: '#ddccaa', progress: '#ddaa44' },
        lich:     { ring: '#8844aa', cross: '#aa66cc', dot: '#cc88ee', progress: '#9955bb' }
    };
    const cc = crossColors[form] || crossColors.wizard;

    // Attack cooldown ring — fills as cooldown resets (form-aware)
    const formConfig = FORM_CONFIGS[form] || {};
    const formCooldown = formConfig.atkCooldown || ATK_COOLDOWN;
    const effAtkCooldown = form === 'wizard'
        ? (ATK_COOLDOWN / (1 + (equipBonus.atkSpeedMult || 0))) * Math.pow(0.85, getUpgrade('firerate'))
        : formCooldown;
    const cdFrac = player.attackCooldown > 0 ? 1 - (player.attackCooldown / effAtkCooldown) : 1;
    if (cdFrac < 1) {
        // Background ring (dim)
        ctx.globalAlpha = 0.15;
        ctx.strokeStyle = cc.ring;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(mx, my, r + 3, 0, Math.PI * 2);
        ctx.stroke();
        // Progress arc
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = cc.progress;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(mx, my, r + 3, -Math.PI / 2, -Math.PI / 2 + cdFrac * Math.PI * 2);
        ctx.stroke();
    }

    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = cc.cross;
    ctx.lineWidth = 1.5;

    // Small cross
    ctx.beginPath();
    ctx.moveTo(mx - r, my); ctx.lineTo(mx - 3, my);
    ctx.moveTo(mx + 3, my); ctx.lineTo(mx + r, my);
    ctx.moveTo(mx, my - r); ctx.lineTo(mx, my - 3);
    ctx.moveTo(mx, my + 3); ctx.lineTo(mx, my + r);
    ctx.stroke();

    // Tiny center dot
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = cc.dot;
    ctx.beginPath();
    ctx.arc(mx, my, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function updateParticles(dt) {
    for (const p of particles) {
        p.x += Math.cos(p.angle) * p.speed * dt;
        p.y += Math.sin(p.angle) * p.speed * dt + Math.sin(lightFlicker + p.drift) * 0.3;
        p.angle += (Math.random() - 0.5) * p.drift * dt;
        if (Math.abs(p.x) > 260) p.x *= -0.9;
        if (Math.abs(p.y) > 260) p.y *= -0.9;
    }
}

// ============================================================
//  PICKUP TEXT SYSTEM
// ============================================================
function updatePickupTexts(dt) {
    for (let i = pickupTexts.length - 1; i >= 0; i--) {
        const t = pickupTexts[i];
        t.life -= dt;
        t.offsetY -= 35 * dt;
        if (t.life <= 0) pickupTexts.splice(i, 1);
    }
}

function drawPickupTexts() {
    for (const t of pickupTexts) {
        const pos = tileToScreen(t.row, t.col);
        const sx = pos.x + cameraX;
        const sy = pos.y + cameraY + t.offsetY;
        const alpha = Math.min(1, t.life / 0.5);
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '11px Georgia';
        ctx.fillStyle = t.color;
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 4;
        ctx.fillText(t.text, sx, sy);
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// ============================================================
//  CAMERA (smooth lerp follow)
// ============================================================
function updateCamera(dt) {
    const LERP = 6;
    const LOOK_AHEAD = 18; // pixels of camera lead in movement direction

    const target = tileToScreen(player.row, player.col);
    // Camera leads slightly in the direction you're moving
    const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
    let leadX = 0, leadY = 0;
    if (speed > 0.5) {
        const screenVel = tileToScreen(player.vx, player.vy);
        const velLen = Math.sqrt(screenVel.x * screenVel.x + screenVel.y * screenVel.y);
        if (velLen > 0) {
            leadX = (screenVel.x / velLen) * LOOK_AHEAD;
            leadY = (screenVel.y / velLen) * LOOK_AHEAD;
        }
    }

    const tx = canvasW / 2 - target.x - leadX;
    const ty = canvasH / 2 - target.y - leadY;
    smoothCamX += (tx - smoothCamX) * LERP * dt;
    smoothCamY += (ty - smoothCamY) * LERP * dt;
    cameraX = Math.round(smoothCamX);
    cameraY = Math.round(smoothCamY);

    // Screen shake effect — decays intensity over time
    if (screenShakeTimer > 0) {
        screenShakeTimer -= dt;
        screenShakeIntensity *= Math.max(0, 1 - dt * 8); // smooth decay
        const shake = screenShakeIntensity;
        cameraX += Math.round((Math.random() - 0.5) * shake * 2);
        cameraY += Math.round((Math.random() - 0.5) * shake * 2);
        if (screenShakeTimer <= 0) screenShakeIntensity = 0;
    }
}

// ============================================================
//  GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
    let dt = Math.min((timestamp - lastTime) / 1000, 0.1);
    lastTime = timestamp;
    // Slow-mo effect for big moments
    if (slowMoTimer > 0) {
        slowMoTimer -= dt;
        dt *= slowMoScale;
        if (slowMoTimer <= 0) slowMoScale = 1.0;
    }
    lightFlicker += dt;
    updateMusic(dt);

    // Hit pause — freeze frame on impact
    if (hitPauseTimer > 0) {
        hitPauseTimer -= dt;
        render();
        if (gameDead) drawDeathScreen();
        requestAnimationFrame(gameLoop);
        return;
    }

    // ----- Pre-menu phase (just "click anywhere to begin") -----
    if (gamePhase === 'preMenu') {
        menuTime += dt;
        // Gentle fade-in of the prompt text
        preMenuAlpha = Math.min(1, preMenuAlpha + dt * 1.2);
        render();
        requestAnimationFrame(gameLoop);
        return;
    }

    // ----- Menu phase updates -----
    if (gamePhase === 'menu' || gamePhase === 'menuControls') {
        menuTime += dt;
        updateMenuEmbers(dt);
        // Fade in
        if (menuFadeAlpha < 1) menuFadeAlpha = Math.min(1, menuFadeAlpha + dt * 2.5);

        // Update hover state from mouse position
        menuHover = null;
        if (gamePhase === 'menu') {
            const btns = getMenuButtons();
            if (pointInButton(mouse.x, mouse.y, btns.start)) menuHover = 'start';
            else if (pointInButton(mouse.x, mouse.y, btns.loadGame) && !btns.loadGame.disabled) menuHover = 'loadGame';
            else if (pointInButton(mouse.x, mouse.y, btns.controls)) menuHover = 'controls';
        } else if (gamePhase === 'menuControls') {
            const backBtn = getControlsBackButton();
            if (pointInButton(mouse.x, mouse.y, backBtn)) menuHover = 'back';
        }

        // Update cursor style
        setPixelCursor(menuHover ? 'pointer' : 'default');
    }

    // ----- Name entry phase -----
    if (gamePhase === 'nameEntry') {
        menuTime += dt;
        setPixelCursor('default');
    }

    // ----- Load screen phase -----
    if (gamePhase === 'loadScreen') {
        menuTime += dt;
        updateMenuEmbers(dt);
        setPixelCursor(loadScreenHover >= 0 ? 'pointer' : 'default');
    }

    // ----- Menu fade-out transitions -----
    if (gamePhase === 'menuFade' || gamePhase === 'menuControlsFade') {
        menuTime += dt;
        updateMenuEmbers(dt);
        menuFadeAlpha = Math.max(0, menuFadeAlpha - dt * 3);
        setPixelCursor('default');
        if (menuFadeAlpha <= 0) {
            gamePhase = menuFadeTarget;
            if (menuFadeTarget === 'menuControls') {
                menuFadeAlpha = 0;
            } else if (menuFadeTarget === 'menu') {
                menuFadeAlpha = 0;
            } else if (menuFadeTarget === 'nameEntry') {
                nameEntryAlpha = 0;
                nameEntryBlink = 0;
                if (nameInputEl) { nameInputEl.value = ''; nameInputEl.focus(); }
            } else if (menuFadeTarget === 'loadScreen') {
                loadScreenAlpha = 0;
                loadSaveSlots(); // refresh slots
            } else if (menuFadeTarget === 'intro') {
                runIntro();
            }
        }
    }

    // ----- Cinematic "left for dead" sequence -----
    if (gamePhase === 'cinematic') {
        cinematicTimer += dt;
        const t = cinematicTimer;

        // === NARRATIVE TEXT — three-phase reveal ===
        // Each line is either fading IN or fading OUT, never both.

        // Lines 0-1: fade in until CINEMATIC_01_FADE_OUT, then fade out
        for (let i = 0; i < 2; i++) {
            if (t > CINEMATIC_01_FADE_OUT) {
                cinematicTextAlpha[i] = Math.max(0, cinematicTextAlpha[i] - dt * 2.0); // faster fade-out
            } else if (t >= CINEMATIC_LINE_TIMINGS[i]) {
                cinematicTextAlpha[i] = Math.min(1, cinematicTextAlpha[i] + dt * 1.2); // faster fade-in
            }
        }

        // Line 2 ("They left you for dead"): fade in until CINEMATIC_2_FADE_OUT, then fade out
        if (t > CINEMATIC_2_FADE_OUT) {
            cinematicTextAlpha[2] = Math.max(0, cinematicTextAlpha[2] - dt * 2.5); // much faster fade-out
        } else if (t >= CINEMATIC_LINE_TIMINGS[2]) {
            cinematicTextAlpha[2] = Math.min(1, cinematicTextAlpha[2] + dt * 1.2);
        }

        // Line 3 ("They were wrong"): fade in until CINEMATIC_TEXT_FADE_OUT, then fade out
        if (t > CINEMATIC_TEXT_FADE_OUT) {
            cinematicTextAlpha[3] = Math.max(0, cinematicTextAlpha[3] - dt * 1.2); // faster fade-out
        } else if (t >= CINEMATIC_LINE_TIMINGS[3]) {
            cinematicTextAlpha[3] = Math.min(1, cinematicTextAlpha[3] + dt * 0.6); // slightly faster fade-in
        }

        // === CINEMATIC SFX CUES ===
        // Heartbeat pulse at the very start
        if (t >= 0.1 && !cinematicSFX_heartbeat && sfxCtx) {
            cinematicSFX_heartbeat = true;
            sfxCinematicHeartbeat();
        }
        // Music duck during the dark/alone beat
        if (t >= CINEMATIC_2_FADE_OUT && !cinematicSFX_ducked) {
            cinematicSFX_ducked = true;
            duckMusic(true);
        }
        if (t >= CINEMATIC_LINE_TIMINGS[3] - 0.3 && !cinematicSFX_unducked) {
            cinematicSFX_unducked = true;
            duckMusic(false);
        }
        // Bone-crack stir sound when wizard first moves
        if (t >= CINEMATIC_RISE_START + 0.1 && !cinematicSFX_stir && sfxCtx) {
            cinematicSFX_stir = true;
            sfxCinematicStir();
        }
        // Resonant magical tone when wizard stands fully
        if (t >= CINEMATIC_RISE_START + CINEMATIC_RISE_DURATION * 0.7 && !cinematicSFX_stand && sfxCtx) {
            cinematicSFX_stand = true;
            sfxCinematicStand();
        }

        // === CAMERA PAN ===
        // Ease-out heavy curve: camera drifts fast at first, slows as it finds the wizard
        const panProgress = Math.min(1, t / CINEMATIC_PAN_DURATION);
        // Custom ease: fast start, very slow settle (cubic ease-out)
        const eased = 1 - Math.pow(1 - panProgress, 3);
        const targetRow = 4, targetCol = 3;
        const camRow = cinematicCamRow + (targetRow - cinematicCamRow) * eased;
        const camCol = cinematicCamCol + (targetCol - cinematicCamCol) * eased;
        const camPos = tileToScreen(camRow, camCol);
        smoothCamX = canvasW / 2 - camPos.x;
        smoothCamY = canvasH / 2 - camPos.y;
        cameraX = Math.round(smoothCamX);
        cameraY = Math.round(smoothCamY);

        // === LIGHT — atmospheric dim during pan ===
        if (t < CINEMATIC_LIGHT_SWELL_START) {
            // Start at ~80, grow to ~115, with a "breathing" quality
            const baseRadius = 80 + Math.min(35, t * 4);
            // Slow breathing rhythm + tiny nervous flicker
            const breath = Math.sin(t * 1.2) * 6;
            const flick = Math.sin(t * 7.3) * 2 + Math.sin(t * 11) * 1.5;
            lightRadius = Math.max(50, baseRadius + breath + flick);

            // Opening flicker — a quick pulse to signal "we're live" (kills dead air)
            if (t < 0.4) {
                const flickPulse = Math.sin(t * Math.PI / 0.2) * 12;
                lightRadius += Math.max(0, flickPulse);
            }

            // Darkness deepens during empty beat (after all text gone, before "They were wrong")
            if (t > 5.8 && t < CINEMATIC_LINE_TIMINGS[3]) {
                const dipT = (t - 5.8) / (CINEMATIC_LINE_TIMINGS[3] - 5.8);
                const dipEase = Math.sin(dipT * Math.PI * 0.5);
                lightRadius -= dipEase * 32; // slightly deeper dip
            }
            // Gentle light bloom as "They were wrong" materializes
            if (t > CINEMATIC_LINE_TIMINGS[3] && t < CINEMATIC_LINE_TIMINGS[3] + 1.5) {
                const bloomT = (t - CINEMATIC_LINE_TIMINGS[3]) / 1.5;
                const bloomEase = 1 - Math.pow(1 - bloomT, 2);
                lightRadius += bloomEase * 35;
            }

            // Brief light contraction right before the swell (gathering energy)
            if (t > CINEMATIC_LIGHT_SWELL_START - 0.8) {
                const contrT = (t - (CINEMATIC_LIGHT_SWELL_START - 0.8)) / 0.8;
                lightRadius -= contrT * 25; // pulls inward
                lightRadius = Math.max(50, lightRadius);
            }
        }

        // === BLOOD STAIN — fade in as camera nears player ===
        if (t > 7.0) {
            bloodStainAlpha = Math.min(1, (t - 7.0) / 1.5); // faster reveal
        }

        // === PLAYER AWAKENS (wizardRiseProgress used by all forms) ===
        if (t >= CINEMATIC_RISE_START) {
            const riseT = Math.min(1, (t - CINEMATIC_RISE_START) / CINEMATIC_RISE_DURATION);
            // Natural body mechanics: slow struggle at first, then purposeful acceleration
            // Cubic ease-in for the first half (slow), then ease-out for second (fast, determined)
            let riseEased;
            if (riseT < 0.5) {
                // Slow struggle (ease-in: x^2.5 mapped to 0-0.5 → 0-0.35)
                const half = riseT / 0.5;
                riseEased = Math.pow(half, 2.5) * 0.35;
            } else {
                // Purposeful rise (ease-out from 0.35 to 1.0)
                const half = (riseT - 0.5) / 0.5;
                riseEased = 0.35 + (1 - Math.pow(1 - half, 2)) * 0.65;
            }
            wizardRotation = (Math.PI / 2) * (1 - riseEased);
            wizardRiseProgress = riseEased;

            // Dust burst when the wizard first stirs, and a bigger one when standing
            if (riseT > 0.02 && riseT < 0.08 && dustParticles.length < 10) {
                const pos = tileToScreen(4, 3);
                spawnDustBurst(pos.x, pos.y, 8); // small initial stir (was 6)
            }
            if (riseT > 0.45 && riseT < 0.55 && dustParticles.length < 40) {
                const pos = tileToScreen(4, 3);
                spawnDustBurst(pos.x, pos.y, 22); // bigger burst on stand (was 14)
            }

            // Screen shake during the purposeful rise phase
            if (riseT > 0.4 && riseT < 0.65 && !cinematicShakeTriggered) {
                cinematicShakeTriggered = true;
                addScreenShake(3.5, 0.6); // subtle but noticeable
            }
        }

        // === LIGHT SWELL — magic surges as wizard stands ===
        if (t >= CINEMATIC_LIGHT_SWELL_START) {
            const swellT = (t - CINEMATIC_LIGHT_SWELL_START) / (CINEMATIC_TOTAL - CINEMATIC_LIGHT_SWELL_START);
            // Ease-out with visible overshoot for dramatic surge
            const x = Math.min(1, swellT);
            const swellEased = x < 0.6
                ? (x / 0.6) * (x / 0.6) * (3 - 2 * (x / 0.6)) * 1.18 // noticeable overshoot (was 1.08)
                : 1.18 - 0.18 * ((x - 0.6) / 0.4); // settle back over longer tail
            lightRadius = 90 + (MAX_LIGHT - 90) * Math.min(1.18, swellEased);
        }

        // === TRANSITION FLASH ===
        if (t >= CINEMATIC_TOTAL - 0.5) {
            // Brief warm flash as we transition to gameplay
            const flashT = (t - (CINEMATIC_TOTAL - 0.5)) / 0.5;
            // Quick in, slow out — slightly brighter for more punch
            cinematicFlashAlpha = flashT < 0.25
                ? (flashT / 0.25) * 0.30
                : 0.30 * (1 - (flashT - 0.25) / 0.75);
        }

        // Update dust
        updateDustParticles(dt);

        // === END → PLAYING ===
        if (t >= CINEMATIC_TOTAL) {
            gamePhase = 'playing';
            lightRadius = MAX_LIGHT;
            wizardRotation = 0;
            wizardRiseProgress = 1;
            cinematicFlashAlpha = 0;
            setPixelCursor('none');
            // Brief delay before combat starts — show action hint first
            cinematicActionHintAlpha = 1.0;
            setTimeout(() => { startWaveSystem(); }, 1500);
        }

        // Render the cinematic frame
        render();
        // Draw narrative text + flash on top
        drawCinematicText();
        requestAnimationFrame(gameLoop);
        return;
    }

    // ----- Awakening phase (legacy fallback) -----
    if (gamePhase === 'awakening') {
        introTimer += dt;
        lightRadius = Math.min(MAX_LIGHT, 60 + (MAX_LIGHT - 60) * (introTimer / 3));
        if (introTimer > 3) {
            gamePhase = 'playing';
            lightRadius = MAX_LIGHT;
            setPixelCursor('none');
            startWaveSystem();
        }
    }

    // Cursor management for inventory
    if (gamePhase === 'playing') {
        setPixelCursor(inventoryOpen ? 'default' : 'none');
    }

    // ----- Evolution cinematic -----
    if (gamePhase === 'evolution') {
        updateEvolution(dt);
        render();
        drawEvolution();
        requestAnimationFrame(gameLoop);
        return;
    }

    // ----- Zone transition (descending to next zone) -----
    if (zoneTransition) {
        updateZoneTransition(dt);
        render();
        drawZoneTransition();
        requestAnimationFrame(gameLoop);
        return;
    }

    // ----- Death state -----
    if (gameDead) {
        deathFadeTimer += dt;
        updateParticles(dt);
        render();
        drawDeathScreen();
        requestAnimationFrame(gameLoop);
        return;
    }

    // Journal reader — pauses gameplay
    if (journalOpen && gamePhase === 'playing') {
        setPixelCursor('default');
        render();
        drawJournalReader();
        requestAnimationFrame(gameLoop);
        return;
    }

    // Grimoire menu — pauses gameplay
    if (menuOpen && gamePhase === 'playing') {
        setPixelCursor('default');
        render();
        drawGameMenu();
        requestAnimationFrame(gameLoop);
        return;
    }

    // Level-up screen — pauses gameplay
    if (xpState.levelUpPending && gamePhase === 'playing') {
        xpState.levelUpFadeIn = Math.min(1, xpState.levelUpFadeIn + dt * 4);
        setPixelCursor('default');
        render();
        drawLevelUpScreen();
        requestAnimationFrame(gameLoop);
        return;
    }

    // ----- Pause state -----
    if (gamePhase === 'playing' && gamePaused) {
        render();
        drawPauseOverlay();
        requestAnimationFrame(gameLoop);
        return;
    }

    // ----- Gameplay phases -----
    if (gamePhase === 'playing' || gamePhase === 'awakening') {
        if (multiKillTimer > 0) multiKillTimer -= dt;
        if (gamePhase === 'playing' && !inventoryOpen) {
            const handler = FormSystem.getHandler();
            if (handler && handler.update) handler.update(dt);
            else updatePlayer(dt); // fallback to wizard
        }
        updateGhosts(dt);
        if (!inventoryOpen) updateProjectiles(dt);
        if (gamePhase === 'playing' && !inventoryOpen) {
            updateWaveSystem(dt);
            updateEnemies(dt);
            checkProjectileEnemyHits();
            updateEnemyProjectiles(dt);
            updateTowers(dt);
            updateTowerBolts(dt);
            updateOrbitFireballs(dt);
            updatePlacement();
            updateWorldDrops(dt);
            tryPickupDrops();
            updateWorldKeyDrops(dt);
            tryPickupKeyDrops();
        }
        updateParticles(dt);
        updatePickupTexts(dt);
        updateCamera(dt);
    }

    render();
    requestAnimationFrame(gameLoop);
}

// Reference resolution — all rendering is tuned for 1920px width.
// On bigger monitors we scale everything up so the game looks identical.
const REF_WIDTH = 1920;
let displayScale = 1;   // physicalWidth / REF_WIDTH

function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const physW = window.innerWidth;
    const physH = window.innerHeight;

    // Physical canvas size (sharp on retina/HiDPI)
    canvas.width = physW * dpr;
    canvas.height = physH * dpr;
    canvas.style.width = physW + 'px';
    canvas.style.height = physH + 'px';

    // Scale factor: map virtual 1920-wide space to actual screen
    displayScale = physW / REF_WIDTH;

    // Virtual dimensions — all game code renders in this coordinate space
    canvasW = REF_WIDTH;
    canvasH = physH / displayScale;

    // Combined transform: DPR * display scale
    ctx.setTransform(dpr * displayScale, 0, 0, dpr * displayScale, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

// Menu button definitions (positioned relative to virtual canvas center)
function getMenuButtons() {
    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const btnW = 220, btnH = 44;
    const hasAnySave = saveSlots.some(s => s !== null);
    return {
        start:    { x: cx - btnW / 2, y: cy + 30,  w: btnW, h: btnH, label: 'NEW GAME',    id: 'start' },
        loadGame: { x: cx - btnW / 2, y: cy + 85,  w: btnW, h: btnH, label: 'LOAD GAME',   id: 'loadGame', disabled: !hasAnySave },
        controls: { x: cx - btnW / 2, y: cy + 140, w: btnW, h: btnH, label: 'CONTROLS',    id: 'controls' },
    };
}

function getControlsBackButton() {
    const cx = canvasW / 2;
    const cy = canvasH / 2;
    return { x: cx - 90, y: cy + 190, w: 180, h: 40, label: 'BACK', id: 'back' };
}

function pointInButton(mx, my, btn) {
    return mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;
}

function updateMenuEmbers(dt) {
    for (const e of menuEmbers) {
        e.life += dt;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.vx += (Math.random() - 0.5) * 2 * dt;
        e.flicker += dt * (4 + Math.random() * 6);

        if (e.life > e.maxLife || e.y < -20) {
            e.x = Math.random() * canvasW;
            e.y = canvasH + 10 + Math.random() * 40;
            e.vx = (Math.random() - 0.5) * 12;
            e.vy = -Math.random() * 25 - 8;
            e.life = 0;
            e.maxLife = Math.random() * 4 + 3;
            e.size = Math.random() * 2.5 + 0.5;
            e.brightness = Math.random();
        }
    }
}

function drawMenuButton(btn, isHovered, alpha, disabled) {
    if (disabled) { isHovered = false; alpha *= 0.35; }
    const t = menuTime;
    ctx.save();
    ctx.globalAlpha = alpha;

    // Button background
    const hoverGlow = isHovered ? 0.25 : 0;
    ctx.fillStyle = `rgba(20, 14, 8, ${0.6 + hoverGlow})`;
    ctx.beginPath();
    ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 4);
    ctx.fill();

    // Border
    const borderAlpha = isHovered ? 0.6 : 0.2;
    const borderColor = isHovered ? `rgba(212, 180, 120, ${borderAlpha})` : `rgba(140, 120, 80, ${borderAlpha})`;
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = isHovered ? 1.5 : 1;
    ctx.beginPath();
    ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 4);
    ctx.stroke();

    // Hover glow effect
    if (isHovered) {
        ctx.globalCompositeOperation = 'screen';
        const glow = ctx.createRadialGradient(
            btn.x + btn.w / 2, btn.y + btn.h / 2, 0,
            btn.x + btn.w / 2, btn.y + btn.h / 2, btn.w * 0.6
        );
        glow.addColorStop(0, `rgba(180, 140, 60, ${0.08 + Math.sin(t * 4) * 0.03})`);
        glow.addColorStop(1, 'rgba(100, 70, 20, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(btn.x - 20, btn.y - 20, btn.w + 40, btn.h + 40);
        ctx.globalCompositeOperation = 'source-over';
    }

    // Corner ornaments — small angled lines
    const co = 6;
    ctx.strokeStyle = `rgba(168, 144, 96, ${isHovered ? 0.5 : 0.18})`;
    ctx.lineWidth = 1;
    // top-left
    ctx.beginPath();
    ctx.moveTo(btn.x, btn.y + co); ctx.lineTo(btn.x, btn.y); ctx.lineTo(btn.x + co, btn.y);
    ctx.stroke();
    // top-right
    ctx.beginPath();
    ctx.moveTo(btn.x + btn.w - co, btn.y); ctx.lineTo(btn.x + btn.w, btn.y); ctx.lineTo(btn.x + btn.w, btn.y + co);
    ctx.stroke();
    // bottom-left
    ctx.beginPath();
    ctx.moveTo(btn.x, btn.y + btn.h - co); ctx.lineTo(btn.x, btn.y + btn.h); ctx.lineTo(btn.x + co, btn.y + btn.h);
    ctx.stroke();
    // bottom-right
    ctx.beginPath();
    ctx.moveTo(btn.x + btn.w - co, btn.y + btn.h); ctx.lineTo(btn.x + btn.w, btn.y + btn.h); ctx.lineTo(btn.x + btn.w, btn.y + btn.h - co);
    ctx.stroke();

    // Label
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '14px monospace';
    ctx.fillStyle = isHovered ? '#e8d8b0' : '#a09070';
    ctx.letterSpacing = '3px';
    ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2 + 1);
    ctx.letterSpacing = '0px';

    ctx.restore();
}

function drawPreMenuScreen() {
    const cx = canvasW / 2;
    const t = menuTime;

    // Deep dark background — same as menu but no embers, no title
    const bgGrad = ctx.createRadialGradient(cx, canvasH * 0.35, 0, cx, canvasH * 0.35, canvasW * 0.7);
    bgGrad.addColorStop(0, '#0d0906');
    bgGrad.addColorStop(0.5, '#080504');
    bgGrad.addColorStop(1, '#030202');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvasW, canvasH);

    // Pulsing "click anywhere to begin"
    const pulse = 0.35 + Math.sin(t * 2.5) * 0.15;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = preMenuAlpha * pulse;
    ctx.font = 'italic 15px Georgia';
    ctx.fillStyle = '#aa9970';
    ctx.fillText('click anywhere to begin', cx, canvasH / 2);
    ctx.restore();
}

function drawMenuScreen(dt) {
    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const t = menuTime;

    // ----- Background -----
    // Deep dark gradient
    const bgGrad = ctx.createRadialGradient(cx, cy * 0.7, 0, cx, cy * 0.7, canvasW * 0.7);
    bgGrad.addColorStop(0, '#0d0906');
    bgGrad.addColorStop(0.5, '#080504');
    bgGrad.addColorStop(1, '#030202');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvasW, canvasH);

    // Subtle warm vignette at bottom
    const vigGrad = ctx.createLinearGradient(0, canvasH * 0.6, 0, canvasH);
    vigGrad.addColorStop(0, 'rgba(40, 20, 5, 0)');
    vigGrad.addColorStop(1, `rgba(30, 12, 3, ${0.15 + Math.sin(t * 0.8) * 0.05})`);
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, canvasH * 0.6, canvasW, canvasH * 0.4);

    // ----- Floating embers -----
    ctx.save();
    for (const e of menuEmbers) {
        const lifeFrac = e.life / e.maxLife;
        const fadeIn = Math.min(1, lifeFrac * 4);
        const fadeOut = Math.max(0, 1 - (lifeFrac - 0.7) / 0.3);
        const a = Math.min(fadeIn, fadeOut) * (0.3 + e.brightness * 0.5);
        const flick = 0.7 + Math.sin(e.flicker) * 0.3;

        // Glow
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = a * flick * 0.4 * menuFadeAlpha;
        const glowR = e.size * 6;
        const glow = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, glowR);
        glow.addColorStop(0, e.brightness > 0.5 ? 'rgba(255, 160, 40, 0.4)' : 'rgba(200, 100, 20, 0.3)');
        glow.addColorStop(1, 'rgba(100, 40, 5, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(e.x - glowR, e.y - glowR, glowR * 2, glowR * 2);

        // Core
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = a * flick * menuFadeAlpha;
        ctx.fillStyle = e.brightness > 0.6 ? '#ffcc66' : (e.brightness > 0.3 ? '#e89030' : '#aa5520');
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size * flick, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    // ----- Title: ETHERA -----
    ctx.save();
    ctx.globalAlpha = menuFadeAlpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Title glow
    ctx.globalCompositeOperation = 'screen';
    const titleGlow = ctx.createRadialGradient(cx, cy - 60, 0, cx, cy - 60, 260);
    titleGlow.addColorStop(0, `rgba(180, 130, 50, ${0.12 + Math.sin(t * 1.5) * 0.04})`);
    titleGlow.addColorStop(0.5, `rgba(120, 80, 20, ${0.04})`);
    titleGlow.addColorStop(1, 'rgba(60, 30, 5, 0)');
    ctx.fillStyle = titleGlow;
    ctx.fillRect(cx - 300, cy - 200, 600, 300);

    ctx.globalCompositeOperation = 'source-over';

    // Title text
    ctx.font = '62px Georgia';
    ctx.shadowColor = 'rgba(200, 140, 40, 0.4)';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#d4b878';
    ctx.fillText('ETHERA', cx, cy - 60);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = 'italic 16px Georgia';
    ctx.fillStyle = '#8a7a5a';
    ctx.globalAlpha = menuFadeAlpha * (0.5 + Math.sin(t * 2) * 0.15);
    ctx.fillText('The Awakening', cx, cy - 20);

    ctx.globalAlpha = menuFadeAlpha;

    // Decorative lines above and below title
    drawDecorLine(cx, cy - 98, 180, menuFadeAlpha * 0.4);
    drawDecorLine(cx, cy + 5, 140, menuFadeAlpha * 0.3);

    ctx.restore();

    // ----- Buttons -----
    const btns = getMenuButtons();
    drawMenuButton(btns.start, menuHover === 'start', menuFadeAlpha);
    drawMenuButton(btns.loadGame, menuHover === 'loadGame', menuFadeAlpha, btns.loadGame.disabled);
    drawMenuButton(btns.controls, menuHover === 'controls', menuFadeAlpha);

    // ----- Bottom credit line -----
    ctx.save();
    ctx.textAlign = 'center';

    // "a game by Ali Taghva" — soft italic, just above the version line
    ctx.globalAlpha = menuFadeAlpha * 0.28;
    ctx.font = 'italic 11px Georgia';
    ctx.fillStyle = '#b8a078';
    ctx.fillText('a game by Ali Taghva', cx, canvasH - 46);

    // Version / tagline
    ctx.globalAlpha = menuFadeAlpha * 0.15;
    ctx.font = '9px monospace';
    ctx.fillStyle = '#665544';
    ctx.fillText('v0.1', cx, canvasH - 26);

    ctx.restore();
}

function drawControlsScreen(dt) {
    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const t = menuTime;

    // Dark background
    const bgGrad = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy * 0.8, canvasW * 0.6);
    bgGrad.addColorStop(0, '#0d0906');
    bgGrad.addColorStop(1, '#030202');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvasW, canvasH);

    // Embers (dimmer)
    ctx.save();
    for (const e of menuEmbers) {
        const lifeFrac = e.life / e.maxLife;
        const fadeIn = Math.min(1, lifeFrac * 4);
        const fadeOut = Math.max(0, 1 - (lifeFrac - 0.7) / 0.3);
        const a = Math.min(fadeIn, fadeOut) * 0.2 * (0.7 + Math.sin(e.flicker) * 0.3);
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = a * menuFadeAlpha;
        ctx.fillStyle = e.brightness > 0.5 ? '#ffaa33' : '#cc6622';
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size * 0.8, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = menuFadeAlpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Title
    ctx.font = '30px Georgia';
    ctx.fillStyle = '#d4c4a0';
    ctx.shadowColor = 'rgba(180, 140, 60, 0.3)';
    ctx.shadowBlur = 16;
    ctx.fillText('CONTROLS', cx, cy - 130);
    ctx.shadowBlur = 0;

    drawDecorLine(cx, cy - 105, 120, menuFadeAlpha * 0.4);

    // Control bindings
    const controls = [
        { key: 'W  A  S  D',    desc: 'Move' },
        { key: 'SPACE',         desc: 'Phase Jump' },
        { key: 'LEFT CLICK',    desc: 'Fireball' },
        { key: 'RIGHT CLICK',   desc: 'Summon Tower' },
        { key: 'E',             desc: 'Interact' },
        { key: 'I',             desc: 'Inventory' },
        { key: 'J',             desc: 'Journal' },
        { key: 'ESC',           desc: 'Cancel / Close' },
    ];

    const startY = cy - 70;
    const rowH = 42;
    const keyX = cx - 30;
    const descX = cx + 30;

    for (let i = 0; i < controls.length; i++) {
        const y = startY + i * rowH;
        const c = controls[i];

        // Key badge background
        const keyW = 90;
        ctx.globalAlpha = menuFadeAlpha * 0.15;
        ctx.fillStyle = '#a89060';
        ctx.beginPath();
        ctx.roundRect(keyX - keyW, y - 12, keyW, 24, 3);
        ctx.fill();

        // Key badge border
        ctx.globalAlpha = menuFadeAlpha * 0.25;
        ctx.strokeStyle = '#a89060';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(keyX - keyW, y - 12, keyW, 24, 3);
        ctx.stroke();

        // Key text
        ctx.globalAlpha = menuFadeAlpha * 0.85;
        ctx.textAlign = 'right';
        ctx.font = '12px monospace';
        ctx.fillStyle = '#c4a878';
        ctx.fillText(c.key, keyX - 8, y + 1);

        // Description
        ctx.textAlign = 'left';
        ctx.font = '14px Georgia';
        ctx.fillStyle = '#b8a888';
        ctx.fillText(c.desc, descX, y + 1);
    }

    // Separator before back button
    drawDecorLine(cx, cy + 165, 100, menuFadeAlpha * 0.25);

    ctx.restore();

    // Back button
    const backBtn = getControlsBackButton();
    drawMenuButton(backBtn, menuHover === 'back', menuFadeAlpha);
}

//  WORLD DROP RENDERING
// ============================================================
// Map item slot + rarity to the best Raven icon variant
function getItemSpriteForSlot(slot, rarity) {
    const suffix = rarity === 'epic' ? '_e' : rarity === 'rare' ? '_r' : rarity === 'uncommon' ? '_u' : '';
    const key = 'item_' + slot + suffix;
    return images[key] || images['item_' + slot] || null;
}

function drawWorldDrops() {
    for (const d of worldDrops) {
        const pos = tileToScreen(d.row, d.col);
        const sx = pos.x + cameraX;
        const sy = pos.y + cameraY;
        const bob = Math.sin(d.bobTime * 2.5) * 4;
        const fadeIn = d.spawnTime > 0 ? 1 - (d.spawnTime / 0.5) : 1;
        const rarDef = RARITY[d.item.rarity];
        const t = performance.now() / 1000;
        const isRare = d.item.rarity === 'rare' || d.item.rarity === 'epic';

        ctx.save();
        ctx.globalAlpha = fadeIn;

        // Ground glow — visible beacon for loot (needs to cut through darkness multiply)
        ctx.globalCompositeOperation = 'screen';
        const glowPulse = 0.8 + Math.sin(t * 2.5) * 0.2;
        const glowR = isRare ? 38 : d.item.rarity === 'uncommon' ? 30 : 24;
        const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
        glow.addColorStop(0, rarDef.glow);
        glow.addColorStop(0.6, rarDef.glow.replace(/[\d.]+\)$/, '0.15)'));
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.globalAlpha = fadeIn * glowPulse * (isRare ? 1.0 : 0.75);
        ctx.fillRect(sx - glowR, sy - glowR, glowR * 2, glowR * 2);

        // --- Floating item icon ---
        ctx.globalCompositeOperation = 'source-over';
        const iy = sy - 22 + bob;
        const iconPx = isRare ? 36 : 30; // icon draw size in pixels

        // Drop shadow under icon
        ctx.globalAlpha = fadeIn * 0.4;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(sx, sy - 2, 8, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        // Draw sprite icon if available
        const spriteImg = getItemSpriteForSlot(d.item.slot, d.item.rarity);
        if (spriteImg) {
            ctx.globalAlpha = fadeIn * 0.95;
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(spriteImg, sx - iconPx / 2, iy - iconPx / 2, iconPx, iconPx);
            ctx.imageSmoothingEnabled = true;
        } else {
            // Procedural fallback
            drawItemIcon(sx, iy, d.item.slot, d.item.rarity, iconPx, fadeIn * 0.9);
        }

        // Rarity border glow around icon (subtle colored outline)
        if (d.item.rarity !== 'common') {
            ctx.globalAlpha = fadeIn * (0.3 + Math.sin(t * 3) * 0.15);
            ctx.strokeStyle = rarDef.color;
            ctx.lineWidth = isRare ? 1.5 : 1;
            ctx.beginPath();
            ctx.roundRect(sx - iconPx / 2 - 1, iy - iconPx / 2 - 1, iconPx + 2, iconPx + 2, 3);
            ctx.stroke();
        }

        // Sparkle twinkle for uncommon+ items
        if (d.item.rarity !== 'common') {
            const sparkle = Math.sin(d.bobTime * 4 + 1.5);
            if (sparkle > 0.5) {
                ctx.globalAlpha = fadeIn * (sparkle - 0.5) * 1.5;
                ctx.fillStyle = '#fff';
                const spA = d.bobTime * 3;
                const spR = iconPx * 0.4;
                const spX = sx + Math.cos(spA) * spR;
                const spY = iy + Math.sin(spA * 0.7) * spR - 2;
                // 4-pointed star sparkle
                ctx.beginPath();
                const ss = 2;
                ctx.moveTo(spX, spY - ss);
                ctx.lineTo(spX + ss * 0.3, spY);
                ctx.lineTo(spX, spY + ss);
                ctx.lineTo(spX - ss * 0.3, spY);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(spX - ss, spY);
                ctx.lineTo(spX, spY + ss * 0.3);
                ctx.lineTo(spX + ss, spY);
                ctx.lineTo(spX, spY - ss * 0.3);
                ctx.closePath();
                ctx.fill();
            }
        }

        ctx.restore();
    }
}

function drawWorldKeyDrops() {
    for (const d of worldKeyDrops) {
        const pos = tileToScreen(d.row, d.col);
        const sx = pos.x + cameraX;
        const sy = pos.y + cameraY;
        const bob = Math.sin(d.bobTime * 2) * 5;
        const fadeIn = d.spawnTime > 0 ? 1 - (d.spawnTime / 0.5) : 1;
        const t = performance.now() / 1000;

        ctx.save();
        ctx.globalAlpha = fadeIn;

        // Large golden ground glow — key items are special
        ctx.globalCompositeOperation = 'screen';
        const pulse = 0.6 + Math.sin(t * 3) * 0.2;
        const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30);
        glow.addColorStop(0, `rgba(255, 210, 80, ${0.5 * pulse})`);
        glow.addColorStop(0.5, `rgba(200, 150, 30, ${0.15 * pulse})`);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(sx - 30, sy - 30, 60, 60);

        // Floating key shape
        ctx.globalCompositeOperation = 'source-over';
        const iy = sy - 18 + bob;
        ctx.globalAlpha = fadeIn * 0.95;

        // Key body — simple iconic shape
        ctx.fillStyle = d.color;
        ctx.strokeStyle = '#fff8e0';
        ctx.lineWidth = 1;

        // Circle head
        ctx.beginPath();
        ctx.arc(sx, iy - 4, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = fadeIn * 0.4;
        ctx.stroke();

        // Shaft
        ctx.globalAlpha = fadeIn * 0.95;
        ctx.fillRect(sx - 1.5, iy + 1, 3, 10);

        // Teeth
        ctx.fillRect(sx + 1, iy + 7, 3, 2);
        ctx.fillRect(sx + 1, iy + 4, 2, 2);

        // Sparkle
        ctx.globalAlpha = fadeIn * (0.3 + Math.sin(t * 5) * 0.3);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(sx - 2, iy - 6, 1.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}
