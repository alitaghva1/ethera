        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            transition: opacity 1.5s ease;
        }
        #overlay.fade-out { opacity: 0; pointer-events: none; }
        .intro-line {
            color: #b8a88a; font-size: 22px; opacity: 0;
            margin: 8px 0; letter-spacing: 2px;
            transition: opacity 1.5s ease;
        }
        .intro-line.visible { opacity: 1; }
        #loading-text {
            color: #665544; font-size: 14px; position: fixed;
            bottom: 40px; left: 50%; transform: translateX(-50%);
            letter-spacing: 3px;
        }
        /* cursor managed by JS: default on menu, none in gameplay */
    </style>
</head>

        this.previousForm = this.currentForm;

};

function initMusic() {
    if (music.initialized) return;
    music.channels[0] = new Audio();
    music.channels[1] = new Audio();
    music.channels[0].preload = 'auto';
    music.channels[1].preload = 'auto';
    music.stingAudio = new Audio();
    music.stingAudio.preload = 'auto';
    music.initialized = true;
    // Preload critical tracks to avoid first-play stutter
    const preloadTracks = ['cinematic', 'combat1', 'death'];
    for (const id of preloadTracks) {
        const def = MUSIC_TRACKS[id];
        if (def) {
            const preload = new Audio();
            preload.preload = 'auto';
            preload.src = MUSIC_BASE + def.path;
            preload.load();
        }
    }
}

// Play a music track with crossfade
function playMusic(trackId, fadeDuration) {
    if (!music.initialized) initMusic();
    if (trackId === music.currentTrack) return; // already playing

    const def = MUSIC_TRACKS[trackId];
    if (!def) return;

    fadeDuration = fadeDuration || 1.5;

    // Fade out the current channel
    const oldCh = music.activeChannel;
    music.targetVolume[oldCh] = 0;
    music.fadeSpeed[oldCh] = 1.0 / Math.max(0.1, fadeDuration);

    // Switch to the other channel
    const newCh = 1 - oldCh;
    music.activeChannel = newCh;
    music.currentTrack = trackId;

    const audio = music.channels[newCh];
    audio.src = MUSIC_BASE + def.path;
    audio.loop = def.loop;
    audio.volume = 0;
    music.channelVolume[newCh] = 0;
    music.targetVolume[newCh] = def.vol;
    music.fadeSpeed[newCh] = 1.0 / Math.max(0.1, fadeDuration);

    audio.play().catch(() => {}); // ignore autoplay errors
}

// Play a short sting (doesn't interrupt main music)
function playSting(trackId) {
    if (!music.initialized) initMusic();
    const def = MUSIC_TRACKS[trackId];
    if (!def) return;
    music.stingAudio.src = MUSIC_BASE + def.path;
    music.stingAudio.volume = def.vol * music.masterVolume;
    music.stingAudio.loop = false;
    music.stingAudio.play().catch(() => {});
}

// Stop all music (fade to silence)
function stopMusic(fadeDuration) {
    fadeDuration = fadeDuration || 1.0;
    music.targetVolume[0] = 0;
    music.targetVolume[1] = 0;
    music.fadeSpeed[0] = 1.0 / Math.max(0.1, fadeDuration);
    music.fadeSpeed[1] = 1.0 / Math.max(0.1, fadeDuration);
    music.currentTrack = null;
}

// Duck music volume (for level-up screen)
function duckMusic(on) {
    music.duckTarget = on ? 0.25 : 1.0;
}

// Update music volumes each frame (call from gameLoop)
function updateMusic(dt) {
    if (!music.initialized) return;

    // Smooth duck
    if (music.duckVolume !== music.duckTarget) {
        const duckSpeed = 3.0;
        if (music.duckVolume < music.duckTarget) {
            music.duckVolume = Math.min(music.duckTarget, music.duckVolume + dt * duckSpeed);
        } else {
            music.duckVolume = Math.max(music.duckTarget, music.duckVolume - dt * duckSpeed);
        }
    }

    // Fade channels
    for (let i = 0; i < 2; i++) {
        const target = music.targetVolume[i];
        const speed = music.fadeSpeed[i];
        if (music.channelVolume[i] !== target) {
            if (music.channelVolume[i] < target) {
                music.channelVolume[i] = Math.min(target, music.channelVolume[i] + dt * speed);
            } else {
                music.channelVolume[i] = Math.max(target, music.channelVolume[i] - dt * speed);
            }
        }

        const ch = music.channels[i];
        if (ch) {
            const finalVol = music.channelVolume[i] * music.masterVolume * music.duckVolume;
            ch.volume = Math.max(0, Math.min(1, finalVol));

            // Stop audio when fully faded out to save resources
            if (music.channelVolume[i] <= 0 && !ch.paused && i !== music.activeChannel) {
                ch.pause();
            }
        }
    }
}

// Pause/resume music (for game pause)
function pauseMusic() {
    if (!music.initialized) return;
    for (const ch of music.channels) {
        if (ch && !ch.paused) ch.pause();
    }
}

function resumeMusic() {
    if (!music.initialized) return;
    const ch = music.channels[music.activeChannel];
    if (ch && ch.paused && music.currentTrack) {
        ch.play().catch(() => {});
    }
}

// ============================================================
//  SFX SYSTEM — Procedural sounds via Web Audio API
// ============================================================
let sfxCtx = null;          // AudioContext (created on first interaction)
let sfxMasterGain = null;   // Master gain node
let sfxVolume = 0.35;       // SFX master volume (0-1)
// Polyphony control — max simultaneous SFX channels
const SFX_MAX_CHANNELS = 6;
let sfxActiveCount = 0;
const SFX_PRIORITY = { playerDeath: 3, playerHurt: 3, explosion: 2, enemyDeath: 1, fireballHit: 1, default: 0 };

function initSFX() {
    if (sfxCtx) return;
    sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
    sfxMasterGain = sfxCtx.createGain();
    sfxMasterGain.gain.value = sfxVolume;
    sfxMasterGain.connect(sfxCtx.destination);
}

// Check if a new SFX can play (polyphony limiting)
function canPlaySFX(priority) {
    if (sfxActiveCount < SFX_MAX_CHANNELS) return true;
    return (priority || 0) >= 2; // high priority can always play
}
function trackSFXChannel(duration) {
    sfxActiveCount++;
    setTimeout(() => { sfxActiveCount = Math.max(0, sfxActiveCount - 1); }, duration * 1000);
}

// Helper: create noise buffer (for whooshes, hits, explosions)
function createNoiseBuffer(duration) {
    const len = sfxCtx.sampleRate * duration;
    const buf = sfxCtx.createBuffer(1, len, sfxCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    return buf;
}

// Distance attenuation — reduce volume based on tile distance from player
function sfxDistanceVol(row, col) {
    if (row === undefined || col === undefined) return 1.0;
    const dr = row - player.row;
    const dc = col - player.col;
    const dist = Math.sqrt(dr * dr + dc * dc);
    return Math.min(1.0, 1.0 / (1 + dist * dist * 0.04));
}

// Helper: play a shaped noise burst
function playNoise(duration, freq, Q, vol, attack, decay) {
    const now = sfxCtx.currentTime;
    const noise = sfxCtx.createBufferSource();
    noise.buffer = createNoiseBuffer(duration);
    const filter = sfxCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = freq;
    filter.Q.value = Q;
    const gain = sfxCtx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(sfxMasterGain);
    noise.start(now);
    noise.stop(now + duration);
}

// Helper: play a tone with pitch sweep
function playTone(type, startFreq, endFreq, duration, vol, attack, decay) {
    const now = sfxCtx.currentTime;
    const osc = sfxCtx.createOscillator();
    osc.type = type;
    osc.frequency.setValueAtTime(startFreq, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), now + duration);
    const gain = sfxCtx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + (attack || 0.01));
    gain.gain.exponentialRampToValueAtTime(0.001, now + (decay || duration));
    osc.connect(gain);
    gain.connect(sfxMasterGain);
    osc.start(now);
    osc.stop(now + duration);
}

function loadImage(src) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => { console.warn('Failed: ' + src); resolve(null); };
        img.src = src;
    });
}

// ============================================================
//  MAP SYSTEM
// ============================================================
const floorMap = Array.from({ length: MAP_SIZE }, () => Array(MAP_SIZE).fill(null));
const objectMap = Array.from({ length: MAP_SIZE }, () => Array(MAP_SIZE).fill(null));
const blocked = Array.from({ length: MAP_SIZE }, () => Array(MAP_SIZE).fill(true));
// Per-tile collision type: 'wall' = full tile block, 'object' = sub-tile circle
const blockType = Array.from({ length: MAP_SIZE }, () => Array(MAP_SIZE).fill(null));
// Object collision radii (center-of-tile circle collision)
const objRadius = Array.from({ length: MAP_SIZE }, () => Array(MAP_SIZE).fill(0));

// Floor tiles that look rough/damaged but are walkable — get a subtle dust mote effect
const ROUGH_FLOORS = new Set([
    'stoneMissing', 'stoneUneven', 'planksBroken', 'planksHole', 'dirtTiles'
]);

// Sub-tile radii per object type (how much of the tile the object actually fills)
const OBJ_RADII = {
    barrel: 0.28, barrels: 0.38, barrelsStacked: 0.38,
    chestClosed: 0.32, chestOpen: 0.32,
    tableRound: 0.35, tableRoundChairs: 0.42, tableChairsBroken: 0.40,
    tableShort: 0.32, chair: 0.22,
    woodenCrate: 0.30, woodenCrates: 0.38, woodenPile: 0.35,
    woodenSupports: 0.20, woodenSupportBeams: 0.20,
    stoneColumn: 0.22, stoneColumnWood: 0.22,
    stairs: 0.40, stairsSpiral: 0.38, stairsAged: 0.38,
};

function fillFloor(r1, c1, r2, c2, tile) {
    for (let r = r1; r <= r2; r++)
        for (let c = c1; c <= c2; c++) {
            floorMap[r][c] = tile;
            blocked[r][c] = false;
            blockType[r][c] = null;
        }
}

function addWalls(r1, c1, r2, c2, tile) {
    for (let c = c1; c <= c2; c++) {
        floorMap[r1][c] = tile; blocked[r1][c] = true; blockType[r1][c] = 'wall';
        floorMap[r2][c] = tile; blocked[r2][c] = true; blockType[r2][c] = 'wall';
    }
    for (let r = r1 + 1; r < r2; r++) {
        floorMap[r][c1] = tile; blocked[r][c1] = true; blockType[r][c1] = 'wall';
        floorMap[r][c2] = tile; blocked[r][c2] = true; blockType[r][c2] = 'wall';
    }
}

function placeObj(r, c, obj, blocks = true) {
    objectMap[r][c] = obj;
    if (blocks) {
        blocked[r][c] = true;
        blockType[r][c] = 'object';
        objRadius[r][c] = OBJ_RADII[obj] || 0.35;
    }
}

function openTile(r, c, tile) {
    floorMap[r][c] = tile; blocked[r][c] = false; blockType[r][c] = null;
}

function generateDungeon() {
    // ================================================================
    //  ZONE 1 — THE UNDERCROFT
    //  Layout: Cell → wide corridor → Guard Hall → broad passage
    //          → Great Hall (main arena) ← Alcove (north wing)
    //  Design goals: wide passages for AI pathing, open combat
    //  arenas, atmospheric prop placement along walls only.
    // ================================================================

    // ===== ROOM 1: THE CELL (rows 2-5, cols 2-6) =====
    // A cramped holding cell — the wizard awakens here.
    fillFloor(2, 2, 5, 6, 'dirt');
    floorMap[2][2] = 'dirtTiles';  floorMap[2][5] = 'dirtTiles';
    floorMap[3][3] = 'planksBroken'; floorMap[3][4] = 'planksHole';
    floorMap[4][2] = 'dirtTiles';  floorMap[4][4] = 'planksBroken';
    floorMap[4][6] = 'dirtTiles';  floorMap[5][3] = 'dirtTiles';
    floorMap[5][5] = 'planks';

    // Walls: aged and crumbling
    addWalls(1, 1, 6, 7, 'wallAged');
    floorMap[1][1] = 'wallCorner'; floorMap[1][7] = 'wallCorner';
    floorMap[6][1] = 'wallCorner'; floorMap[6][7] = 'wallCorner';
    floorMap[1][3] = 'wallBroken'; floorMap[1][5] = 'wallBroken';
    // DEBUG: Open north wall of Cell as archway → leads to town
    openTile(1, 4, 'wallArchway');
    openTile(1, 5, 'wallArchway');

    // South exit — open doorway 4 tiles wide
    openTile(6, 3, 'wallDoorOpen');
    openTile(6, 4, 'dirt');
    openTile(6, 5, 'dirt');
    openTile(6, 6, 'dirt');

    // Props: edges only so AI never gets stuck
    placeObj(2, 2, 'woodenPile');
    placeObj(2, 6, 'barrel');
    placeObj(5, 6, 'woodenCrate');

    // ===== CORRIDOR 1 (rows 7-9, cols 3-6) — 4 tiles wide =====
    fillFloor(7, 3, 9, 6, 'stone');
    floorMap[7][4] = 'stoneUneven'; floorMap[8][5] = 'stoneMissing';

    for (let r = 7; r <= 9; r++) {
        floorMap[r][2] = 'wall'; blocked[r][2] = true; blockType[r][2] = 'wall';
        floorMap[r][7] = 'wall'; blocked[r][7] = true; blockType[r][7] = 'wall';
    }

    // ===== ROOM 2: GUARD HALL (rows 10-16, cols 1-8) =====
    // Wide military outpost — primary early-game combat arena
    fillFloor(10, 1, 16, 8, 'stoneTile');
    floorMap[10][2] = 'stone';     floorMap[10][5] = 'stoneMissing';
    floorMap[11][3] = 'stoneUneven'; floorMap[11][7] = 'stone';
    floorMap[12][4] = 'stoneInset'; floorMap[12][6] = 'stoneMissing';
    floorMap[13][2] = 'stone';     floorMap[13][5] = 'stoneUneven';
    floorMap[14][3] = 'stoneMissing'; floorMap[14][7] = 'stone';
    floorMap[15][4] = 'stoneInset'; floorMap[15][6] = 'stone';
    floorMap[16][2] = 'stoneUneven'; floorMap[16][8] = 'stone';

    addWalls(9, 0, 17, 9, 'wall');
    floorMap[9][0] = 'wallCorner';  floorMap[9][9] = 'wallCorner';
    floorMap[17][0] = 'wallCorner'; floorMap[17][9] = 'wallCorner';
    floorMap[9][4] = 'wallWindowBars'; floorMap[9][6] = 'wallWindowBars';
    floorMap[17][3] = 'wallAged';   floorMap[17][5] = 'wallBroken';
    floorMap[17][7] = 'wallAged';

    // North entrance from corridor (4 tiles wide)
    openTile(9, 3, 'stone'); openTile(9, 4, 'stone');
    openTile(9, 5, 'stone'); openTile(9, 6, 'stone');

    // East passage to Great Hall (4 tiles tall, at cols 9)
    openTile(11, 9, 'stone'); openTile(12, 9, 'stone');
    openTile(13, 9, 'stone'); openTile(14, 9, 'stone');

    // Props: pushed to walls/corners — centre stays open for combat
    placeObj(10, 1, 'tableChairsBroken');
    placeObj(10, 8, 'barrels');
    placeObj(16, 1, 'woodenCrates');
    placeObj(16, 8, 'barrelsStacked');
    placeObj(13, 1, 'woodenCrate');

    // ===== CORRIDOR 2 (rows 11-14, cols 10-11) — 4 tiles tall × 2 wide =====
    fillFloor(11, 10, 14, 11, 'stone');
    floorMap[11][10] = 'stoneUneven'; floorMap[13][11] = 'stoneMissing';

    // Walls above and below the passage
    floorMap[10][10] = 'wall'; blocked[10][10] = true; blockType[10][10] = 'wall';
    floorMap[10][11] = 'wall'; blocked[10][11] = true; blockType[10][11] = 'wall';
    floorMap[15][10] = 'wall'; blocked[15][10] = true; blockType[15][10] = 'wall';
    floorMap[15][11] = 'wall'; blocked[15][11] = true; blockType[15][11] = 'wall';

    // ===== ROOM 3: THE GREAT HALL (rows 8-20, cols 12-21) =====
    // Grand chamber — main combat arena
    fillFloor(8, 12, 20, 21, 'stoneTile');

    // Rich floor variation
    floorMap[8][13] = 'stone';      floorMap[8][16] = 'stoneInset';
    floorMap[8][19] = 'stone';      floorMap[9][14] = 'stoneUneven';
    floorMap[9][17] = 'stone';      floorMap[9][20] = 'stoneMissing';
    floorMap[10][12] = 'stone';     floorMap[10][15] = 'stoneInset';
    floorMap[10][19] = 'stone';     floorMap[11][13] = 'stoneUneven';
    floorMap[12][16] = 'stoneInset'; floorMap[12][20] = 'stone';
    floorMap[14][13] = 'stoneMissing'; floorMap[14][18] = 'stoneUneven';
    floorMap[15][15] = 'stoneInset'; floorMap[15][20] = 'stone';
    floorMap[16][14] = 'stone';     floorMap[17][17] = 'stoneInset';
    floorMap[17][21] = 'stoneUneven'; floorMap[18][13] = 'stoneMissing';
    floorMap[18][18] = 'stone';     floorMap[19][16] = 'stoneInset';
    floorMap[19][20] = 'stoneUneven'; floorMap[20][14] = 'stone';
    floorMap[20][19] = 'stone';

    // Walls
    addWalls(7, 11, 21, 22, 'wall');
    floorMap[7][11] = 'wallCorner';  floorMap[7][22] = 'wallCorner';
    floorMap[21][11] = 'wallCorner'; floorMap[21][22] = 'wallCorner';
    floorMap[7][13] = 'wallAged';   floorMap[7][15] = 'wallWindowBars';
    floorMap[7][18] = 'wallWindowBars'; floorMap[7][20] = 'wallBroken';
    floorMap[21][13] = 'wallBroken'; floorMap[21][15] = 'wallAged';
    floorMap[21][20] = 'wallAged';
    // South archway — open passage to the outside (town exit)
    openTile(21, 17, 'wallArchway');   // archway left (walkable, visual only)
    openTile(21, 18, 'wallArchway');   // archway center (walkable, door trigger nearby)
    openTile(21, 19, 'wallArchway');   // archway right (walkable, visual only)

    // West entrance from corridor 2 (4 tiles — rows 11-14)
    openTile(11, 11, 'stone'); openTile(12, 11, 'stone');
    openTile(13, 11, 'stone'); openTile(14, 11, 'stone');

    // Columns pushed to edges — open centre for combat
    placeObj(9, 14, 'stoneColumn');
    placeObj(9, 19, 'stoneColumn');
    placeObj(18, 14, 'stoneColumn');
    placeObj(18, 19, 'stoneColumn');

    // Key objects: chest (locked) and stairs (door to zone 2)
    placeObj(19, 21, 'chestClosed');     // locked chest — needs chest_key
    placeObj(19, 13, 'stairsSpiral');    // ascend to zone 2

    // Atmospheric props along walls
    placeObj(8, 21, 'barrelsStacked');
    placeObj(8, 12, 'woodenCrate');
    placeObj(20, 21, 'barrel');
    placeObj(20, 12, 'woodenCrates');
    placeObj(17, 21, 'woodenSupportBeams');
    placeObj(14, 20, 'tableRoundChairs');

    // ===== ROOM 4: SECRET ALCOVE (rows 2-6, cols 15-20) =====
    // Hidden storage above the Great Hall
    fillFloor(2, 15, 6, 20, 'stoneInset');
    floorMap[2][15] = 'stone';     floorMap[2][19] = 'stoneMissing';
    floorMap[4][17] = 'stoneUneven'; floorMap[5][16] = 'stone';
    floorMap[6][20] = 'stoneInset'; floorMap[3][20] = 'stoneMissing';

    addWalls(1, 14, 7, 21, 'wallAged');
    floorMap[1][14] = 'wallCorner'; floorMap[1][21] = 'wallCorner';
    floorMap[7][14] = 'wallCorner'; floorMap[7][21] = 'wallCorner';
    floorMap[1][17] = 'wallBroken'; floorMap[1][19] = 'wallHole';

    // South connection to Great Hall — 3 tiles wide (cols 16-18)
    openTile(7, 16, 'stone'); openTile(7, 17, 'stone'); openTile(7, 18, 'stone');

    // Props
    placeObj(3, 16, 'chestClosed');  // free loot chest
    placeObj(5, 19, 'barrelsStacked');
    placeObj(4, 20, 'woodenCrates');
    placeObj(6, 16, 'stairsAged');
    placeObj(2, 20, 'barrel');
    placeObj(2, 15, 'woodenPile');
}

// Draw a nature/town tile scaled to fit the dungeon isometric grid.
// Nature tiles are 220x379 (180x115 footprint), town tiles are 210x244 (180x115 footprint).
// We scale them to align with the dungeon's 256x128 diamond at current TILE_SCALE.
function drawExternalTile(img, row, col, srcW, srcH) {
    if (!img) return;
    const pos = tileToScreen(row, col);
    // Scale the image so its footprint matches the dungeon diamond
    const scaleX = DIAMOND_W / 180;   // 180 = source diamond width
    const drawW = Math.round(srcW * scaleX);
    const drawH = Math.round(srcH * scaleX);  // uniform scale to avoid distortion
    const sx = pos.x - drawW / 2 + cameraX;
    const sy = pos.y - drawH + HALF_DH + cameraY + (drawH - TILE_H) * 0.15; // slight Y adjust
    if (sx > canvasW + 50 || sx + drawW < -50) return;
    if (sy > canvasH + 50 || sy + drawH < -50) return;
    ctx.drawImage(img, sx, sy, drawW, drawH);
}

// Drop rate config — base chance per enemy kill, rarity weights by wave
const DROP_CHANCE_BASE = 0.04; // 4% chance — loot should feel rare and exciting
const RARITY_WEIGHTS_BY_WAVE = [
    // Wave 1
    { common: 80, uncommon: 18, rare: 2, epic: 0 },
    // Wave 2
    { common: 60, uncommon: 30, rare: 9, epic: 1 },
    // Wave 3
    { common: 40, uncommon: 35, rare: 20, epic: 5 },
    // Wave 4
    { common: 25, uncommon: 35, rare: 28, epic: 12 },
];

// Generate a random item
function generateItem(waveIdx) {
    const weights = RARITY_WEIGHTS_BY_WAVE[Math.min(waveIdx, RARITY_WEIGHTS_BY_WAVE.length - 1)];
    const totalW = weights.common + weights.uncommon + weights.rare + weights.epic;
    let roll = Math.random() * totalW;
    let rarity = 'common';
    if (roll < weights.epic) rarity = 'epic';
    else if ((roll -= weights.epic) < weights.rare) rarity = 'rare';
    else if ((roll -= weights.rare) < weights.uncommon) rarity = 'uncommon';

    const rarityIdx = ['common', 'uncommon', 'rare', 'epic'].indexOf(rarity);

    // Pick a random slot and template
    const slot = EQUIP_SLOTS[Math.floor(Math.random() * EQUIP_SLOTS.length)];
    const templates = ITEM_POOL[slot];
    const tmpl = templates[Math.floor(Math.random() * templates.length)];

    // Build item stats from template at this rarity tier
    const stats = {};
    for (const [stat, tiers] of Object.entries(tmpl.stats)) {
        const base = tiers[rarityIdx];
        // Small random variance ±10%
        const variance = 1 + (Math.random() - 0.5) * 0.2;
        if (typeof base === 'number' && base < 1) {
            stats[stat] = Math.round(base * variance * 100) / 100; // keep 2 decimals for %
        } else {
            stats[stat] = Math.round(base * variance);
        }
    }

    return {
        id: Date.now() + Math.random(),
        name: RARITY_PREFIX[rarity] + tmpl.name,
        slot,
        rarity,
        stats,
    };
}

// World drops — items sitting on the ground waiting to be picked up
const worldDrops = [];
const PICKUP_RANGE = 1.5; // tiles
const DROP_FLOAT_SPEED = 1.2;

function dropItemInWorld(row, col, item) {
    worldDrops.push({
        row, col, item,
        bobTime: Math.random() * 10,
        spawnTime: 0.5, // fade-in timer
        despawnTimer: 45, // seconds before despawn
    });
}

function tryPickupDrops() {
    for (let i = worldDrops.length - 1; i >= 0; i--) {
        const d = worldDrops[i];
        if (d.spawnTime > 0) continue; // still fading in
        const dr = d.row - player.row;
        const dc = d.col - player.col;
        if (Math.sqrt(dr * dr + dc * dc) < PICKUP_RANGE) {
            if (inventory.backpack.length < inventory.maxBackpack) {
                const pickPos = tileToScreen(d.row, d.col);
                pickupTexts.push({
                    text: d.item.name,
                    color: RARITY[d.item.rarity].color,
                    row: d.row, col: d.col,
                    offsetY: 0,
                    life: 1.5,
                });
                inventory.backpack.push(d.item);
                worldDrops.splice(i, 1);
                sfxItemPickup();
            }
        }
    }
}

function updateWorldDrops(dt) {
    for (let i = worldDrops.length - 1; i >= 0; i--) {
        const d = worldDrops[i];
        d.bobTime += dt * DROP_FLOAT_SPEED;
        if (d.spawnTime > 0) d.spawnTime -= dt;
        d.despawnTimer -= dt;
        if (d.despawnTimer <= 0) {
            worldDrops.splice(i, 1);
        }
    }
}

// ---- Journal Reader ----
function openJournalReader(itemId) {
    const def = KEY_ITEM_DEFS[itemId];
    if (!def || !def.pages || def.pages.length === 0) return;
    journalOpen = true;
    journalItemId = itemId;
    journalPage = 0;
    journalFadeIn = 0;
}

function closeJournalReader() {
    journalOpen = false;
    journalItemId = null;
}

function drawJournalReader() {
    if (!journalOpen || !journalItemId) return;
    const def = KEY_ITEM_DEFS[journalItemId];
    if (!def || !def.pages) { closeJournalReader(); return; }
    const pages = def.pages;
    const page = pages[journalPage] || pages[0];

    journalFadeIn = Math.min(1, journalFadeIn + 0.04);
    const fa = journalFadeIn;

    ctx.save();

    // Dim overlay
    ctx.globalAlpha = fa * 0.7;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvasW, canvasH);

    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const pw = 380, ph = 340;
    const px = cx - pw / 2, py = cy - ph / 2;

    // Parchment background — warm aged paper look
    ctx.globalAlpha = fa * 0.95;
    const parchGrad = ctx.createLinearGradient(px, py, px, py + ph);
    parchGrad.addColorStop(0, '#1e1a14');
    parchGrad.addColorStop(0.1, '#1a1610');
    parchGrad.addColorStop(0.9, '#16130e');
    parchGrad.addColorStop(1, '#12100c');
    ctx.fillStyle = parchGrad;
    ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 6); ctx.fill();

    // Subtle horizontal texture lines
    ctx.globalAlpha = fa * 0.03;
    ctx.strokeStyle = '#c4a878';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < ph; i += 5) {
        ctx.beginPath();
        ctx.moveTo(px + 12, py + i);
        ctx.lineTo(px + pw - 12, py + i);
        ctx.stroke();
    }

    // Border — gold frame
    ctx.globalAlpha = fa * 0.3;
    ctx.strokeStyle = '#a89060';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 6); ctx.stroke();

    // Inner border
    ctx.globalAlpha = fa * 0.1;
    ctx.strokeStyle = '#c4a878';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.roundRect(px + 6, py + 6, pw - 12, ph - 12, 4); ctx.stroke();

    // Journal title
    ctx.globalAlpha = fa * 0.5;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'small-caps 10px Georgia';
    ctx.fillStyle = '#8a7a5a';
    ctx.fillText(def.name, cx, py + 22);

    // Decorative divider
    ctx.globalAlpha = fa * 0.15;
    ctx.strokeStyle = '#a89060';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(cx - 60, py + 34); ctx.lineTo(cx + 60, py + 34); ctx.stroke();

    // Page title — "Note 1" etc.
    ctx.globalAlpha = fa * 0.65;
    ctx.font = 'italic 12px Georgia';
    ctx.fillStyle = '#c4a878';
    ctx.fillText(page.title, cx, py + 52);

    // Page text — handwriting style, line by line
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const lines = page.text.split('\n');
    let ly = py + 72;
    for (const rawLine of lines) {
        // Word wrap within parchment width
        ctx.font = '11px Georgia';
        ctx.globalAlpha = fa * 0.75;
        ctx.fillStyle = '#b8a888';
        const maxW = pw - 60;
        const words = rawLine.split(' ');
        let curLine = '';
        for (const word of words) {
            const test = curLine + (curLine ? ' ' : '') + word;
            if (ctx.measureText(test).width > maxW) {
                ctx.fillText(curLine, px + 30, ly);
                ly += 18;
                curLine = word;
            } else {
                curLine = test;
            }
        }
        if (curLine) { ctx.fillText(curLine, px + 30, ly); ly += 18; }
        ly += 6; // paragraph gap
    }

    // Torn/damaged note at bottom
    ctx.globalAlpha = fa * 0.2;
    ctx.font = 'italic 9px Georgia';
    ctx.fillStyle = '#8a7a5a';
    ctx.textAlign = 'center';
    if (journalPage === pages.length - 1) {
        ctx.fillText('The remaining pages are torn or illegible.', cx, py + ph - 70);
    }

    // Page navigation
    const navY = py + ph - 40;
    ctx.textBaseline = 'middle';
    ctx.font = '10px monospace';

    // Previous page
    if (journalPage > 0) {
        ctx.globalAlpha = fa * 0.5;
        ctx.fillStyle = '#c4a878';
        ctx.textAlign = 'left';
        ctx.fillText('< prev', px + 20, navY);
    }

    // Page indicator
    ctx.globalAlpha = fa * 0.3;
    ctx.fillStyle = '#8a7a5a';
    ctx.textAlign = 'center';
    ctx.font = '9px monospace';
    ctx.fillText((journalPage + 1) + ' / ' + pages.length, cx, navY);

    // Next page
    if (journalPage < pages.length - 1) {
        ctx.globalAlpha = fa * 0.5;
        ctx.fillStyle = '#c4a878';
        ctx.textAlign = 'right';
        ctx.font = '10px monospace';
        ctx.fillText('next >', px + pw - 20, navY);
    }

    // Close hint
    ctx.globalAlpha = fa * 0.2;
    ctx.textAlign = 'center';
    ctx.font = '8px monospace';
    ctx.fillStyle = '#8a7a5a';
    ctx.fillText('ESC  to close', cx, py + ph - 14);

    ctx.restore();
}

// Equip an item from backpack
function equipItem(backpackIdx) {
    const item = inventory.backpack[backpackIdx];
    if (!item) return;
    const slot = item.slot;
    const current = inventory.equipped[slot];
    // Swap: unequip current to backpack, equip new
    inventory.backpack.splice(backpackIdx, 1);
    if (current) inventory.backpack.push(current);
    inventory.equipped[slot] = item;
}

// Unequip to backpack
function unequipItem(slot) {
    const item = inventory.equipped[slot];
    if (!item) return;
    if (inventory.backpack.length >= inventory.maxBackpack) return; // backpack full
    inventory.equipped[slot] = null;
    inventory.backpack.push(item);
}

// Drop item from backpack to world
function dropFromBackpack(backpackIdx) {
    const item = inventory.backpack[backpackIdx];
    if (!item) return;
    inventory.backpack.splice(backpackIdx, 1);
    dropItemInWorld(player.row + (Math.random() - 0.5) * 0.5, player.col + (Math.random() - 0.5) * 0.5, item);
}

// Calculate total stat bonuses from equipped gear (wizard/lich only)
function getEquipBonuses() {
    const form = FormSystem.currentForm;
    if (form !== 'wizard' && form !== 'lich') return {}; // no equipment for slime/skeleton
    const totals = {};
    for (const slot of EQUIP_SLOTS) {
        const item = inventory.equipped[slot];
        if (!item) continue;
        for (const [stat, val] of Object.entries(item.stats)) {
            totals[stat] = (totals[stat] || 0) + val;
        }
    }
    // Cap stacking
    if (totals.dmgReduc) totals.dmgReduc = Math.min(0.6, totals.dmgReduc);
    if (totals.atkSpeedMult) totals.atkSpeedMult = Math.min(1.0, totals.atkSpeedMult);
    if (totals.moveSpeedMult) totals.moveSpeedMult = Math.min(0.5, totals.moveSpeedMult);
    if (totals.manaRegenMult) totals.manaRegenMult = Math.min(1.5, totals.manaRegenMult);
    if (totals.dodgeCdReduc) totals.dodgeCdReduc = Math.min(0.8, totals.dodgeCdReduc);
    return totals;
}

// On enemy death — roll for loot
function rollEnemyLoot(enemy) {
    const dropChance = DROP_CHANCE_BASE;
    if (Math.random() < dropChance) {
        const item = generateItem(wave.current);
        dropItemInWorld(enemy.row, enemy.col, item);
    }
}

const openedChests = new Set();
const CHEST_INTERACT_RANGE = 2.2;

function getChestDef(row, col) {
    return CHEST_DEFS[`${row},${col}`] || { requiresKey: null, type: 'loot', label: 'Open' };
}

function isChestLocked(row, col) {
    const def = getChestDef(row, col);
    return def.requiresKey && !hasKeyItem(def.requiresKey);
}

function getNearbyChest() {
    const mapSize = floorMap.length;
    for (let r = 0; r < mapSize; r++) {
        for (let c = 0; c < mapSize; c++) {
            if (objectMap[r][c] !== 'chestClosed') continue;
            if (openedChests.has(`${r},${c}`)) continue;
            const dr = player.row - r;
            const dc = player.col - c;
            if (Math.sqrt(dr * dr + dc * dc) < CHEST_INTERACT_RANGE) {
                return { row: r, col: c };
            }
        }
    }
    return null;
}

function openChest(chest) {
    const key = `${chest.row},${chest.col}`;
    if (openedChests.has(key)) return;

    const def = getChestDef(chest.row, chest.col);

    // Check if locked
    if (def.requiresKey && !hasKeyItem(def.requiresKey)) {
        // Show "locked" feedback
        pickupTexts.push({
            text: 'Locked — you need a key',
            color: '#cc6644',
            row: chest.row, col: chest.col,
            offsetY: 0,
            life: 2.0,
        });
        return;
    }

    openedChests.add(key);
    objectMap[chest.row][chest.col] = 'chestOpen';
    sfxChestOpen();

    if (def.type === 'story') {
        // Grant key items from this chest
        for (const itemId of def.keyItems) {
            grantKeyItem(itemId);
        }
        pickupTexts.push({
            text: 'Ancient Chest Opened',
            color: '#cc88ff',
            row: chest.row, col: chest.col,
            offsetY: 0,
            life: 2.5,
        });
    } else {
        // Standard loot chest — drop a guaranteed item
        const item = generateItem(Math.min(wave.current + 1, RARITY_WEIGHTS_BY_WAVE.length - 1));
        dropItemInWorld(chest.row, chest.col, item);
        pickupTexts.push({
            text: 'Chest Opened!',
            color: '#ffd866',
            row: chest.row, col: chest.col,
            offsetY: 0,
            life: 2.0,
        });
    }
}

function drawChestPrompt() {
    if (gameDead || inventoryOpen || gamePaused) return;

//  ZONE LOADING SYSTEM
// ============================================================
function loadZone(zoneNumber) {
    currentZone = zoneNumber;

    // Apply zone-specific tile configuration
    applyZoneTileConfig(zoneNumber);

    const newMapSize = MAP_SIZE; // now set by applyZoneTileConfig

    // Reinitialize map arrays with correct size
    floorMap.length = 0;
    objectMap.length = 0;
    blocked.length = 0;
    blockType.length = 0;
    objRadius.length = 0;

    for (let i = 0; i < newMapSize; i++) {
        floorMap.push(Array(newMapSize).fill(null));
        objectMap.push(Array(newMapSize).fill(null));
        blocked.push(Array(newMapSize).fill(true));
        blockType.push(Array(newMapSize).fill(null));
        objRadius.push(Array(newMapSize).fill(0));
    }

    // Clear game state
    enemies.length = 0;
    projectiles.length = 0;
    worldDrops.length = 0;
    worldKeyDrops.length = 0;
    openedChests.clear();
    pickupTexts.length = 0;
    // Keep only ambient particles (no type), clear combat particles
    for (let i = particles.length - 1; i >= 0; i--) {
        if (particles[i].type) particles.splice(i, 1);
    }
    gameDead = false;

    // Generate the appropriate zone
    if (zoneNumber === 0) {
        // Town — outdoor safe zone
        generateTown();
        player.row = 27;   // spawn near south entrance (came from Undercroft)
        player.col = 15;
        player.vx = 0;
        player.vy = 0;
    } else if (zoneNumber === 1) {
        generateDungeon();
        player.row = 4;
        player.col = 3;
        player.vx = 0;
        player.vy = 0;
    } else if (zoneNumber === 2) {
        generateZone2();
        player.row = 4;
        player.col = 5;
        player.vx = 0;
        player.vy = 0;
    } else if (zoneNumber === 3) {
        // Zone 3: The Spire Throne Room — boss arena
        generateZone3();
        player.row = 3;
        player.col = 5;
        player.vx = 0;
        player.vy = 0;
    } else if (zoneNumber === 4) {
        // Zone 4: Placeholder (victory/ending)
        generateDungeon();  // reuse zone 1 layout as placeholder
        player.row = 4;
        player.col = 3;
        player.vx = 0;
        player.vy = 0;
    }

    // Update door and chest definitions for this zone
    updateDoorDefsForZone(zoneNumber);
    updateChestDefsForZone(zoneNumber);
    buildRoomBounds();  // Update room lighting/ambience for new zone

    // Reset wave system (only if zone has waves)
    const zoneCfg = ZONE_CONFIGS[zoneNumber];
    if (zoneCfg && zoneCfg.hasWaves) {
        startWaveSystem();
    } else {
        // No waves — set to a peaceful state
        wave.phase = 'zoneClear';
        wave.timer = 0;
        wave.bannerText = '';
        wave.bannerSub = '';
        wave.bannerAlpha = 0;
    }

    // Reset zone transition
    zoneTransition = null;

    // Restore full light for new zone
    lightRadius = MAX_LIGHT;

    // Update music to menu (calmer between zones)
    playMusic('menu', 2.0);

    // Reset camera
    smoothCamX = 0;
    smoothCamY = 0;
    cameraX = 0;
    cameraY = 0;

    // Switch to playing phase
    gamePhase = 'playing';
}

// Zone-specific door definitions (rebuilt per zone)
let DOOR_DEFS = {};
function updateDoorDefsForZone(zone) {
    if (zone === 1) {
        const townDoor = {
            requiresKey: null,          // UNLOCKED for testing
            label: 'Step Outside',
            lockedLabel: 'Sealed',
            destination: 'town',
        };
        DOOR_DEFS = {
            // DEBUG: Town exit right in the starting Cell — player spawns at (4,3)
            '1,4': townDoor,   // archway tile (north wall)
            '1,5': townDoor,   // archway tile (north wall)
            '2,4': townDoor,   // just inside
            '2,5': townDoor,   // just inside
            '3,4': townDoor,   // close to spawn
            '3,5': townDoor,   // close to spawn
            // Keep archway exits in Great Hall too
            '21,17': townDoor, '21,18': townDoor, '21,19': townDoor,
            '20,17': townDoor, '20,18': townDoor, '20,19': townDoor,
            // Spiral stairs → ascend to Zone 2 (Ruined Tower)
            '19,13': {
                requiresKey: 'dungeon_key',
                label: 'Ascend',
                lockedLabel: 'Locked',
                destination: 'zone2',
            },
        };
    } else if (zone === 2) {
        DOOR_DEFS = {
            '26,8': {
                requiresKey: 'zone2_key',
                label: 'Ascend',
                lockedLabel: 'Locked',
                destination: 'zone3',
            },
        };
    } else if (zone === 3) {
        DOOR_DEFS = {
            '19,16': {
                requiresKey: 'zone3_exit_key',  // Boss drops this key on death
                label: 'Ascend',
                lockedLabel: 'Locked',
                destination: 'zone4',
            },
        };
    } else if (zone === 0) {
        // Town doors — south back to Undercroft, north up to Ruined Tower
        DOOR_DEFS = {
            '28,14': {
                requiresKey: null,
                label: 'Descend',
                lockedLabel: 'Locked',
                destination: 'zone1',
            },
            '1,14': {
                requiresKey: null,
                label: 'Ascend',
                lockedLabel: 'Locked',
                destination: 'zone2',
            },
        };
    } else if (zone === 4) {
        DOOR_DEFS = {};  // Zone 4 placeholder — no transitions
    }
}
const DOOR_INTERACT_RANGE = 2.2;
let zoneTransition = null; // null or { timer, phase, destination }

function getNearbyDoor() {
    for (const [key, def] of Object.entries(DOOR_DEFS)) {
        const [r, c] = key.split(',').map(Number);
        const dr = player.row - r;
        const dc = player.col - c;
        if (Math.sqrt(dr * dr + dc * dc) < DOOR_INTERACT_RANGE) {
            return { row: r, col: c, def };
        }
    }
    return null;
}

function isDoorLocked(row, col) {
    const def = DOOR_DEFS[`${row},${col}`];
    return def && def.requiresKey && !hasKeyItem(def.requiresKey);
}

function tryUseDoor(door) {
    if (door.def.requiresKey && !hasKeyItem(door.def.requiresKey)) {
        pickupTexts.push({
            text: 'Locked — you need a key',
            color: '#cc6644',
            row: door.row, col: door.col,
            offsetY: 0,
            life: 2.0,
        });
        return;
    }

    // Begin zone transition
    zoneTransition = {
        timer: 0,
        phase: 'fadeOut',   // fadeOut → message → hold
        destination: door.def.destination,
        totalFade: 2.0,
        messageTimer: 0,
    };
    // Fade out music
    playMusic('menu', 3.0);
}

function updateZoneTransition(dt) {
    if (!zoneTransition) return false;
    const zt = zoneTransition;

    if (zt.phase === 'fadeOut') {
        zt.timer += dt;
        if (zt.timer >= zt.totalFade) {
            zt.phase = 'message';
            zt.timer = 0;
            // Actually load the zone when fade completes
            let nextZone = 1;
            if (zt.destination === 'town') nextZone = 0;
            else if (zt.destination === 'zone1') nextZone = 1;
            else if (zt.destination === 'zone2') nextZone = 2;
            else if (zt.destination === 'zone3') nextZone = 3;
            else if (zt.destination === 'zone4') nextZone = 4;
            loadZone(nextZone);
        }
    } else if (zt.phase === 'message') {
        zt.timer += dt;
        if (zt.timer >= 5.0) {
            zt.phase = 'hold';
        }
    }
    // 'hold' phase: zone is loaded, player can interact
    return true; // signal that transition is active
}

function drawZoneTransition() {
    if (!zoneTransition) return;
    const zt = zoneTransition;

    ctx.save();
    const cx = canvasW / 2;
    const cy = canvasH / 2;

    if (zt.phase === 'fadeOut') {
        // Black fade overlay
        ctx.globalAlpha = Math.min(1, zt.timer / zt.totalFade);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvasW, canvasH);
    } else if (zt.phase === 'message') {
        // Show message on full black screen
        // Calculate fade-out at the end of the message phase
        const fadeOutStart = 3.5;
        const fadeOutFade = 0.5;
        let screenAlpha = 1;
        if (zt.timer > fadeOutStart) {
            screenAlpha = Math.max(0, 1 - (zt.timer - fadeOutStart) / fadeOutFade);
        }

        ctx.globalAlpha = screenAlpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvasW, canvasH);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Title text fades in
        const textAlpha = Math.min(1, zt.timer / 1.5) * screenAlpha;
        ctx.globalAlpha = textAlpha;
        ctx.font = '36px Georgia';
        ctx.fillStyle = '#d4b878';
        ctx.shadowColor = 'rgba(200, 160, 80, 0.4)';
        ctx.shadowBlur = 20;
        // Zone-specific transition text
        let transitionText = 'You ascend higher...';
        let subtitleText = 'The air grows thinner.';
        if (zt.destination === 'town') {
            transitionText = 'Light floods through the archway...';
            subtitleText = 'The world opens before you.';
        } else if (zt.destination === 'zone1') {
            transitionText = 'You descend into darkness...';
            subtitleText = 'The Undercroft awaits below.';
        } else if (zt.destination === 'zone2') {
            transitionText = 'You ascend higher...';
            subtitleText = 'The tower beckons above.';
        } else if (zt.destination === 'zone3') {
            transitionText = 'You ascend further...';
            subtitleText = 'The spire looms ahead.';
        } else if (zt.destination === 'zone4') {
            transitionText = 'The spire opens to daylight...';
            subtitleText = 'Freedom lies beyond.';
        }
        ctx.fillText(transitionText, cx, cy - 30);
        ctx.shadowBlur = 0;

        // Subtitle fades in later
        const subAlpha = Math.max(0, Math.min(1, (zt.timer - 1.5) / 1.5)) * screenAlpha;
        ctx.globalAlpha = subAlpha;
        ctx.font = 'italic 16px Georgia';
        ctx.fillStyle = '#8a7a5a';
        ctx.fillText(subtitleText, cx, cy + 15);
    } else if (zt.phase === 'hold') {
        // Zone loaded, but still showing fade-in effect
        const fadeInDuration = 2.0;
        const fadeInAlpha = Math.max(0, 1 - zt.timer / fadeInDuration);
        ctx.globalAlpha = fadeInAlpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvasW, canvasH);

        // After fade-in completes, clear the transition
        if (zt.timer > fadeInDuration) {
            zoneTransition = null;
        }
    }

    ctx.restore();
}

function drawDoorPrompt() {
    if (gameDead || inventoryOpen || gamePaused || zoneTransition) return;
    const door = getNearbyDoor();
    if (!door) return;

    const locked = isDoorLocked(door.row, door.col);
    const pos = tileToScreen(door.row, door.col);
    const sx = pos.x + cameraX;
    const sy = pos.y + cameraY - 70;

    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const pulse = 0.6 + Math.sin(performance.now() / 500) * 0.2;

    // Key badge
    ctx.globalAlpha = pulse * 0.7;
    ctx.fillStyle = locked ? '#1a0808' : '#08101a';
    ctx.strokeStyle = locked ? '#884444' : '#6688aa';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(sx - 14, sy - 10, 28, 20, 4);
    ctx.fill();
    ctx.stroke();

    ctx.globalAlpha = pulse * 0.9;
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = locked ? '#cc6644' : '#a0c8e0';
    ctx.fillText('E', sx, sy);

    // Label
    ctx.globalAlpha = pulse * (locked ? 0.6 : 0.5);
    ctx.font = 'italic 10px Georgia';
    ctx.fillStyle = locked ? '#aa5544' : '#8ab0cc';
    ctx.fillText(locked ? (door.def.lockedLabel || 'Locked') : (door.def.label || 'Enter'), sx, sy + 18);

    ctx.restore();
}

// ---- 9-SLICE PANEL RENDERER ----
// Draws a 48x48 panel sprite scaled to any size using 9-slice method
// border = pixels of source to keep unscaled on each edge (default 6)
function draw9Slice(img, x, y, w, h, border, tintColor, tintAlpha) {
    if (!img) return;
    const b = border || 6;
    const sw = img.width;
    const sh = img.height;
    const sb = b; // source border

    ctx.save();
    // If tinting, we draw to get the white panel then tint with multiply
    ctx.drawImage(img, 0, 0, sb, sb, x, y, b, b); // TL
    ctx.drawImage(img, sw - sb, 0, sb, sb, x + w - b, y, b, b); // TR
    ctx.drawImage(img, 0, sh - sb, sb, sb, x, y + h - b, b, b); // BL
    ctx.drawImage(img, sw - sb, sh - sb, sb, sb, x + w - b, y + h - b, b, b); // BR
    ctx.drawImage(img, sb, 0, sw - sb * 2, sb, x + b, y, w - b * 2, b); // T
    ctx.drawImage(img, sb, sh - sb, sw - sb * 2, sb, x + b, y + h - b, w - b * 2, b); // B
    ctx.drawImage(img, 0, sb, sb, sh - sb * 2, x, y + b, b, h - b * 2); // L
    ctx.drawImage(img, sw - sb, sb, sb, sh - sb * 2, x + w - b, y + b, b, h - b * 2); // R
    ctx.drawImage(img, sb, sb, sw - sb * 2, sh - sb * 2, x + b, y + b, w - b * 2, h - b * 2); // Center

    // Apply dark tint over the white panel
    if (tintColor) {
        ctx.globalCompositeOperation = 'multiply';
        ctx.globalAlpha = tintAlpha || 1.0;
        ctx.fillStyle = tintColor;
        ctx.fillRect(x, y, w, h);
        ctx.globalCompositeOperation = 'source-over';
    }
    ctx.restore();
}

// Draw a pixel-art divider sprite, stretched horizontally
function drawSpriteDivider(img, cx, y, width) {
    if (!img) return;
    const h = img.height;
    const drawH = h * 2; // scale up 2x for visibility
    const drawW = width;
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, cx - drawW / 2, y - drawH / 2, drawW, drawH);
    ctx.imageSmoothingEnabled = true;
    ctx.restore();
}

function drawGameMenu() {
    if (!menuOpen) return;

    menuFadeInTimer = Math.min(1, menuFadeInTimer + 0.05);
    const fa = menuFadeInTimer;
    // Book-open animation: horizontal scale from 0 → 1
    const bookOpenProgress = Math.min(1, menuFadeInTimer * 2.5); // opens in ~0.4s
    const bookScaleX = 0.3 + 0.7 * (1 - Math.pow(1 - bookOpenProgress, 3)); // ease-out cubic
    const bookScaleY = 0.8 + 0.2 * bookOpenProgress;

    ctx.save();
    const cx = canvasW / 2;
    const cy = canvasH / 2;

    // --- Full-screen dark vignette overlay ---
    ctx.globalAlpha = fa * 0.82;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvasW, canvasH);
    // Radial vignette — lighter in center
    const vig = ctx.createRadialGradient(cx, cy, 100, cx, cy, Math.max(canvasW, canvasH) * 0.7);
    vig.addColorStop(0, 'rgba(20,16,12,0.0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.globalAlpha = fa;
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, canvasW, canvasH);

    // --- Panel dimensions ---
    const pw = 540, ph = 540;
    const px = cx - pw / 2, py = cy - ph / 2;

    // --- Apply book-open transform ---
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(bookScaleX, bookScaleY);
    ctx.translate(-cx, -cy);

    // --- Procedural panel background ---
    // Outer glow
    ctx.globalAlpha = fa * 0.15;
    ctx.shadowColor = '#c49040';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#0a0806';
    ctx.fillRect(px - 6, py - 6, pw + 12, ph + 12);
    ctx.shadowBlur = 0;

    // Main dark fill with subtle gradient
    ctx.globalAlpha = fa * 0.95;
    const panelBg = ctx.createLinearGradient(px, py, px, py + ph);
    panelBg.addColorStop(0, '#1a1510');
    panelBg.addColorStop(0.3, '#100c08');
    panelBg.addColorStop(0.7, '#0e0a06');
    panelBg.addColorStop(1, '#141008');
    ctx.fillStyle = panelBg;
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 4);
    ctx.fill();

    // Subtle horizontal line texture
    ctx.globalAlpha = fa * 0.03;
    ctx.strokeStyle = '#886830';
    ctx.lineWidth = 0.5;
    for (let ly = py + 8; ly < py + ph - 8; ly += 6) {
        ctx.beginPath();
        ctx.moveTo(px + 8, ly);
        ctx.lineTo(px + pw - 8, ly);
        ctx.stroke();
    }

    // Double border frame — outer dark, inner gold
    ctx.globalAlpha = fa * 0.6;
    ctx.strokeStyle = '#0a0806';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(px - 2, py - 2, pw + 4, ph + 4, 5);
    ctx.stroke();
    ctx.globalAlpha = fa * 0.5;
    ctx.strokeStyle = '#8a7030';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 4);
    ctx.stroke();
    ctx.globalAlpha = fa * 0.25;
    ctx.strokeStyle = '#c49040';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(px + 3, py + 3, pw - 6, ph - 6, 3);
    ctx.stroke();

    // Corner filigree (small L-shapes at each corner)
    ctx.globalAlpha = fa * 0.35;
    ctx.strokeStyle = '#c49040';
    ctx.lineWidth = 1;
    const fl = 14; // filigree arm length
    const fo = 6;  // offset from panel edge
    // Top-left
    ctx.beginPath(); ctx.moveTo(px + fo, py + fo + fl); ctx.lineTo(px + fo, py + fo); ctx.lineTo(px + fo + fl, py + fo); ctx.stroke();
    // Top-right
    ctx.beginPath(); ctx.moveTo(px + pw - fo - fl, py + fo); ctx.lineTo(px + pw - fo, py + fo); ctx.lineTo(px + pw - fo, py + fo + fl); ctx.stroke();
    // Bottom-left
    ctx.beginPath(); ctx.moveTo(px + fo, py + ph - fo - fl); ctx.lineTo(px + fo, py + ph - fo); ctx.lineTo(px + fo + fl, py + ph - fo); ctx.stroke();
    // Bottom-right
    ctx.beginPath(); ctx.moveTo(px + pw - fo - fl, py + ph - fo); ctx.lineTo(px + pw - fo, py + ph - fo); ctx.lineTo(px + pw - fo, py + ph - fo - fl); ctx.stroke();

    // Warm inner glow
    ctx.globalAlpha = fa * 0.04;
    const innerGlow = ctx.createRadialGradient(cx, cy, 20, cx, cy, pw * 0.6);
    innerGlow.addColorStop(0, '#c49040');
    innerGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = innerGlow;
    ctx.fillRect(px, py, pw, ph);

    // --- Title with embossed look ---
    ctx.globalAlpha = fa;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Shadow text (emboss bottom)
    ctx.font = 'small-caps bold 22px Georgia';
    ctx.fillStyle = '#000';
    ctx.globalAlpha = fa * 0.5;
    ctx.fillText('Grimoire', cx, py + 30 + 1);
    // Main text
    ctx.globalAlpha = fa * 0.85;
    ctx.fillStyle = GM.gold;
    ctx.fillText('Grimoire', cx, py + 30);

    // --- Divider under title ---
    _drawDivider(cx, py + 46, pw * 0.35, fa);

    // --- Tab bar (equipment only for wizard/lich) ---
    const _form = FormSystem.currentForm;
    const _hasEquip = (_form === 'wizard' || _form === 'lich');
    const tabs = [
        { id: 'status',    label: 'STATUS',    icon: 'status' },
        ...(_hasEquip ? [{ id: 'equipment', label: 'EQUIPMENT', icon: 'equip' }] : []),
        { id: 'keyitems',  label: 'KEY ITEMS', icon: 'key' },
        { id: 'quests',    label: 'QUESTS',    icon: 'quest' },
        { id: 'map',       label: 'MAP',       icon: 'map' },
    ];
    const tabY = py + 60;
    const tabH = 30;
    const tabGap = 4;
    const totalTabW = pw - 48;
    const tabW = (totalTabW - tabGap * (tabs.length - 1)) / tabs.length;

    for (let i = 0; i < tabs.length; i++) {
        const t = tabs[i];
        const tx = px + 24 + i * (tabW + tabGap);
        const isActive = menuTab === t.id;

        // Tab background
        ctx.globalAlpha = fa * (isActive ? 0.6 : 0.12);
        const tabGrad = ctx.createLinearGradient(tx, tabY, tx, tabY + tabH);
        if (isActive) {
            tabGrad.addColorStop(0, '#2a2218');
            tabGrad.addColorStop(1, '#1a1610');
        } else {
            tabGrad.addColorStop(0, '#141210');
            tabGrad.addColorStop(1, '#0e0c0a');
        }
        ctx.fillStyle = tabGrad;
        ctx.beginPath();
        ctx.roundRect(tx, tabY, tabW, tabH, 3);
        ctx.fill();

        // Active tab: bottom highlight line
        if (isActive) {
            ctx.globalAlpha = fa * 0.6;
            ctx.strokeStyle = GM.gold;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(tx + 6, tabY + tabH);
            ctx.lineTo(tx + tabW - 6, tabY + tabH);
            ctx.stroke();
        }

        // Tab border
        ctx.globalAlpha = fa * (isActive ? 0.3 : 0.08);
        ctx.strokeStyle = GM.goldDim;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.roundRect(tx, tabY, tabW, tabH, 3);
        ctx.stroke();

        // Tab icon (small symbolic shape)
        const iconCx = tx + 14;
        const iconCy = tabY + tabH / 2;
        ctx.globalAlpha = fa * (isActive ? 0.7 : 0.3);
        ctx.fillStyle = isActive ? GM.gold : GM.goldDim;
        ctx.strokeStyle = isActive ? GM.gold : GM.goldDim;
        ctx.lineWidth = 1.2;
        _drawTabIcon(t.icon, iconCx, iconCy, 5);

        // Tab label
        ctx.globalAlpha = fa * (isActive ? 0.9 : 0.35);
        ctx.font = isActive ? 'small-caps bold 10px Georgia' : 'small-caps 9px Georgia';
        ctx.fillStyle = isActive ? GM.textLight : GM.textDim;
        ctx.textAlign = 'center';
        ctx.fillText(t.label, tx + tabW / 2 + 6, tabY + tabH / 2 + 1);
    }

    // --- Content area ---
    const contentY = tabY + tabH + 14;
    const contentX = px + 24;
    const contentW = pw - 48;
    const contentH = py + ph - contentY - 32;

    // Subtle inset for content area
    ctx.globalAlpha = fa * 0.06;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.roundRect(contentX - 6, contentY - 4, contentW + 12, contentH + 8, 4);
    ctx.fill();
    ctx.globalAlpha = fa * 0.08;
    ctx.strokeStyle = GM.goldFaint;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(contentX - 6, contentY - 4, contentW + 12, contentH + 8, 4);
    ctx.stroke();

    // --- Draw tab content ---
    ctx.globalAlpha = fa;
    if (menuTab === 'status')         drawMenuStatus(contentX, contentY, contentW, contentH, fa);
    else if (menuTab === 'equipment') drawMenuEquipment(contentX, contentY, contentW, contentH, fa);
    else if (menuTab === 'keyitems')  drawMenuKeyItems(contentX, contentY, contentW, contentH, fa);
    else if (menuTab === 'quests')    drawMenuQuests(contentX, contentY, contentW, contentH, fa);
    else if (menuTab === 'map')       drawMenuMap(contentX, contentY, contentW, contentH, fa);

    // --- Bottom close hint ---
    ctx.globalAlpha = fa * 0.2;
    ctx.font = '8px monospace';
    ctx.fillStyle = GM.textDim;
    ctx.textAlign = 'center';
    ctx.fillText((menuTab === 'equipment' && (_hasEquip)) ? 'I  or  TAB  to close' : 'TAB  to close', cx, py + ph - 12);

    ctx.restore(); // book-open transform
    ctx.restore();
}

// --- Corner filigree decoration ---
function _drawCornerFiligree(px, py, pw, ph, fa) {
    const L = 22, S = 8;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';

    const corners = [
        { x: px, y: py, dx: 1, dy: 1 },
        { x: px + pw, y: py, dx: -1, dy: 1 },
        { x: px, y: py + ph, dx: 1, dy: -1 },
        { x: px + pw, y: py + ph, dx: -1, dy: -1 },
    ];
    for (const c of corners) {
        // L-shape
        ctx.globalAlpha = fa * 0.3;
        ctx.strokeStyle = GM.goldDim;
        ctx.beginPath();
        ctx.moveTo(c.x + c.dx * L, c.y);
        ctx.lineTo(c.x, c.y);
        ctx.lineTo(c.x, c.y + c.dy * L);
        ctx.stroke();

        // Small diamond at corner
        ctx.globalAlpha = fa * 0.25;
        ctx.fillStyle = GM.gold;
        const d = 3;
        ctx.beginPath();
        ctx.moveTo(c.x + c.dx * S, c.y + c.dy * S - d);
        ctx.lineTo(c.x + c.dx * S + d, c.y + c.dy * S);
        ctx.lineTo(c.x + c.dx * S, c.y + c.dy * S + d);
        ctx.lineTo(c.x + c.dx * S - d, c.y + c.dy * S);
        ctx.fill();
    }
}

// --- Divider line with center diamond and fade ---
function _drawDivider(cx, cy, halfW, fa) {
    // Fading lines
    const lineGrad = ctx.createLinearGradient(cx - halfW, cy, cx, cy);
    lineGrad.addColorStop(0, 'rgba(138,112,64,0)');
    lineGrad.addColorStop(1, 'rgba(138,112,64,0.5)');
    ctx.globalAlpha = fa * 0.4;
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(cx - halfW, cy); ctx.lineTo(cx - 6, cy); ctx.stroke();

    const lineGrad2 = ctx.createLinearGradient(cx, cy, cx + halfW, cy);
    lineGrad2.addColorStop(0, 'rgba(138,112,64,0.5)');
    lineGrad2.addColorStop(1, 'rgba(138,112,64,0)');
    ctx.strokeStyle = lineGrad2;
    ctx.beginPath(); ctx.moveTo(cx + 6, cy); ctx.lineTo(cx + halfW, cy); ctx.stroke();

    // Center diamond
    ctx.globalAlpha = fa * 0.4;
    ctx.fillStyle = GM.gold;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 3); ctx.lineTo(cx + 3, cy);
    ctx.lineTo(cx, cy + 3); ctx.lineTo(cx - 3, cy);
    ctx.fill();
}

// --- Tab icons (small symbolic shapes) ---
function _drawTabIcon(type, cx, cy, s) {
    ctx.beginPath();
    if (type === 'status') {
        // Shield shape
        ctx.moveTo(cx, cy - s);
        ctx.lineTo(cx + s, cy - s * 0.3);
        ctx.lineTo(cx + s * 0.8, cy + s * 0.6);
        ctx.lineTo(cx, cy + s);
        ctx.lineTo(cx - s * 0.8, cy + s * 0.6);
        ctx.lineTo(cx - s, cy - s * 0.3);
        ctx.closePath();
        ctx.stroke();
    } else if (type === 'equip') {
        // Sword shape
        ctx.moveTo(cx, cy - s);
        ctx.lineTo(cx, cy + s * 0.4);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx - s * 0.5, cy);
        ctx.lineTo(cx + s * 0.5, cy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx - s * 0.25, cy + s * 0.7);
        ctx.lineTo(cx + s * 0.25, cy + s * 0.7);
        ctx.lineTo(cx + s * 0.15, cy + s);
        ctx.lineTo(cx - s * 0.15, cy + s);
        ctx.closePath();
        ctx.fill();
    } else if (type === 'key') {
        // Key shape
        ctx.arc(cx, cy - s * 0.3, s * 0.4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, cy + s * 0.1);
        ctx.lineTo(cx, cy + s);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, cy + s * 0.6);
        ctx.lineTo(cx + s * 0.3, cy + s * 0.6);
        ctx.stroke();
    } else if (type === 'quest') {
        // Scroll shape
        ctx.moveTo(cx - s * 0.5, cy - s);
        ctx.lineTo(cx - s * 0.5, cy + s * 0.7);
        ctx.quadraticCurveTo(cx - s * 0.5, cy + s, cx - s * 0.2, cy + s);
        ctx.lineTo(cx + s * 0.5, cy + s);
        ctx.stroke();
        // horizontal lines (text)
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(cx - s * 0.2, cy - s * 0.5 + i * s * 0.45);
            ctx.lineTo(cx + s * 0.4, cy - s * 0.5 + i * s * 0.45);
            ctx.stroke();
        }
    }
}

// --- Stat bar helper ---
function _drawStatBar(x, y, w, h, ratio, col1, col2, fa) {
    // Dark track background
    ctx.globalAlpha = fa * 0.6;
    ctx.fillStyle = '#0a0806';
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 2);
    ctx.fill();

    // Gradient fill
    if (ratio > 0) {
        ctx.globalAlpha = fa * 0.8;
        const g = ctx.createLinearGradient(x, y, x, y + h);
        g.addColorStop(0, col2);
        g.addColorStop(0.5, col1);
        g.addColorStop(1, col2);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.roundRect(x, y, Math.max(2, w * ratio), h, 2);
        ctx.fill();

        // Highlight stripe on top
        ctx.globalAlpha = fa * 0.15;
        ctx.fillStyle = '#fff';
        ctx.fillRect(x + 1, y + 1, Math.max(1, w * ratio - 2), 1);
    }

    // Track border
    ctx.globalAlpha = fa * 0.3;
    ctx.strokeStyle = '#8a7040';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 2);
    ctx.stroke();
}

// ===== STATUS TAB =====
function drawMenuStatus(x, y, w, h, fa) {
    ctx.save();
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';

    let ly = y + 6;

    const barH = 10;

    ctx.font = 'italic 11px Georgia';
    ctx.fillStyle = GM.textDim;
    ctx.fillText(playerName, x, ly);
    // Level on right
    ctx.textAlign = 'right';
    ctx.globalAlpha = fa * 0.85;
    ctx.font = 'small-caps bold 13px Georgia';
    ctx.fillStyle = GM.gold;
    ctx.fillText('Level ' + xpState.level, x + w, ly);
    ctx.textAlign = 'left';
    ly += 22;

    // --- XP bar ---
    const xpRatio = xpState.xp / xpState.xpToNext;
    ctx.globalAlpha = fa * 0.4;
    ctx.font = '9px Georgia';
    ctx.fillStyle = labelCol;
    ctx.fillText('Experience', x, ly);
    ctx.textAlign = 'right';
    ctx.fillStyle = GM.textDim;
    ctx.fillText(`${xpState.xp} / ${xpState.xpToNext}`, x + w, ly);
    ctx.textAlign = 'left';
    ly += 14;
    _drawStatBar(x, ly, w, barH, xpRatio, GM.xpAmber, GM.xpAmberLit, fa);
    ly += barH + 18;

    // --- HP ---
    ctx.globalAlpha = fa * 0.7;
    ctx.font = '10px Georgia';
    ctx.fillStyle = labelCol;
    ctx.fillText('Health', x, ly);
    ctx.textAlign = 'right';
    ctx.fillStyle = valCol;
    ctx.globalAlpha = fa * 0.6;
    ctx.fillText(`${Math.round(player.hp)} / ${MAX_HP}`, x + w, ly);
    ctx.textAlign = 'left';
    ly += 15;
    _drawStatBar(x, ly, w, barH, player.hp / MAX_HP, GM.hpRed, GM.hpRedLit, fa);
    ly += barH + 18;

    // --- Mana ---
    ctx.globalAlpha = fa * 0.7;
    ctx.font = '10px Georgia';
    ctx.fillStyle = labelCol;
    ctx.fillText('Mana', x, ly);
    ctx.textAlign = 'right';
    ctx.fillStyle = valCol;
    ctx.globalAlpha = fa * 0.6;
    ctx.fillText(`${Math.round(player.mana)} / ${MAX_MANA}`, x + w, ly);
    ctx.textAlign = 'left';
    ly += 15;
    _drawStatBar(x, ly, w, barH, player.mana / MAX_MANA, GM.manaBlue, GM.manaBluLit, fa);
    ly += barH + 24;

    // --- Divider ---
    _drawDivider(x + w / 2, ly, w * 0.3, fa);
    ly += 14;

    // --- Stat rows ---
    const eb = getEquipBonuses();
    const statRows = [
        { label: 'Wand Damage',  value: FIREBALL_DAMAGE + (eb.dmgBonus || 0) },
        { label: 'Creatures Slain', value: wave.totalKilled },
        { label: 'Zone', value: currentZone },
    ];
    ctx.font = '10px Georgia';
    for (const s of statRows) {
        ctx.globalAlpha = fa * 0.45;
        ctx.fillStyle = labelCol;
        ctx.textAlign = 'left';
        ctx.fillText(s.label, x, ly);
        ctx.globalAlpha = fa * 0.7;
        ctx.fillStyle = valCol;
        ctx.textAlign = 'right';
        ctx.fillText('' + s.value, x + w, ly);
        ly += 20;
    }

    ctx.restore();
}

// ===== EQUIPMENT TAB (unified inventory) =====
// Layout helpers for equipment tab — used by both drawing and click handling
const GRIM_EQUIP_SIZE = 52;
const GRIM_BP_SIZE = 46;
const GRIM_BP_GAP = 5;
const GRIM_BP_COLS = 4;

function getGrimEquipRect(slotIdx, x, y, w) {
    const totalW = EQUIP_SLOTS.length * GRIM_EQUIP_SIZE + (EQUIP_SLOTS.length - 1) * 10;
    const sx = x + (w - totalW) / 2;
    const sy = y + 4;
    return { x: sx + slotIdx * (GRIM_EQUIP_SIZE + 10), y: sy, w: GRIM_EQUIP_SIZE, h: GRIM_EQUIP_SIZE };
}

function getGrimBpRect(idx, x, y, w) {
    const totalW = GRIM_BP_COLS * GRIM_BP_SIZE + (GRIM_BP_COLS - 1) * GRIM_BP_GAP;
    const sx = x + (w - totalW) / 2;
    const sy = y + GRIM_EQUIP_SIZE + 52;
    const col = idx % GRIM_BP_COLS;
    const row = Math.floor(idx / GRIM_BP_COLS);
    return { x: sx + col * (GRIM_BP_SIZE + GRIM_BP_GAP), y: sy + row * (GRIM_BP_SIZE + GRIM_BP_GAP), w: GRIM_BP_SIZE, h: GRIM_BP_SIZE };
}

function getGrimDropRect(x, y, w, h) {
    const bw = 110, bh = 26;
    return { x: x + w / 2 - bw / 2, y: y + h - 30, w: bw, h: bh };
}

// Track hovered item in equipment tab for tooltip
let grimEquipTooltipItem = null;

function drawMenuEquipment(x, y, w, h, fa) {
    ctx.save();
    grimEquipTooltipItem = null;

    // === EQUIPPED GEAR SLOTS ===
    for (let i = 0; i < EQUIP_SLOTS.length; i++) {
        const slot = EQUIP_SLOTS[i];
        const rect = getGrimEquipRect(i, x, y, w);
        const item = inventory.equipped[slot];
        const hovered = mouse.x >= rect.x && mouse.x <= rect.x + rect.w &&
                        mouse.y >= rect.y && mouse.y <= rect.y + rect.h;

        if (hovered && item) grimEquipTooltipItem = item;

        drawItemSlot(rect.x, rect.y, rect.w, rect.h, item, hovered, true, slot);

        // Slot label below
        ctx.globalAlpha = fa * (item ? 0.5 : 0.25);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.font = '8px monospace';
        ctx.fillStyle = item ? RARITY[item.rarity].color : '#8a7a5a';
        ctx.fillText(SLOT_LABELS[slot].toUpperCase(), rect.x + rect.w / 2, rect.y + rect.h + 3);
    }

    // === BACKPACK SEPARATOR ===
    const sepY = y + GRIM_EQUIP_SIZE + 30;
    ctx.globalAlpha = fa * 0.12;
    ctx.strokeStyle = GM.goldFaint;
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x + 40, sepY); ctx.lineTo(x + w - 40, sepY); ctx.stroke();

    ctx.globalAlpha = fa * 0.35;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '9px monospace';
    ctx.fillStyle = '#a89060';
    ctx.fillText('BACKPACK', x + w / 2, sepY + 10);

    // === BACKPACK GRID ===
    for (let i = 0; i < inventory.maxBackpack; i++) {
        const rect = getGrimBpRect(i, x, y, w);
        const item = inventory.backpack[i] || null;
        const hovered = mouse.x >= rect.x && mouse.x <= rect.x + rect.w &&
                        mouse.y >= rect.y && mouse.y <= rect.y + rect.h;

        if (hovered && item) grimEquipTooltipItem = item;

        drawItemSlot(rect.x, rect.y, rect.w, rect.h, item, hovered, false, null);
    }

    // === DROP BUTTON ===
    const dropRect = getGrimDropRect(x, y, w, h);
    const dropHovered = mouse.x >= dropRect.x && mouse.x <= dropRect.x + dropRect.w &&
                        mouse.y >= dropRect.y && mouse.y <= dropRect.y + dropRect.h;

    ctx.globalAlpha = fa * (dropHovered ? 0.55 : 0.25);
    ctx.fillStyle = '#140808';
    ctx.beginPath(); ctx.roundRect(dropRect.x, dropRect.y, dropRect.w, dropRect.h, 3); ctx.fill();
    ctx.globalAlpha = fa * (dropHovered ? 0.6 : 0.2);
    ctx.strokeStyle = dropHovered ? '#aa4444' : '#443333';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(dropRect.x, dropRect.y, dropRect.w, dropRect.h, 3); ctx.stroke();

    ctx.globalAlpha = fa * (dropHovered ? 0.75 : 0.35);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '9px monospace';
    ctx.fillStyle = dropHovered ? '#cc6666' : '#886666';
    ctx.fillText('DROP ITEM', dropRect.x + dropRect.w / 2, dropRect.y + dropRect.h / 2);

    // === TOOLTIP (drawn last, on top) ===
    if (grimEquipTooltipItem) {
        drawItemTooltip(grimEquipTooltipItem, mouse.x, mouse.y);
    }

    ctx.restore();
}

// ===== KEY ITEMS TAB =====
// Clickable key item regions (rebuilt each frame by drawMenuKeyItems)
const _keyItemClickRects = [];

function drawMenuKeyItems(x, y, w, h, fa) {
    ctx.save();
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    _keyItemClickRects.length = 0;

    let ly = y + 6;

    if (keyItems.length === 0) {
        ctx.globalAlpha = fa * 0.3;
        ctx.font = 'italic 11px Georgia';
        ctx.fillStyle = GM.textDim;
        ctx.fillText('Nothing of note discovered.', x, ly);
        ly += 28;
        ctx.globalAlpha = fa * 0.15;
        ctx.font = 'italic 9px Georgia';
        ctx.fillText('Explore the dungeon to find items of power.', x, ly);
        ctx.restore();
        return;
    }

    for (const item of keyItems) {
        const itemStartY = ly;
        const def = KEY_ITEM_DEFS[item.id];
        const hasPages = def && def.pages && def.pages.length > 0;

        // Item icon — small diamond in item color
        ctx.globalAlpha = fa * 0.6;
        ctx.fillStyle = item.color;
        const dx = x + 6, dy = ly + 6;
        ctx.beginPath();
        ctx.moveTo(dx, dy - 4); ctx.lineTo(dx + 4, dy);
        ctx.lineTo(dx, dy + 4); ctx.lineTo(dx - 4, dy);
        ctx.fill();

        // Item name
        ctx.globalAlpha = fa * 0.85;
        ctx.font = 'bold 11px Georgia';
        ctx.fillStyle = item.color;
        ctx.fillText(item.name, x + 16, ly);

        // "Read" hint for items with pages
        if (hasPages) {
            ctx.globalAlpha = fa * 0.35;
            ctx.font = '8px monospace';
            ctx.fillStyle = '#c4a878';
            ctx.textAlign = 'right';
            ctx.fillText('[ read ]', x + w, ly + 2);
            ctx.textAlign = 'left';
        }
        ly += 16;

        // Description word-wrapped
        ctx.globalAlpha = fa * 0.35;
        ctx.font = 'italic 9px Georgia';
        ctx.fillStyle = GM.textMid;
        const words = item.desc.split(' ');
        let line = '';
        for (const word of words) {
            const test = line + (line ? ' ' : '') + word;
            if (ctx.measureText(test).width > w - 24) {
                ctx.fillText(line, x + 16, ly);
                ly += 12;
                line = word;
            } else {
                line = test;
            }
        }
        if (line) { ctx.fillText(line, x + 16, ly); ly += 12; }
        ly += 14;

        // Store clickable rect for items with pages
        if (hasPages) {
            _keyItemClickRects.push({ x: x, y: itemStartY, w: w, h: ly - itemStartY, itemId: item.id });
        }
    }

    ctx.restore();
}

// ===== QUESTS TAB =====
function drawMenuQuests(x, y, w, h, fa) {
    ctx.save();
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';

    let ly = y + 6;

    // Build dynamic quest entries based on game state
    const quests = [];
    if (currentZone === 1) {
        quests.push({
            text: 'Survive the dungeon waves',
            done: wave.phase === 'zoneClear' || wave.phase === 'cleared' && wave.current >= ZONE_1_FINAL_WAVE,
        });
        quests.push({
            text: 'Find the Rusted Key',
            done: hasKeyItem('chest_key'),
        });
        quests.push({
            text: 'Open the locked chest',
            done: hasKeyItem('journal'),
        });
        quests.push({
            text: 'Ascend to the next floor',
            done: currentZone > 1,
        });
    }
    if (currentZone >= 2) {
        quests.push({
            text: 'Explore the second floor',
            done: wave.phase === 'zoneClear' && currentZone === 2,
        });
        quests.push({
            text: 'Find passage to the spire',
            done: currentZone > 2,
        });
    }

    if (quests.length === 0) {
        ctx.globalAlpha = fa * 0.3;
        ctx.font = 'italic 11px Georgia';
        ctx.fillStyle = GM.textDim;
        ctx.fillText('Your purpose here is unclear...', x, ly);
        ly += 28;
        ctx.globalAlpha = fa * 0.15;
        ctx.font = 'italic 9px Georgia';
        ctx.fillText('Perhaps the dungeon itself will reveal the way.', x, ly);
        ctx.restore();
        return;
    }

    for (const q of quests) {
        // Checkbox
        ctx.globalAlpha = fa * (q.done ? 0.4 : 0.2);
        ctx.strokeStyle = q.done ? GM.gold : GM.goldFaint;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x, ly, 12, 12, 2);
        ctx.stroke();
        if (q.done) {
            ctx.globalAlpha = fa * 0.5;
            ctx.fillStyle = GM.gold;
            ctx.beginPath();
            ctx.moveTo(x + 2.5, ly + 6);
            ctx.lineTo(x + 5, ly + 9.5);
            ctx.lineTo(x + 10, ly + 2.5);
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // Quest text
        ctx.globalAlpha = fa * (q.done ? 0.3 : 0.6);
        ctx.font = q.done ? 'italic 10px Georgia' : '10px Georgia';
        ctx.fillStyle = q.done ? GM.textDim : GM.textLight;
        ctx.fillText(q.text, x + 20, ly + 1);
        ly += 24;
    }

    ctx.restore();
}

// ===== MAP TAB =====
function drawMenuMap(x, y, w, h, fa) {
    ctx.save();
    ctx.globalAlpha = fa;

    // --- Zone title ---
    ctx.font = 'small-caps bold 13px Georgia';
    ctx.fillStyle = GM.gold;
    ctx.textAlign = 'center';
    const zoneNames = { 1: 'The Undercroft', 2: 'Ruined Tower', 3: 'The Spire' };
    ctx.fillText(zoneNames[currentZone] || `Zone ${currentZone}`, x + w / 2, y + 14);
    ctx.font = '9px Georgia';
    ctx.globalAlpha = fa * 0.4;
    ctx.fillStyle = GM.textMid;
    ctx.fillText(`Zone ${currentZone}`, x + w / 2, y + 26);

    // --- Compute map layout (fill as much panel as possible) ---
    const ms = floorMap.length;
    const maxMapH = h - 52;  // title + legend
    const maxMapW = w - 16;
    const cellSize = Math.max(3, Math.min(Math.floor(maxMapW / ms), Math.floor(maxMapH / ms)));
    const mapW = ms * cellSize;
    const mapH = ms * cellSize;
    const mapX = x + (w - mapW) / 2;
    const mapY = y + 32;

    // --- Dark parchment background ---
    ctx.globalAlpha = fa * 0.35;
    const parchGrad = ctx.createLinearGradient(mapX, mapY, mapX + mapW, mapY + mapH);
    parchGrad.addColorStop(0, '#1a1510');
    parchGrad.addColorStop(0.5, '#1e1812');
    parchGrad.addColorStop(1, '#141008');
    ctx.fillStyle = parchGrad;
    ctx.beginPath();
    ctx.roundRect(mapX - 6, mapY - 6, mapW + 12, mapH + 12, 4);
    ctx.fill();

    // Subtle border
    ctx.globalAlpha = fa * 0.2;
    ctx.strokeStyle = GM.goldDim;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(mapX - 6, mapY - 6, mapW + 12, mapH + 12, 4);
    ctx.stroke();

    // --- Draw tiles ---
    const pRow = Math.round(player.row);
    const pCol = Math.round(player.col);

    for (let r = 0; r < ms; r++) {
        for (let c = 0; c < ms; c++) {
            const cx = mapX + c * cellSize;
            const cy = mapY + r * cellSize;
            const ft = floorMap[r] && floorMap[r][c];

            if (!ft) continue; // void — leave black

            const isBlocked = blocked[r] && blocked[r][c];
            const isWall = blockType[r] && blockType[r][c] === 'wall';
            const hasObj = objectMap[r] && objectMap[r][c];
            const objName = hasObj ? objectMap[r][c] : null;

            if (isWall) {
                // Walls: dark stone color
                ctx.globalAlpha = fa * 0.6;
                ctx.fillStyle = '#2c241c';
                ctx.fillRect(cx, cy, cellSize, cellSize);
            } else if (!isBlocked) {
                // Walkable floor: warm muted tone
                ctx.globalAlpha = fa * 0.4;
                ctx.fillStyle = '#4a3c2e';
                ctx.fillRect(cx, cy, cellSize, cellSize);

                // Subtle grid hint (only on larger cells)
                if (cellSize >= 5) {
                    ctx.globalAlpha = fa * 0.08;
                    ctx.strokeStyle = '#8a7a60';
                    ctx.lineWidth = 0.3;
                    ctx.strokeRect(cx, cy, cellSize, cellSize);
                }
            } else if (hasObj) {
                // Blocked by object: slightly lighter than wall
                ctx.globalAlpha = fa * 0.5;
                ctx.fillStyle = '#3a3028';
                ctx.fillRect(cx, cy, cellSize, cellSize);
            }

            // --- Special markers ---
            if (objName === 'chestClosed' || objName === 'chestOpen') {
                const opened = openedChests.has(`${r},${c}`);
                ctx.globalAlpha = fa * 0.9;
                ctx.fillStyle = opened ? '#5a5040' : '#e4c45c';
                const dotR = Math.max(1.5, cellSize * 0.35);
                ctx.beginPath();
                ctx.rect(cx + cellSize / 2 - dotR, cy + cellSize / 2 - dotR, dotR * 2, dotR * 2);
                ctx.fill();
            }

            if (objName === 'stairsSpiral' || objName === 'stairs' || objName === 'stairsAged') {
                ctx.globalAlpha = fa * 0.85;
                ctx.fillStyle = '#5888cc';
                const dotR = Math.max(1.5, cellSize * 0.35);
                ctx.beginPath();
                ctx.arc(cx + cellSize / 2, cy + cellSize / 2, dotR, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // --- Enemy dots (red, pulsing) ---
    const enemyPulse = 0.5 + Math.sin(performance.now() / 300) * 0.3;
    ctx.globalAlpha = fa * enemyPulse;
    ctx.fillStyle = '#cc3333';
    for (const e of enemies) {
        if (e.state === 'death') continue;
        const er = Math.round(e.row);
        const ec = Math.round(e.col);
        const ex = mapX + ec * cellSize + cellSize / 2;
        const ey = mapY + er * cellSize + cellSize / 2;
        const dotR = Math.max(1.5, cellSize * 0.3);
        ctx.beginPath();
        ctx.arc(ex, ey, dotR, 0, Math.PI * 2);
        ctx.fill();
    }

    // --- Player dot (gold, pulsing glow) ---
    const playerPulse = 0.7 + Math.sin(performance.now() / 400) * 0.3;
    const plX = mapX + pCol * cellSize + cellSize / 2;
    const plY = mapY + pRow * cellSize + cellSize / 2;
    const plR = Math.max(2.5, cellSize * 0.5);

    // Glow ring
    ctx.globalAlpha = fa * playerPulse * 0.3;
    ctx.fillStyle = GM.goldBright;
    ctx.beginPath();
    ctx.arc(plX, plY, plR * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Solid dot
    ctx.globalAlpha = fa * 0.95;
    ctx.fillStyle = GM.goldBright;
    ctx.beginPath();
    ctx.arc(plX, plY, plR, 0, Math.PI * 2);
    ctx.fill();

    // White core
    ctx.globalAlpha = fa * 0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(plX, plY, plR * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // --- Room labels with readable names ---
    const roomDisplayNames = {
        Cell: 'The Cell', GuardHall: 'Guard Hall', GreatHall: 'Great Hall',
        Alcove: 'Alcove', Vestibule: 'Vestibule', RuinedArmory: 'Ruined Armory',
