function spawnWaveEnemies() {
    let waveArray;
    if (currentZone === 1) waveArray = WAVES;
    else if (currentZone === 2) waveArray = ZONE2_WAVES;
    else if (currentZone === 3) waveArray = ZONE3_WAVES;
    else waveArray = WAVES; // fallback

    const w = wave.current < waveArray.length ? waveArray[wave.current] : generateDynamicWave(wave.current);
    const mult = w.statMult;

    // Build flat list of enemies to spawn
    const toSpawn = [];
    for (const group of w.enemies) {
        for (let i = 0; i < group.count; i++) {
            toSpawn.push(group.type);
        }
    }

    // Build spawn zones dynamically from walkable floor tiles (works for any zone)
    let zones;
    if (currentZone === 1) {
        zones = [...SPAWN_ZONES];
    } else {
        // Auto-generate spawn zones from walkable tiles for zone 2/3
        zones = [];
        const ms = floorMap.length;
        for (let r = 1; r < ms - 1; r++) {
            for (let c = 1; c < ms - 1; c++) {
                if (floorMap[r][c] && !blocked[r][c] && !objectMap[r][c]) {
                    zones.push({ r, c });
                }
            }
        }
    }
    zones.sort(() => Math.random() - 0.5);

    // Filter zones that are at least 4 tiles from the player
    const validZones = zones.filter(z => {
        const dr = z.r - player.row;
        const dc = z.c - player.col;
        return Math.sqrt(dr * dr + dc * dc) > 4;
    });

    // Use valid zones first, then fall back to any zone
    const useZones = validZones.length >= toSpawn.length ? validZones : zones;

    // Stagger attack cooldowns by type so enemies don't all fire at once
    const typeIndex = {}; // track spawn index per type for stagger offset
    for (let i = 0; i < toSpawn.length; i++) {
        const zone = useZones[i % useZones.length];
        const offR = (Math.random() - 0.5) * 0.4;
        const offC = (Math.random() - 0.5) * 0.4;
        const type = toSpawn[i];
        typeIndex[type] = (typeIndex[type] || 0) + 1;
        const e = spawnEnemy(type, zone.r + offR, zone.c + offC, mult);
        // Stagger: each enemy of same type gets a different initial cooldown window
        if (e) e.attackCooldown = 0.4 * typeIndex[type] + Math.random() * 0.3;
    }

    wave.enemiesAlive = toSpawn.length;
    wave.phase = 'fighting';
}

function updateWaveSystem(dt) {
    if (wave.phase === 'pre') {
        wave.timer -= dt;
        if (wave.timer <= 0) {
            beginNextWave();
        }
        return;
    }

    if (wave.phase === 'countdown') {
        wave.timer -= dt;
        wave.bannerAlpha = Math.min(1, wave.bannerAlpha + dt * 3);
        if (wave.timer <= 0) {
            spawnWaveEnemies();
            sfxWaveStart();
            // Banner stays for a moment then fades
            wave.timer = 1.5;
        }
        return;
    }

    if (wave.phase === 'fighting') {
        // Fade banner out
        if (wave.timer > 0) {
            wave.timer -= dt;
            wave.bannerAlpha = Math.max(0, wave.timer / 1.5);
        }

        // Count living enemies
        wave.enemiesAlive = enemies.filter(e => e.state !== 'death').length;

        // Wave cleared?
        if (wave.enemiesAlive <= 0 && enemies.length === 0) {
            // Check if this is the final wave of the current zone
            const finalWaveIdx = currentZone === 1 ? ZONE_1_FINAL_WAVE
                : currentZone === 2 ? ZONE_2_FINAL_WAVE
                : ZONE_3_FINAL_WAVE;
            if (wave.current === finalWaveIdx) {
                wave.phase = 'zoneClear';
                wave.timer = 6.0;
                // Auto-save on zone completion
                saveGame(getAutoSaveSlot());
                if (currentZone === 1) {
                    wave.bannerText = 'The Darkness Recedes';
                    wave.bannerSub = 'Something glimmers where the last creature fell...';
                    dropKeyItemInWorld(wave.lastDeathRow, wave.lastDeathCol, 'chest_key');
                } else if (currentZone === 2) {
                    wave.bannerText = 'The Tower\'s Fury Breaks';
                    wave.bannerSub = 'An ancient artifact gleams amid the carnage...';
                    dropKeyItemInWorld(wave.lastDeathRow, wave.lastDeathCol, 'zone2_chest_key');
                } else if (currentZone === 3) {
                    wave.bannerText = 'The Beast Falls';
                    wave.bannerSub = 'Light streams from the spire\'s peak...';
                    // Werewolf boss drops key directly in updateEnemies
                }
                wave.bannerAlpha = 1;
                playSting('waveCleared');
                // Fade to calmer music
                playMusic('menu', 3.0);
            } else {
                wave.phase = 'cleared';
                wave.timer = 8.0;
                wave.bannerText = 'Silence Returns';
                wave.bannerSub = '';
                wave.bannerAlpha = 1;
                wave.tensionPhase = 0; // 0=calm, 1=building tension
                playSting('waveCleared');
                // Dip music to ambient during calm phase
                duckMusic(true);
                // Talisman drop after wave 2 in zone 1 (for slime form)
                if (currentZone === 1 && wave.current === 2 && FormSystem.currentForm === 'slime') {
                    spawnTalismanDrop();
                }
            }
        }
        return;
    }

    if (wave.phase === 'cleared') {
        wave.timer -= dt;

        // Phase 1 (first 5s): calm — banner fades, music ducked, light steady
        if (wave.timer > 3.0) {
            lightRadius = MAX_LIGHT; // keep light full during calm phase
            wave.bannerAlpha = Math.max(0, (wave.timer - 6.0) / 2.0);
            wave.tensionPhase = 0;
        }
        // Phase 2 (last 3s): tension building — flicker increases, ambient cues
        else {
            if (wave.tensionPhase === 0) {
                wave.tensionPhase = 1;
                duckMusic(false); // restore music as tension builds
            }
            // Pulse the light down slightly to create unease
            const tensionProgress = 1 - (wave.timer / 3.0);
            lightRadius = Math.max(MAX_LIGHT * 0.7, MAX_LIGHT - tensionProgress * (MAX_LIGHT * 0.3));
        }

        if (wave.timer <= 0) {
            // Restore some HP/mana between waves as a reward
            const eb = getEquipBonuses();
            const formMaxHP = (FormSystem.getFormConfig() || FORM_CONFIGS.wizard).maxHp + getTalismanBonus().hpBonus;
            player.hp = Math.min(formMaxHP + (eb.maxHpBonus || 0), player.hp + 25);
            player.mana = MAX_MANA + (eb.maxManaBonus || 0);
            beginNextWave();
        }
        return;
    }

    if (wave.phase === 'zoneClear') {
        wave.timer -= dt;
        // Banner fades slowly — let it breathe
        if (wave.timer < 3.0) {
            wave.bannerAlpha = Math.max(0, wave.timer / 3.0);
        }
        // Restore full HP/mana — zone reward
        if (wave.timer <= 5.5 && wave.timer > 5.3) {
            const eb = getEquipBonuses();
            const zFormMaxHP = (FormSystem.getFormConfig() || FORM_CONFIGS.wizard).maxHp + getTalismanBonus().hpBonus;
            player.hp = zFormMaxHP + (eb.maxHpBonus || 0);
            player.mana = MAX_MANA + (eb.maxManaBonus || 0);
        }
        // Zone clear stays indefinitely — player explores, opens chest, finds door
        return;
    }

    if (wave.phase === 'victory') {
        wave.bannerAlpha = Math.min(1, wave.bannerAlpha + dt * 2);
        // Victory state — game stays in this mode
        return;
    }
}

// ----- DRAW WAVE BANNER -----
// ----- HELPER: decorative line separator -----
function drawDecorLine(cx, y, halfW, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    // Center line
    const lg = ctx.createLinearGradient(cx - halfW, y, cx + halfW, y);
    lg.addColorStop(0, 'rgba(168, 144, 96, 0)');
    lg.addColorStop(0.2, 'rgba(168, 144, 96, 0.6)');
    lg.addColorStop(0.5, 'rgba(212, 196, 160, 0.9)');
    lg.addColorStop(0.8, 'rgba(168, 144, 96, 0.6)');
    lg.addColorStop(1, 'rgba(168, 144, 96, 0)');
    ctx.strokeStyle = lg;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - halfW, y);
    ctx.lineTo(cx + halfW, y);
    ctx.stroke();
    // Small diamond at center
    ctx.fillStyle = '#c4a878';
    ctx.beginPath();
    ctx.moveTo(cx, y - 3);
    ctx.lineTo(cx + 3, y);
    ctx.moveTo(cx, y + 3);
    ctx.lineTo(cx - 3, y);
    ctx.moveTo(cx, y - 3);
    ctx.lineTo(cx + 3, y);
    ctx.lineTo(cx, y + 3);
    ctx.lineTo(cx - 3, y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function drawWaveBanner() {
    if (wave.bannerAlpha <= 0) return;

    ctx.save();
    const cx = canvasW / 2;

    if (wave.phase === 'victory') {
        const cy = canvasH / 2;

        // Full dark overlay
        ctx.globalAlpha = wave.bannerAlpha * 0.7;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvasW, canvasH);

        // Warm golden radial glow
        ctx.globalAlpha = wave.bannerAlpha * 0.35;
        const glow = ctx.createRadialGradient(cx, cy - 10, 0, cx, cy - 10, 350);
        glow.addColorStop(0, 'rgba(255, 210, 80, 0.5)');
        glow.addColorStop(0.4, 'rgba(200, 150, 40, 0.15)');
        glow.addColorStop(1, 'rgba(80, 50, 10, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(cx - 400, cy - 250, 800, 500);

        ctx.globalAlpha = wave.bannerAlpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        drawDecorLine(cx, cy - 55, 160, wave.bannerAlpha * 0.6);

        ctx.font = '44px Georgia';
        ctx.fillStyle = '#ffd866';
        ctx.shadowColor = 'rgba(255, 180, 40, 0.5)';
        ctx.shadowBlur = 24;
        ctx.fillText(wave.bannerText, cx, cy - 20);
        ctx.shadowBlur = 0;

        drawDecorLine(cx, cy + 10, 160, wave.bannerAlpha * 0.6);

        ctx.font = 'italic 18px Georgia';
        ctx.fillStyle = '#d4b87a';
        ctx.globalAlpha = wave.bannerAlpha * 0.8;
        ctx.fillText(wave.bannerSub, cx, cy + 42);

        ctx.font = '12px monospace';
        ctx.fillStyle = '#8a7a5a';
        ctx.globalAlpha = wave.bannerAlpha * (0.3 + Math.sin(performance.now() / 800) * 0.15);
        ctx.letterSpacing = '3px';
        ctx.fillText('THE DUNGEON FALLS SILENT...', cx, cy + 85);

    } else if (wave.phase === 'cleared' && wave.tensionPhase === 1) {
        // Tension building: no text needed, just visual ambiance handled here
    } else if (wave.phase === 'countdown') {
        const cy = canvasH * 0.20;

        // Subtle dark band behind the announcement
        ctx.globalAlpha = wave.bannerAlpha * 0.45;
        const bandGrad = ctx.createLinearGradient(0, cy - 80, 0, cy + 90);
        bandGrad.addColorStop(0, 'rgba(0,0,0,0)');
        bandGrad.addColorStop(0.3, 'rgba(0,0,0,0.7)');
        bandGrad.addColorStop(0.7, 'rgba(0,0,0,0.7)');
        bandGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = bandGrad;
        ctx.fillRect(0, cy - 80, canvasW, 170);

        ctx.globalAlpha = wave.bannerAlpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Decorative top line
        drawDecorLine(cx, cy - 32, 140, wave.bannerAlpha * 0.5);

        // Wave title
        ctx.font = '36px Georgia';
        ctx.fillStyle = '#e8d4aa';
        ctx.shadowColor = 'rgba(200, 160, 80, 0.4)';
        ctx.shadowBlur = 14;
        ctx.fillText(wave.bannerText, cx, cy);
        ctx.shadowBlur = 0;

        // Subtitle
        ctx.font = 'italic 15px Georgia';
        ctx.fillStyle = '#b09868';
        ctx.globalAlpha = wave.bannerAlpha * 0.8;
        ctx.fillText(wave.bannerSub, cx, cy + 28);

        // Decorative bottom line
        drawDecorLine(cx, cy + 46, 140, wave.bannerAlpha * 0.5);

        // Countdown number — large, pulsing
        const countNum = Math.ceil(wave.timer);
        if (countNum > 0 && countNum <= 3) {
            const countPulse = 1 + (wave.timer % 1) * 0.15;
            ctx.save();
            ctx.translate(cx, cy + 82);
            ctx.scale(countPulse, countPulse);
            ctx.font = 'bold 52px Georgia';
            ctx.globalAlpha = wave.bannerAlpha * 0.65;
            ctx.fillStyle = '#ffd070';
            ctx.shadowColor = 'rgba(255, 170, 40, 0.7)';
            ctx.shadowBlur = 28;
            ctx.fillText(countNum, 0, 0);
            ctx.restore();
        }

    } else if (wave.phase === 'fighting' || wave.phase === 'cleared' || wave.phase === 'zoneClear') {
        const cy = canvasH * 0.16;
        const isCleared = wave.phase === 'cleared' || wave.phase === 'zoneClear';
        const isZoneClear = wave.phase === 'zoneClear';

        // Faint dark band
        ctx.globalAlpha = wave.bannerAlpha * (isZoneClear ? 0.5 : 0.3);
        const bandGrad = ctx.createLinearGradient(0, cy - 50, 0, cy + 50);
        bandGrad.addColorStop(0, 'rgba(0,0,0,0)');
        bandGrad.addColorStop(0.3, 'rgba(0,0,0,0.6)');
        bandGrad.addColorStop(0.7, 'rgba(0,0,0,0.6)');
        bandGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = bandGrad;
        ctx.fillRect(0, cy - 50, canvasW, 100);

        ctx.globalAlpha = wave.bannerAlpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.font = isZoneClear ? '32px Georgia' : '28px Georgia';
        ctx.fillStyle = isZoneClear ? '#e8d88c' : (isCleared ? '#b8c8a8' : '#e0d0a8');
        ctx.shadowColor = isZoneClear ? 'rgba(230, 200, 80, 0.4)' : (isCleared ? 'rgba(150, 180, 130, 0.3)' : 'rgba(180, 150, 80, 0.3)');
        ctx.shadowBlur = 10;
        ctx.fillText(wave.bannerText, cx, cy);
        ctx.shadowBlur = 0;

        if (wave.bannerSub) {
            ctx.font = 'italic 14px Georgia';
            ctx.fillStyle = '#b09868';
            ctx.globalAlpha = wave.bannerAlpha * 0.7;
            ctx.fillText(wave.bannerSub, cx, cy + 24);
        }
    }

    // --- Tension phase visual cues (between waves) ---
    if (wave.phase === 'cleared' && wave.tensionPhase === 1) {
        const tensionAlpha = Math.min(1, (3.0 - wave.timer) / 2.0);
        // Vignette darkening at screen edges
        ctx.globalAlpha = tensionAlpha * 0.15;
        const edgeVig = ctx.createRadialGradient(
            canvasW / 2, canvasH / 2, canvasH * 0.3,
            canvasW / 2, canvasH / 2, canvasH * 0.75
        );
        edgeVig.addColorStop(0, 'rgba(0,0,0,0)');
        edgeVig.addColorStop(1, 'rgba(20,0,0,1)');
        ctx.fillStyle = edgeVig;
        ctx.fillRect(0, 0, canvasW, canvasH);
    }

    ctx.restore();
}

// ----- DRAW WAVE HUD (top-right, minimal atmospheric indicator) -----
function drawWaveHUD() {
    if (wave.phase !== 'fighting' && wave.phase !== 'cleared' && wave.phase !== 'countdown' && wave.phase !== 'zoneClear') return;

    ctx.save();
    const rx = canvasW - 20;
    const ry = 20;

    // Small subtle indicator — no numbers, just a vibe
    if (wave.phase === 'fighting') {
        // Pulsing danger dot + "hostile" text
        const pulse = 0.5 + Math.sin(performance.now() / 400) * 0.3;
        ctx.globalAlpha = 0.7 * pulse;
        ctx.fillStyle = '#cc4433';
        ctx.beginPath();
        ctx.arc(rx - 8, ry + 10, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 0.4;
        ctx.textAlign = 'right';
        ctx.font = '9px monospace';
        ctx.fillStyle = '#aa6655';
        ctx.fillText('HOSTILE', rx - 18, ry + 13);
    } else if (wave.phase === 'cleared' || wave.phase === 'zoneClear') {
        ctx.globalAlpha = 0.35;
        ctx.textAlign = 'right';
        ctx.font = '9px monospace';
        ctx.fillStyle = wave.phase === 'zoneClear' ? '#c4a878' : '#7a9a6a';
        ctx.fillText(wave.phase === 'zoneClear' ? 'SAFE' : 'CALM', rx - 10, ry + 13);
    }

    ctx.restore();
}

// ----- SPAWN SINGLE ENEMY WITH STAT SCALING -----
function spawnEnemy(type, row, col, statMult) {
    const baseDef = ENEMY_TYPES[type];
    if (!baseDef) { console.error('Unknown enemy type:', type); return; }
    // Create a scaled copy of the definition
    const def = {
        ...baseDef,
        hp: Math.round(baseDef.hp * statMult),
        damage: Math.round(baseDef.damage * statMult),
        speed: baseDef.speed * (1 + (statMult - 1) * 0.5), // speed scales gentler
    };
    enemies.push({
        type, def,
        row, col,
        spawnRow: row, spawnCol: col,
        vr: 0, vc: 0,
        hp: def.hp, maxHp: def.hp,
        state: 'idle',
        animFrame: 0,
        facing: 1,
        attackTimer: 0,
        attackCooldown: Math.random() * 1.5, // stagger initial attacks
        attackFired: false,
        hurtTimer: 0,
        deathTimer: 0,
        knockVr: 0, knockVc: 0,
        spawnFade: 0.5,
        slowTimer: 0,
        orbitHitCooldown: 0,
        // Boss-specific: werewolf charge mechanics
        chargeTimer: 0,
        isCharging: false,
        // AI behavior state
        lungeTimer: 0,
        lungeCooldownTimer: 0,
        isLunging: false,
        lungeVr: 0, lungeVc: 0,
        flankSide: Math.random() < 0.5 ? 1 : -1, // randomize which side they flank from
        shieldTimer: 0,
        isShielding: false,
    });
    return enemies[enemies.length - 1];
}

// ----- ENEMY AI UPDATE -----
function updateEnemies(dt) {
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];

        // --- Spawn fade-in ---
        if (e.spawnFade > 0) e.spawnFade -= dt;

        // --- Death state ---
        if (e.state === 'death') {
            // Corpses linger so all forms can interact (slime absorb, skeleton consume, lich harvest)
            if (!e._corpseLingerExtended) {
                e._corpseLingerExtended = true;
                e.deathTimer = 4.0; // 4 seconds — enough time to reach and interact
            }
            e.deathTimer -= dt;
            e.animFrame += 6 * dt;
            if (e.deathTimer <= 0) {
                wave.lastDeathRow = e.row;
                wave.lastDeathCol = e.col;
                // Spawn death burst particle effect
                const deathPos = tileToScreen(e.row, e.col);
                spawnDeathBurst(deathPos.x + cameraX, deathPos.y + cameraY, e.def.tintColor || '#ff6644');
                enemies.splice(i, 1);
                wave.totalKilled++;
                grantXP(e.type);
                // Multi-kill tracking
                if (multiKillTimer > 0) {
                    multiKillCount++;
                    if (multiKillCount >= 3) {
                        addSlowMo(0.15, 0.2);
                        addScreenShake(5, 0.15);
                    }
                } else {
                    multiKillCount = 1;
                }
                multiKillTimer = 0.8; // 0.8s window to chain kills
                // Boss drops special key
                if (e.type === 'werewolf') {
                    dropKeyItemInWorld(e.row, e.col, 'zone3_exit_key');
                }
                // Siphon Life: heal on kill
                if (getUpgrade('regen') > 0) {
                    const healAmt = 2 * getUpgrade('regen');
                    const killMaxHP = (FormSystem.getFormConfig() || FORM_CONFIGS.wizard).maxHp + getTalismanBonus().hpBonus + (equipBonus.maxHpBonus || 0);
                    player.hp = Math.min(killMaxHP, player.hp + healAmt);
                }
                // Phase Flux: chance to reset dodge
                if (getUpgrade('dodge_reset') > 0) {
                    if (Math.random() < 0.15 * getUpgrade('dodge_reset')) {
                        player.dodgeCoolTimer = 0;
                    }
                }
            }
            continue;
        }

        // --- Hurt state ---
        if (e.state === 'hurt') {
            e.hurtTimer -= dt;
            e.animFrame += 8 * dt;
            // Apply knockback with friction-based decay (momentum carries)
            if (Math.abs(e.knockVr) > 0.05 || Math.abs(e.knockVc) > 0.05) {
                const nr = e.row + e.knockVr * dt;
                const nc = e.col + e.knockVc * dt;
                if (canEnemyMoveTo(nr, nc, e.def.hitboxR, e)) {
                    e.row = nr; e.col = nc;
                } else {
                    // Bounce off wall — lose most momentum
                    e.knockVr *= -0.3;
                    e.knockVc *= -0.3;
                }
                // Friction: heavier enemies slow faster
                const friction = e.def.speed > 2 ? 0.86 : 0.90;
                e.knockVr *= friction;
                e.knockVc *= friction;
            } else {
                e.knockVr = 0; e.knockVc = 0;
            }
            if (e.hurtTimer <= 0) {
                e.state = 'idle';
                e.animFrame = 0;
                // Let residual momentum carry into idle (don't zero out if still moving)
                if (Math.abs(e.knockVr) < 0.1 && Math.abs(e.knockVc) < 0.1) {
                    e.knockVr = 0; e.knockVc = 0;
                }
                // Armored Skeleton: chance to raise shield after being hit
                if (e.def.ai === 'shield' && Math.random() < (e.def.shieldChance || 0)) {
                    e.isShielding = true;
                    e.shieldTimer = e.def.shieldDuration;
                }
            }
            continue;
        }

        // --- Timer ticks ---
        if (e.attackCooldown > 0) e.attackCooldown -= dt;
        if (e.slowTimer > 0) e.slowTimer -= dt;
        if (e.orbitHitCooldown > 0) e.orbitHitCooldown -= dt;

        // Distance to player
        const dr = player.row - e.row;
        const dc = player.col - e.col;
        const dist = Math.sqrt(dr * dr + dc * dc);

        // Facing
        const screenVx = dc - dr; // screen X component
        if (Math.abs(screenVx) > 0.1) e.facing = screenVx > 0 ? 1 : -1;

        // --- Attack state ---
        if (e.state === 'attack') {
            e.attackTimer -= dt;
            const elapsed = e.def.attackDur - e.attackTimer;
            e.animFrame = Math.min(e.def.frames.attack - 1,
                Math.floor((elapsed / e.def.attackDur) * e.def.frames.attack));

            // Fire at midpoint
            if (!e.attackFired && elapsed >= e.def.attackDur * 0.5) {
                e.attackFired = true;
                if (e.def.ai === 'ranged') {
                    fireEnemyArrow(e);
                } else {
                    // Melee: damage player if in range
                    if (dist < e.def.attackRange + 0.3) {
                        sfxEnemyHurt(); // melee attack impact sound
                        damagePlayer(e.def.damage);
                    }
                }
            }

            if (e.attackTimer <= 0) {
                e.state = 'idle';
                e.animFrame = 0;
                e.attackCooldown = e.def.attackCooldown;
            }
            continue;
        }

        // --- Boss charge attack (Werewolf) ---
        if (e.def.isBoss && e.isCharging) {
            e.chargeTimer -= dt;
            // Charge at 3x normal speed toward player
            const mLen = Math.sqrt(dr * dr + dc * dc) || 1;
            const chargeSpeed = e.def.speed * 3.0;
            const mr = (dr / mLen) * chargeSpeed;
            const mc = (dc / mLen) * chargeSpeed;
            const newR = e.row + mr * dt;
            const newC = e.col + mc * dt;
            if (canEnemyMoveTo(newR, newC, e.def.hitboxR, e)) {
                e.row = newR;
                e.col = newC;
            }
            e.state = 'walk';
            e.animFrame = (e.animFrame + e.def.animSpeed * 1.5 * dt) % e.def.frames.walk;

            // Charge ends after 0.3s
            if (e.chargeTimer <= 0) {
                e.isCharging = false;
                e.attackCooldown = 0.5; // brief cooldown after charge
            }
            continue;
        }

        // --- Boss charge initiation (periodic ~5s) ---
        if (e.def.isBoss && !e.isCharging && dist < e.def.aggroRange && e.attackCooldown <= 0) {
            e.chargeTimer += dt;
            if (e.chargeTimer >= 5.0) {
                e.isCharging = true;
                e.chargeTimer = 0.3; // charge duration
                e.attackCooldown = 6.0; // don't charge again for 6 seconds
                e.state = 'walk';
            }
        }

        // --- Not aggro'd: idle / patrol ---
        if (dist > e.def.aggroRange) {
            // Patrol: drift toward spawn point if too far
            const patrolRange = e.def.patrolRange || 1.5;
            const dsr = e.spawnRow - e.row;
            const dsc = e.spawnCol - e.col;
            const spawnDist = Math.sqrt(dsr * dsr + dsc * dsc);
            if (spawnDist > patrolRange) {
                // Walk back toward spawn
                const mLen = spawnDist || 1;
                const mr = (dsr / mLen) * e.def.speed * 0.4;
                const mc = (dsc / mLen) * e.def.speed * 0.4;
                const nr = e.row + mr * dt;
                const nc = e.col + mc * dt;
                if (canEnemyMoveTo(nr, nc, e.def.hitboxR, e)) {
                    e.row = nr; e.col = nc;
                }
                e.state = 'walk';
                e.animFrame = (e.animFrame + e.def.animSpeed * 0.5 * dt) % e.def.frames.walk;
            } else {
                e.state = 'idle';
                e.animFrame = (e.animFrame + e.def.animSpeed * dt) % e.def.frames.idle;
            }
            e.vr = 0; e.vc = 0;
            continue;
        }

        // --- In attack range? ---
        if (dist < e.def.attackRange && e.attackCooldown <= 0) {
            e.state = 'attack';
            e.attackTimer = e.def.attackDur;
            e.attackFired = false;
            e.animFrame = 0;
            continue;
        }

        // --- Movement AI ---
        let moveDir;
        const slowMult = e.slowTimer > 0 ? Math.max(0.2, 1 - 0.3 * getUpgrade('tower_slow')) : 1;
        const engrageMult = e.def.isBoss && e.hp < e.maxHp * 0.5 ? 1.3 : 1.0;

        // --- Shield stance (Armored Skeleton) ---
        if (e.isShielding) {
            e.shieldTimer -= dt;
            if (e.shieldTimer <= 0) {
                e.isShielding = false;
            }
            // Walk slowly toward player while shielding
            const mLen = Math.sqrt(dr * dr + dc * dc) || 1;
            const shieldSpeed = e.def.speed * 0.35 * slowMult;
            const nr = e.row + (dr / mLen) * shieldSpeed * dt;
            const nc = e.col + (dc / mLen) * shieldSpeed * dt;
            if (canEnemyMoveTo(nr, nc, e.def.hitboxR, e)) { e.row = nr; e.col = nc; }
            e.state = 'walk';
            e.animFrame = (e.animFrame + e.def.animSpeed * 0.4 * dt) % e.def.frames.walk;
            continue;
        }

        // --- Lunge AI (Slime) ---
        if (e.def.ai === 'lunge') {
            if (e.lungeCooldownTimer > 0) e.lungeCooldownTimer -= dt;

            if (e.isLunging) {
                e.lungeTimer -= dt;
                const nr = e.row + e.lungeVr * dt;
                const nc = e.col + e.lungeVc * dt;
                if (canEnemyMoveTo(nr, nc, e.def.hitboxR, e)) { e.row = nr; e.col = nc; }
                e.state = 'walk';
                e.animFrame = (e.animFrame + e.def.animSpeed * 2 * dt) % e.def.frames.walk;
                if (e.lungeTimer <= 0) {
                    e.isLunging = false;
                    e.lungeCooldownTimer = e.def.lungeCooldown;
                }
                continue;
            }

            // Initiate lunge when close enough and cooldown ready
            if (dist < e.def.lungeRange && dist > e.def.attackRange && e.lungeCooldownTimer <= 0) {
                e.isLunging = true;
                e.lungeTimer = e.def.lungeDur;
                const mLen = dist || 1;
                e.lungeVr = (dr / mLen) * e.def.lungeSpeed;
                e.lungeVc = (dc / mLen) * e.def.lungeSpeed;
                continue;
            }

            // Normal chase when not lunging
            moveDir = dist > e.def.attackRange ? { dr, dc } : null;
        }
        // --- Flank AI (Skeleton) ---
        else if (e.def.ai === 'flank') {
            if (dist > e.def.flankDist || dist <= e.def.attackRange) {
                // Too far or in attack range: chase directly
                moveDir = dist > e.def.attackRange ? { dr, dc } : null;
            } else {
                // Flanking: approach at an angle
                const mLen = dist || 1;
                const normR = dr / mLen;
                const normC = dc / mLen;
                // Rotate the approach vector by flankAngle
                const cosA = Math.cos(e.def.flankAngle * e.flankSide);
                const sinA = Math.sin(e.def.flankAngle * e.flankSide);
                moveDir = {
                    dr: normR * cosA - normC * sinA,
                    dc: normR * sinA + normC * cosA,
                };
            }
        }
        // --- Ranged AI (Skeleton Archer) ---
        else if (e.def.ai === 'ranged' && dist < e.def.preferredDist) {
            moveDir = { dr: -dr, dc: -dc };
        } else if (e.def.ai === 'ranged' && dist <= e.def.attackRange && e.attackCooldown <= 0) {
            moveDir = null;
        }
        // --- Default chase (shield when not shielding, werewolf, etc.) ---
        else {
            moveDir = dist > e.def.attackRange ? { dr, dc } : null;
        }

        if (moveDir) {
            const mLen = Math.sqrt(moveDir.dr * moveDir.dr + moveDir.dc * moveDir.dc) || 1;
            const mr = (moveDir.dr / mLen) * e.def.speed * slowMult * engrageMult;
            const mc = (moveDir.dc / mLen) * e.def.speed * slowMult * engrageMult;

            const newR = e.row + mr * dt;
            const newC = e.col + mc * dt;

            if (canEnemyMoveTo(newR, newC, e.def.hitboxR, e)) {
                e.row = newR;
                e.col = newC;
            } else {
                if (canEnemyMoveTo(newR, e.col, e.def.hitboxR, e)) {
                    e.row = newR;
                } else if (canEnemyMoveTo(e.row, newC, e.def.hitboxR, e)) {
                    e.col = newC;
                }
            }

            e.state = 'walk';
            e.animFrame = (e.animFrame + e.def.animSpeed * dt) % e.def.frames.walk;
        } else {
            e.state = 'idle';
            e.animFrame = (e.animFrame + e.def.animSpeed * dt) % e.def.frames.idle;
        }
    }

    // --- Enemy-player contact damage ---
    if (playerInvTimer > 0) {
        playerInvTimer -= dt;
    } else {
        for (const e of enemies) {
            if (e.state === 'death') continue;
            const dr = player.row - e.row;
            const dc = player.col - e.col;
            const dist = Math.sqrt(dr * dr + dc * dc);
            if (dist < HITBOX_RADIUS + e.def.hitboxR + 0.1) {
                damagePlayer(Math.ceil(e.def.damage * 0.5)); // contact = half damage
                break;
            }
        }
    }
}

// ----- ENEMY COLLISION (walls + other enemies) -----
function canEnemyMoveTo(row, col, radius, self) {
    // Wall/object collision
    const scanR0 = Math.floor(row - radius - 0.5);
    const scanR1 = Math.floor(row + radius + 0.5);
    const scanC0 = Math.floor(col - radius - 0.5);
    const scanC1 = Math.floor(col + radius + 0.5);

    for (let r = scanR0; r <= scanR1; r++) {
        for (let c = scanC0; c <= scanC1; c++) {
            if (r < 0 || r >= floorMap.length || c < 0 || c >= floorMap.length) {
                const pr0 = row - radius; const pr1 = row + radius;
                const pc0 = col - radius; const pc1 = col + radius;
                if (pr1 >= r && pr0 < r + 1 && pc1 >= c && pc0 < c + 1) return false;
                continue;
            }
            if (!blocked[r][c]) continue;
            if (blockType[r][c] === 'object') {
                const dist = Math.sqrt((row - r - 0.5) ** 2 + (col - c - 0.5) ** 2);
                if (dist < radius + objRadius[r][c]) return false;
            } else {
                const r0 = row - radius; const r1 = row + radius;
                const c0 = col - radius; const c1 = col + radius;
                if (r1 >= r && r0 < r + 1 && c1 >= c && c0 < c + 1) return false;
            }
        }
    }
    return true;
}

// ----- LEVEL-UP SYSTEM HELPERS -----
function grantXP(enemyType) {
    const baseAmount = ENEMY_XP[enemyType] || 5;
    const amount = Math.round(baseAmount * getTalismanBonus().xpMult);
    xpState.xp += amount;
    // Track kills for current form
    if (FormSystem.formData[FormSystem.currentForm]) {
        FormSystem.formData[FormSystem.currentForm].totalKills++;
    }
    // Check level up
    if (xpState.xp >= xpState.xpToNext) {
        xpState.xp -= xpState.xpToNext;
        xpState.level++;
        xpState.xpToNext = xpForLevel(xpState.level);
        triggerLevelUp();
    }
}

function triggerLevelUp() {
    // Pick 3 random upgrades (no duplicates, respect maxStack)
    // Use the current form's upgrade pool
    const handler = FormSystem.getHandler();
    const currentPool = (handler && handler.getUpgradePool) ? handler.getUpgradePool() : UPGRADE_POOL;
    const available = currentPool.filter(u => (upgrades[u.id] || 0) < u.maxStack);
    const choices = [];
    const pool = [...available];
    for (let i = 0; i < 3 && pool.length > 0; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        choices.push(pool[idx]);
        pool.splice(idx, 1);
    }
    if (choices.length === 0) {
        // All upgrades maxed — skip level-up screen, just continue playing
        duckMusic(false);
        return;
    }
    xpState.levelUpChoices = choices;
    xpState.levelUpPending = true;
    xpState.levelUpHover = -1;
    xpState.levelUpFadeIn = 0;
    // Duck music and play level-up sting
    duckMusic(true);
    playSting('levelUp');
}

function applyUpgrade(upgradeId) {
    upgrades[upgradeId] = (upgrades[upgradeId] || 0) + 1;
    xpState.levelUpPending = false;
    duckMusic(false); // restore music volume
    xpState.levelUpChoices = [];
    setPixelCursor('none');
}

// Helper to get current stack count
function getUpgrade(id) { return upgrades[id] || 0; }

// ----- PLAYER DAMAGE -----
function damagePlayer(amount) {
    if (player.dodging) return; // immune during phase jump
    if (playerInvTimer > 0) return;
    // Skeleton shield blocks damage
    if (FormSystem.currentForm === 'skeleton' && typeof skeletonState !== 'undefined' && skeletonState.shieldUp) return;
    const reducedAmt = Math.max(1, Math.round(amount * (1 - (equipBonus.dmgReduc || 0))));
    player.hp -= reducedAmt;
    playerInvTimer = PLAYER_INV_TIME;
    // Scale feedback by damage taken
    const shakeScale = Math.min(2.0, reducedAmt / 15);
    addScreenShake(4 + 6 * shakeScale, 0.15 + 0.1 * shakeScale);
    addHitPause(0.03 + 0.04 * shakeScale);
    if (reducedAmt >= 25) addSlowMo(0.12, 0.3); // big hit slow-mo
    if (player.hp <= 0) {
        player.hp = 0;
        gameDead = true;
        deathFadeTimer = 0;
        placement.active = false;
        sfxPlayerDeath();
        // Fade to death music
        playMusic('death', 2.0);
    } else {
        sfxPlayerHurt();
    }

    // Thorns of Flame: damage melee attackers
    if (getUpgrade('thorns') > 0) {
        const thornDmg = 15 * getUpgrade('thorns');
        sfxThorns();
        // Damage all enemies within melee range
        for (const e of enemies) {
            if (e.state === 'death') continue;
            const dr = e.row - player.row;
            const dc = e.col - player.col;
            if (Math.sqrt(dr*dr + dc*dc) < 1.5) {
                e.hp -= thornDmg;
                e.state = 'hurt'; e.hurtTimer = 0.2; e.animFrame = 0;
                if (e.hp <= 0) {
                    e.hp = 0; e.state = 'death'; e.deathTimer = 0.7; e.animFrame = 0;
                    sfxEnemyDeath();
                    rollEnemyLoot(e);
                } else {
                    sfxEnemyHurt();
                }
            }
        }
    }
}

// ----- FIREBALL → ENEMY COLLISION -----
function checkProjectileEnemyHits() {
    for (const p of projectiles) {
        if (p.hit) continue;
        for (const e of enemies) {
            if (e.state === 'death') continue;
            if (p.hitEnemies && p.hitEnemies.has(e)) continue; // already hit this enemy
            const dr = p.row - e.row;
            const dc = p.col - e.col;
            const dist = Math.sqrt(dr * dr + dc * dc);
            if (dist < e.def.hitboxR + 0.25) {
                // Hit!
                const baseProjDmg = p.damage || FIREBALL_DAMAGE; // use projectile's own damage if set
                const dmgBonus = (equipBonus.dmgBonus || 0) + getUpgrade('bigshot') * 5;
                const shieldReduc = e.isShielding ? (1 - (e.def.shieldDmgReduc || 0)) : 1;
                const talismanDmg = getTalismanBonus().dmgMult;
                e.hp -= Math.round((baseProjDmg + dmgBonus) * shieldReduc * talismanDmg);

                if (!p.hitEnemies) p.hitEnemies = new Set();
                p.hitEnemies.add(e);

                addHitPause(0.025);
                addScreenShake(2, 0.08);

                // Knockback — varies by projectile type
                const kbMult = p.canExplode ? KNOCKBACK_MULT.explode : KNOCKBACK_MULT.normal;
                // Apply knockback resistance for boss enemies
                const kbResist = e.def.knockbackResist || 1.0;
                e.knockVr = (e.knockVr || 0) + (p.vr / ATK_SPEED) * ENEMY_KNOCKBACK * kbMult * kbResist;
                e.knockVc = (e.knockVc || 0) + (p.vc / ATK_SPEED) * ENEMY_KNOCKBACK * kbMult * kbResist;

                // Handle pierce
                if (p.pierceLeft > 0) {
                    p.pierceLeft--;
                    // Don't mark as hit, keep going
                } else {
                    p.hit = true;
                    p.life = 0.3;
                }

                // SFX: fireball impact
                sfxFireballHit();

                // Explosion on impact
                if (p.canExplode) {
                    sfxExplosion();
                    addScreenShake(7, 0.25);
                    addHitPause(0.06);
                    addSlowMo(0.1, 0.25); // devastating explosion slow-mo
                    const explodeRadius = 2.5;
                    const explodeDmg = Math.round((baseProjDmg + dmgBonus) * 0.4 * p.explodeScale);
                    for (const e2 of enemies) {
                        if (e2.state === 'death' || e2 === e) continue;
                        const dr2 = p.row - e2.row;
                        const dc2 = p.col - e2.col;
                        if (Math.sqrt(dr2 * dr2 + dc2 * dc2) < explodeRadius) {
                            e2.hp -= explodeDmg;
                            if (e2.hp <= 0) {
                                e2.hp = 0; e2.state = 'death'; e2.deathTimer = 0.7; e2.animFrame = 0;
                                sfxEnemyDeath(); rollEnemyLoot(e2);
                            } else {
                                e2.state = 'hurt'; e2.hurtTimer = 0.2; e2.animFrame = 0;
                                sfxEnemyHurt();
                                const hitPos2 = tileToScreen(e2.row, e2.col);
                                spawnHitSpark(hitPos2.x + cameraX, hitPos2.y + cameraY);
                            }
                        }
                    }
                }

                // Marrow Leech: skeleton bone hits heal player
                if (p.marrowLeech) {
                    const healAmt = Math.round(p.damage * 0.15);
                    const skelMaxHp = (FORM_CONFIGS.skeleton || {}).maxHp || 80;
                    const maxHp = skelMaxHp * (1 + getUpgrade('calcium_fort') * 0.15) + getTalismanBonus().hpBonus + (equipBonus.maxHpBonus || 0);
                    player.hp = Math.min(maxHp, player.hp + healAmt);
                }

                if (e.hp <= 0) {
                    e.hp = 0;
                    e.state = 'death';
                    e.deathTimer = 0.7;
                    e.animFrame = 0;
                    sfxEnemyDeath(e.row, e.col);
                    rollEnemyLoot(e);
                    // Boss kill: dramatic slow-mo
                    if (e.def.isBoss) { addSlowMo(0.4, 0.15); addScreenShake(12, 0.4); }
                } else {
                    e.state = 'hurt';
                    e.hurtTimer = 0.3;
                    e.animFrame = 0;
                    sfxEnemyHurt(e.row, e.col);
                    // Spawn hit spark particle
                    const hitPos = tileToScreen(e.row, e.col);
                    spawnHitSpark(hitPos.x + cameraX, hitPos.y + cameraY);
                    // Retreat impulse for ranged enemies when hit
                    if (e.def.retreatOnHit && Math.random() < e.def.retreatOnHit) {
                        const rdr = e.row - player.row;
                        const rdc = e.col - player.col;
                        const rLen = Math.sqrt(rdr * rdr + rdc * rdc) || 1;
                        e.knockVr += (rdr / rLen) * 1.5;
                        e.knockVc += (rdc / rLen) * 1.5;
                    }
                }

                if (p.hit) break; // one hit per projectile unless piercing
            }
        }
    }
}

// ----- SKELETON ARCHER ARROW -----
function fireEnemyArrow(e) {
    const dr = player.row - e.row;
    const dc = player.col - e.col;
    const len = Math.sqrt(dr * dr + dc * dc) || 1;
    const speed = 6;

    const screenVx = (dc / len) - (dr / len);
    const screenVy = ((dc / len) + (dr / len)) * 0.5;
    const angle = Math.atan2(screenVy, screenVx);

    enemyProjectiles.push({
        row: e.row, col: e.col,
        vr: (dr / len) * speed, vc: (dc / len) * speed,
        life: 2.5,
        angle,
        damage: e.def.damage,
    });
    sfxArrowShoot(e.row, e.col);
}

function updateEnemyProjectiles(dt) {
    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        const a = enemyProjectiles[i];
        a.life -= dt;
        const nr = a.row + a.vr * dt;
        const nc = a.col + a.vc * dt;

        // Wall collision
        if (!canMoveTo(nr, nc)) {
            enemyProjectiles.splice(i, 1);
            continue;
        }

        a.row = nr;
        a.col = nc;

        // Hit player
        if (!player.dodging && playerInvTimer <= 0) {
            const pdr = player.row - a.row;
            const pdc = player.col - a.col;
            if (Math.sqrt(pdr * pdr + pdc * pdc) < HITBOX_RADIUS + 0.15) {
                sfxArrowHit();
                damagePlayer(a.damage);
                enemyProjectiles.splice(i, 1);
                continue;
            }
        }

        const mapBound = floorMap.length;
        if (a.life <= 0 || a.row < -1 || a.row > mapBound + 1 || a.col < -1 || a.col > mapBound + 1) {
            enemyProjectiles.splice(i, 1);
        }
    }
}

// ----- DRAW SINGLE ENEMY -----
function drawEnemy(e) {
    const def = e.def;
    const prefix = def.prefix;
    let sheetKey, frameCount;

    switch (e.state) {
        case 'attack':
            sheetKey = 'enemy_' + prefix + '_attack'; frameCount = def.frames.attack; break;
        case 'walk':
            sheetKey = 'enemy_' + prefix + '_walk'; frameCount = def.frames.walk; break;
        case 'hurt':
            sheetKey = 'enemy_' + prefix + '_hurt'; frameCount = def.frames.hurt; break;
        case 'death':
            sheetKey = 'enemy_' + prefix + '_death'; frameCount = def.frames.death; break;
        default:
            sheetKey = 'enemy_' + prefix + '_idle'; frameCount = def.frames.idle; break;
    }

    const sheet = images[sheetKey];
    if (!sheet) return;

    const frame = Math.min(frameCount - 1, Math.floor(e.animFrame) % frameCount);
    const pos = tileToScreen(e.row, e.col);
    const sx = pos.x + cameraX;
    const sy = pos.y + cameraY;
    const dw = WIZARD_FRAME_W * def.scale;
    const dh = WIZARD_FRAME_H * def.scale;
    const drawY = sy - dh * def.yOff;

    // Calculate spawn fade effect
    const spawnAlpha = e.spawnFade > 0 ? Math.max(0, 1 - (e.spawnFade / 0.5)) : 1;
    const spawnScale = e.spawnFade > 0 ? 0.5 + 0.5 * (1 - (e.spawnFade / 0.5)) : 1;

    // Enemy ground aura glow removed — looked unnatural per art direction

    // Shadow
    ctx.save();
    ctx.globalAlpha = (e.state === 'death' ? 0.1 : 0.25) * spawnAlpha;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(sx, sy + 4, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // (Silhouette halo removed — felt unnatural)

    // Hurt flash — red tint
    ctx.save();
    if (e.state === 'hurt') {
        ctx.filter = 'brightness(2.5) saturate(2) hue-rotate(-30deg)';
        ctx.globalAlpha = 0.6 + Math.sin(e.hurtTimer * 30) * 0.4;
    }
    if (e.state === 'death') {
        // Fade out only in last 1 second of linger
        const fadeStart = 1.0;
        ctx.globalAlpha = e.deathTimer > fadeStart ? 0.7 : Math.max(0, (e.deathTimer / fadeStart) * 0.7);
    }
    // Apply spawn fade alpha multiplier
    ctx.globalAlpha *= spawnAlpha;

    const scaledDW = dw * spawnScale;
    const scaledDH = dh * spawnScale;

    if (e.facing === -1) {
        ctx.translate(sx, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(sheet,
            frame * WIZARD_FRAME_W, 0, WIZARD_FRAME_W, WIZARD_FRAME_H,
            -scaledDW / 2, drawY - (scaledDH - dh) / 2, scaledDW, scaledDH);
        // Warm dungeon tint
        ctx.globalCompositeOperation = 'multiply';
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#ddaa77';
        ctx.fillRect(-scaledDW / 2, drawY - (scaledDH - dh) / 2, scaledDW, scaledDH);
        ctx.globalCompositeOperation = 'source-over';
    } else {
        ctx.drawImage(sheet,
            frame * WIZARD_FRAME_W, 0, WIZARD_FRAME_W, WIZARD_FRAME_H,
            sx - scaledDW / 2, drawY - (scaledDH - dh) / 2, scaledDW, scaledDH);
        // Warm dungeon tint
        ctx.globalCompositeOperation = 'multiply';
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#ddaa77';
        ctx.fillRect(sx - scaledDW / 2, drawY - (scaledDH - dh) / 2, scaledDW, scaledDH);
        ctx.globalCompositeOperation = 'source-over';
    }
    ctx.restore();

    // === ENEMY OUTLINE — dark edge for silhouette definition ===
    if (e.state !== 'death' && spawnAlpha > 0.5) {
        ctx.save();
        ctx.globalAlpha = 0.25 * spawnAlpha;
        ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
        ctx.shadowBlur = 4;
        const eDY = drawY - (scaledDH - dh) / 2;
        if (e.facing === -1) {
            ctx.translate(sx, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(sheet,
                frame * WIZARD_FRAME_W, 0, WIZARD_FRAME_W, WIZARD_FRAME_H,
                -scaledDW / 2 - 1, eDY - 1, scaledDW + 2, scaledDH + 2);
        } else {
            ctx.drawImage(sheet,
                frame * WIZARD_FRAME_W, 0, WIZARD_FRAME_W, WIZARD_FRAME_H,
                sx - scaledDW / 2 - 1, eDY - 1, scaledDW + 2, scaledDH + 2);
        }
        ctx.restore();
    }

    // --- Corpse interaction glow (pulsing when player is nearby) ---
    if (e.state === 'death' && e.deathTimer > 0.5) {
        const pDist = Math.sqrt((e.row - player.row) ** 2 + (e.col - player.col) ** 2);
        if (pDist < 2.5) {
            const t = performance.now() / 1000;
            const corpPulse = 0.2 + Math.sin(t * 4) * 0.1;
            const _cf = FormSystem.currentForm;
            const corpCol = _cf === 'slime' ? 'rgba(200, 80, 60,' :
                           _cf === 'skeleton' ? 'rgba(200, 190, 150,' :
                           _cf === 'lich' ? 'rgba(140, 70, 200,' :
                           'rgba(100, 140, 200,';
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            ctx.globalAlpha = corpPulse * Math.min(1, (e.deathTimer - 0.5) / 0.5);
            const corpGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 20);
            corpGrad.addColorStop(0, corpCol + ' 0.4)');
            corpGrad.addColorStop(0.6, corpCol + ' 0.1)');
            corpGrad.addColorStop(1, corpCol + ' 0)');
            ctx.fillStyle = corpGrad;
            ctx.beginPath();
            ctx.ellipse(sx, sy + 2, 22, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // --- Shield stance glow (Armored Skeleton) ---
    if (e.isShielding) {
        ctx.save();
        const shieldPulse = 0.5 + 0.3 * Math.sin(e.shieldTimer * 6);
        ctx.globalAlpha = shieldPulse * (1 - e.spawnFade);
        ctx.strokeStyle = '#66aaff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#4488ff';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(sx, sy - dh * 0.4, dw * 0.45, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }

    // HP bar above enemy (only when damaged and alive)
    if (e.state !== 'death' && e.hp < e.maxHp) {
        const barW = 34;
        const barH = 4;
        const bx = sx - barW / 2;
        const by = drawY - 8;
        const hpFrac = e.hp / e.maxHp;

        ctx.save();
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#1a0000';
        ctx.fillRect(bx, by, barW, barH);
        ctx.fillStyle = hpFrac > 0.5 ? '#cc3333' : (hpFrac > 0.25 ? '#cc6600' : '#cc0000');
        ctx.fillRect(bx, by, barW * hpFrac, barH);
        ctx.strokeStyle = '#660000';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(bx, by, barW, barH);
        ctx.restore();
    }
}

// ----- DRAW ENEMY ARROWS -----
function drawEnemyProjectiles() {
    const arrowImg = images.enemy_skelarch_arrow;
    for (const a of enemyProjectiles) {
        const pos = tileToScreen(a.row, a.col);
        const px = pos.x + cameraX;
        const py = pos.y + cameraY;

        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(a.angle);

        if (arrowImg) {
            const s = 0.35;
            ctx.drawImage(arrowImg, -50 * s, -50 * s, 100 * s, 100 * s);
        } else {
            // Fallback: simple line
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-8, 0);
            ctx.lineTo(8, 0);
            ctx.stroke();
        }
        ctx.restore();
    }
}

// ============================================================
//  SUMMONING TOWER SYSTEM
// ============================================================

function summonTowerAt(row, col) {
    const manaSacrificed = SUMMON_MANA_COST; // costs fixed amount, not all mana
    player.mana -= manaSacrificed;
    player.manaRegenTimer = MANA_REGEN_DELAY;

    // Duration = mana sacrificed in seconds (1 MP = 1 second)
    const duration = manaSacrificed;

    summons.push({
        row, col,
        manaLocked: manaSacrificed,
        duration: duration,
        maxDuration: duration,
        fireTimer: 0.5,        // short delay before first shot
        targetEnemy: null,
        animTime: 0,
        spawnAnim: 0.8,        // summoning portal animation timer
    });
    sfxTowerSummon();
}

function updatePlacement() {
    // --- Channeling phase ---
    if (placement.channeling) {
        placement.channelTimer += 1/60; // approximate dt
        // Interrupt if player takes damage (checked via invincibility timer starting)
        if (playerInvTimer > 0 && playerInvTimer > PLAYER_INV_TIME - 0.05) {
            placement.channeling = false;
            placement.channelTimer = 0;
        }
        // Complete channeling
        if (placement.channelTimer >= placement.channelDuration) {
            summonTowerAt(placement.channelRow, placement.channelCol);
            placement.channeling = false;
            placement.channelTimer = 0;
        }
        return;
    }

    if (!placement.active) return;

    // Convert mouse screen position to tile coordinates
    const tile = screenToTile(mouse.x, mouse.y);
    placement.row = tile.row;
    placement.col = tile.col;

    // Check validity: must be on a walkable tile and within reasonable range of player
    const tileR = Math.floor(tile.row);
    const tileC = Math.floor(tile.col);
    const inBounds = tileR >= 0 && tileR < floorMap.length && tileC >= 0 && tileC < floorMap.length;
    const walkable = inBounds && !blocked[tileR][tileC];

    const dr = tile.row - player.row;
    const dc = tile.col - player.col;
    const dist = Math.sqrt(dr * dr + dc * dc);
    const inRange = dist <= 6; // max placement range

    placement.valid = walkable && inRange && player.mana >= SUMMON_MANA_COST;
}

function updateTowers(dt) {
    for (let i = summons.length - 1; i >= 0; i--) {
        const t = summons[i];

        // Tick timers
        t.duration -= dt;
        t.animTime += dt;
        if (t.spawnAnim > 0) t.spawnAnim -= dt;

        // Expired — release locked mana
        if (t.duration <= 0) {
            summons.splice(i, 1);
            continue;
        }

        // Don't fire during spawn animation
        if (t.spawnAnim > 0) continue;

        // --- Targeting ---
        t.fireTimer -= dt;
        t.targetEnemy = null;

        // Find closest enemy in range
        let closestDist = TOWER_RANGE + (equipBonus.towerRangeAdd || 0);
        for (const e of enemies) {
            if (e.state === 'death') continue;
            const dr = e.row - t.row;
            const dc = e.col - t.col;
            const dist = Math.sqrt(dr * dr + dc * dc);
            if (dist < closestDist) {
                closestDist = dist;
                t.targetEnemy = e;
            }
        }

        // --- Fire ---
        if (t.targetEnemy && t.fireTimer <= 0) {
            t.fireTimer = TOWER_FIRE_RATE;
            fireTowerBolt(t, t.targetEnemy);
        }
    }
}

function fireTowerBolt(tower, target) {
    const dr = target.row - tower.row;
    const dc = target.col - tower.col;
    const len = Math.sqrt(dr * dr + dc * dc) || 1;

    const screenVx = (dc / len) - (dr / len);
    const screenVy = ((dc / len) + (dr / len)) * 0.5;
    const angle = Math.atan2(screenVy, screenVx);

    towerBolts.push({
        row: tower.row, col: tower.col,
        vr: (dr / len) * TOWER_BOLT_SPEED,
        vc: (dc / len) * TOWER_BOLT_SPEED,
        life: 2.0,
        angle,
        hit: false,
        trail: [],
    });
    sfxTowerShoot(tower.row, tower.col);
}

function updateTowerBolts(dt) {
    for (let i = towerBolts.length - 1; i >= 0; i--) {
        const b = towerBolts[i];
        b.life -= dt;

        if (b.hit) {
            b.life -= dt * 4;
            if (b.life <= 0) { recycleBolt(towerBolts.splice(i, 1)[0]); }
            continue;
        }

        // Track trail
        b.trail.push({ row: b.row, col: b.col, age: 0 });
        if (b.trail.length > 8) b.trail.shift();
        for (const t of b.trail) t.age += dt;

        const nr = b.row + b.vr * dt;
        const nc = b.col + b.vc * dt;

        // Wall collision
        if (!canMoveTo(nr, nc)) {
            b.hit = true; b.life = 0.2;
            continue;
        }

        b.row = nr; b.col = nc;

        // Enemy collision
        for (const e of enemies) {
            if (e.state === 'death') continue;
            const dr = b.row - e.row;
            const dc = b.col - e.col;
            if (Math.sqrt(dr * dr + dc * dc) < e.def.hitboxR + 0.25) {
                const baseDmg = TOWER_DAMAGE + (equipBonus.towerDmgBonus || 0);
                e.hp -= baseDmg;
                b.hit = true; b.life = 0.2;

                const kbResist = e.def.knockbackResist || 1.0;
                e.knockVr = (b.vr / TOWER_BOLT_SPEED) * 1.5 * kbResist;
                e.knockVc = (b.vc / TOWER_BOLT_SPEED) * 1.5 * kbResist;

                // Tower Slow: apply slow effect
                if (getUpgrade('tower_slow') > 0) {
                    e.slowTimer = 2;
                }

                if (e.hp <= 0) {
                    e.hp = 0; e.state = 'death';
                    e.deathTimer = 0.7; e.animFrame = 0;
                    sfxEnemyDeath();
                    rollEnemyLoot(e);
                } else {
                    e.state = 'hurt';
                    e.hurtTimer = 0.25; e.animFrame = 0;
                    sfxEnemyHurt();
                }

                // Tower Chain: find nearby enemy and chain to it
                if (getUpgrade('tower_chain') > 0) {
                    let closestEnemy = null;
                    let closestDist = 3;
                    for (const e2 of enemies) {
                        if (e2.state === 'death' || e2 === e) continue;
                        const dr2 = b.row - e2.row;
                        const dc2 = b.col - e2.col;
                        const dist = Math.sqrt(dr2 * dr2 + dc2 * dc2);
                        if (dist < closestDist) {
                            closestEnemy = e2;
                            closestDist = dist;
                        }
                    }
                    if (closestEnemy) {
                        sfxChainLightning();
                        const chainDmg = Math.round(baseDmg * 0.5 * getUpgrade('tower_chain'));
                        closestEnemy.hp -= chainDmg;
                        closestEnemy.state = 'hurt'; closestEnemy.hurtTimer = 0.2; closestEnemy.animFrame = 0;
                        if (closestEnemy.hp <= 0) {
                            closestEnemy.hp = 0; closestEnemy.state = 'death';
                            closestEnemy.deathTimer = 0.7; closestEnemy.animFrame = 0;
                            sfxEnemyDeath();
                            rollEnemyLoot(closestEnemy);
                        } else {
                            sfxEnemyHurt();
                        }
                    }
                }

                break;
            }
        }

        if (b.life <= 0) { recycleBolt(towerBolts.splice(i, 1)[0]); }
    }
}

// ----- DRAW TOWER (fully procedural dark arcane obelisk) -----
// drawTower: renders ONLY the solid stone obelisk body (depth-sorted, under darkness)
function drawTower(t) {
    const pos = tileToScreen(t.row, t.col);
    const sx = pos.x + cameraX;
    const sy = pos.y + cameraY;
    const timeFrac = t.duration / t.maxDuration;
    const dying = timeFrac < 0.25;

    const popScale = t.spawnAnim > 0 ? Math.max(0, 1 - (t.spawnAnim / 0.8)) : 1;
    const pop3 = popScale * popScale * (3 - 2 * popScale);

    // --- Dark aura pool on ground ---
    ctx.save();
    const auraR = 32 + Math.sin(t.animTime * 2.5) * 3;
    ctx.globalCompositeOperation = 'multiply';
    ctx.globalAlpha = 0.4 * pop3 * timeFrac;
    ctx.fillStyle = '#1a0a2a';
    ctx.beginPath();
    ctx.ellipse(sx, sy + 5, auraR, auraR * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // --- Dark stone obelisk (procedural) ---
    if (pop3 > 0) {
        const oH = 42 * pop3;
        const oW = 14 * pop3;
        const oTop = 8 * pop3;
        const baseY = sy + 2;
        const topY = baseY - oH;

        ctx.save();
        ctx.globalAlpha = (0.85 + timeFrac * 0.15) * (dying ? (0.5 + Math.sin(t.animTime * 12) * 0.3) : 1);

        const stoneGrad = ctx.createLinearGradient(sx, topY, sx, baseY);
        stoneGrad.addColorStop(0, '#2a1a3a');
        stoneGrad.addColorStop(0.3, '#1e1228');
        stoneGrad.addColorStop(0.7, '#150d1e');
        stoneGrad.addColorStop(1, '#0e0814');
        ctx.fillStyle = stoneGrad;

        ctx.beginPath();
        ctx.moveTo(sx - oTop, topY);
        ctx.lineTo(sx + oTop, topY);
        ctx.lineTo(sx + oW, baseY);
        ctx.lineTo(sx - oW, baseY);
        ctx.closePath();
        ctx.fill();

        // Left face darker for isometric depth
        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        ctx.beginPath();
        ctx.moveTo(sx - oTop, topY);
        ctx.lineTo(sx, topY + 2);
        ctx.lineTo(sx, baseY + 2);
        ctx.lineTo(sx - oW, baseY);
        ctx.closePath();
        ctx.fill();

        // Edge highlight
        ctx.strokeStyle = 'rgba(140, 100, 200, 0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx + oTop, topY);
        ctx.lineTo(sx + oW, baseY);
        ctx.stroke();

        // Carved arcane lines
        ctx.strokeStyle = `rgba(130, 80, 220, ${0.25 * timeFrac})`;
        ctx.lineWidth = 0.8;
        const lineSpacing = oH / 5;
        for (let l = 1; l < 5; l++) {
            const ly = baseY - l * lineSpacing;
            const frac = l / 5;
            const lw = oW - (oW - oTop) * frac;
            ctx.beginPath();
            ctx.moveTo(sx - lw * 0.6, ly);
            ctx.lineTo(sx + lw * 0.6, ly);
            ctx.stroke();
        }

        ctx.restore();
    }
}

// drawTowerGlow: renders ALL glowing/magical effects AFTER darkness for full vibrancy
function drawTowerGlow(t) {
    const pos = tileToScreen(t.row, t.col);
    const sx = pos.x + cameraX;
    const sy = pos.y + cameraY;
    const timeFrac = t.duration / t.maxDuration;
    const dying = timeFrac < 0.25;

    const popScale = t.spawnAnim > 0 ? Math.max(0, 1 - (t.spawnAnim / 0.8)) : 1;
    const pop3 = popScale * popScale * (3 - 2 * popScale);

    // --- Spawn portal animation ---
    if (t.spawnAnim > 0) {
        const sf = t.spawnAnim / 0.8;
        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        for (let ring = 0; ring < 2; ring++) {
            const ringR = (1 - sf) * (35 + ring * 18) + 5;
            const ringA = sf * (0.7 - ring * 0.25);
            ctx.strokeStyle = `rgba(140, 80, 255, ${ringA})`;
            ctx.lineWidth = (2.5 - ring) * sf;
            ctx.beginPath();
            ctx.ellipse(sx, sy + 4, ringR, ringR * 0.45, 0, 0, Math.PI * 2);
            ctx.stroke();
        }

        const colH = (1 - sf) * 90;
        const colGrad = ctx.createLinearGradient(sx, sy - colH, sx, sy);
        colGrad.addColorStop(0, 'rgba(180, 120, 255, 0)');
        colGrad.addColorStop(0.3, `rgba(160, 90, 255, ${sf * 0.4})`);
        colGrad.addColorStop(0.7, `rgba(120, 50, 220, ${sf * 0.6})`);
        colGrad.addColorStop(1, `rgba(80, 30, 180, ${sf * 0.3})`);
        ctx.fillStyle = colGrad;
        ctx.fillRect(sx - 12, sy - colH, 24, colH);

        for (let s = 0; s < 8; s++) {
            const sparkY = sy - (1 - sf) * colH * ((s + t.animTime * 3) % 1);
            const sparkX = sx + Math.sin(s * 2.3 + t.animTime * 6) * 10;
            ctx.globalAlpha = sf * 0.8;
            ctx.fillStyle = s % 2 === 0 ? '#cc88ff' : '#8844dd';
            ctx.beginPath();
            ctx.arc(sparkX, sparkY, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    }

    // --- Arcane ground glow ---
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const pulseR = 28 + Math.sin(t.animTime * 3) * 4;
    const gndGrad = ctx.createRadialGradient(sx, sy + 4, 2, sx, sy + 4, pulseR);
    gndGrad.addColorStop(0, `rgba(120, 50, 230, ${0.30 * pop3 * timeFrac})`);
    gndGrad.addColorStop(0.5, `rgba(80, 30, 180, ${0.12 * pop3 * timeFrac})`);
    gndGrad.addColorStop(1, 'rgba(30, 10, 80, 0)');
    ctx.fillStyle = gndGrad;
    ctx.beginPath();
    ctx.ellipse(sx, sy + 4, pulseR, pulseR * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    // Rotating rune dots (toned down to not compete with wizard)
    ctx.globalAlpha = 0.45 * pop3 * timeFrac;
    const runeR = 22;
    for (let r = 0; r < 8; r++) {
        const ang = (r / 8) * Math.PI * 2 + t.animTime * 0.6;
        const rx = sx + Math.cos(ang) * runeR;
        const ry = sy + 4 + Math.sin(ang) * runeR * 0.45;
        const bright = 0.5 + Math.sin(t.animTime * 4 + r) * 0.5;
        ctx.fillStyle = `rgba(190, 140, 255, ${bright})`;
        ctx.beginPath();
        ctx.arc(rx, ry, 2, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    // --- Swirling energy vortex around obelisk ---
    if (pop3 > 0) {
        const oH = 42 * pop3;
        const baseY = sy + 2;

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (let p = 0; p < 12; p++) {
            const pAng = (p / 12) * Math.PI * 2 + t.animTime * 1.8;
            const pDist = 10 + Math.sin(t.animTime * 3 + p * 1.5) * 5;
            const pY = baseY - (oH * 0.2) - ((p + t.animTime * 2) % 12) / 12 * oH * 0.9;
            const px = sx + Math.cos(pAng) * pDist;
            const pAlpha = (1 - Math.abs(pY - (baseY - oH * 0.5)) / (oH * 0.5)) * 0.8 * pop3 * timeFrac;
            if (pAlpha <= 0) continue;
            ctx.globalAlpha = pAlpha;
            ctx.fillStyle = p % 3 === 0 ? '#cc99ff' : (p % 3 === 1 ? '#9966ee' : '#7744cc');
            ctx.beginPath();
            ctx.arc(px, pY, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    // --- Floating arcane crystal above obelisk ---
    if (pop3 >= 0.95) {
        const crystalBaseY = sy - 48;
        const bob = Math.sin(t.animTime * 2.2) * 5;
        const crystalY = crystalBaseY + bob;
        const crystalPulse = 0.6 + Math.sin(t.animTime * 4.5) * 0.4;

        // Large outer glow — boosted for vivid visibility
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const outerGlow = ctx.createRadialGradient(sx, crystalY, 0, sx, crystalY, 36);
        outerGlow.addColorStop(0, `rgba(200, 140, 255, ${0.45 * crystalPulse * timeFrac})`);
        outerGlow.addColorStop(0.3, `rgba(140, 80, 240, ${0.22 * timeFrac})`);
        outerGlow.addColorStop(0.7, `rgba(80, 40, 180, ${0.08 * timeFrac})`);
        outerGlow.addColorStop(1, 'rgba(40, 15, 100, 0)');
        ctx.fillStyle = outerGlow;
        ctx.fillRect(sx - 36, crystalY - 36, 72, 72);

        // Crystal shape — bright diamond
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 0.95 * timeFrac;

        // Outer crystal body
        ctx.fillStyle = `rgba(150, 80, 240, ${0.8 + crystalPulse * 0.2})`;
        ctx.beginPath();
        ctx.moveTo(sx, crystalY - 13);
        ctx.lineTo(sx + 8, crystalY);
        ctx.lineTo(sx, crystalY + 13);
        ctx.lineTo(sx - 8, crystalY);
        ctx.closePath();
        ctx.fill();

        // Inner bright facet
        ctx.fillStyle = `rgba(220, 180, 255, ${crystalPulse})`;
        ctx.beginPath();
        ctx.moveTo(sx, crystalY - 8);
        ctx.lineTo(sx + 5, crystalY);
        ctx.lineTo(sx, crystalY + 8);
        ctx.lineTo(sx - 5, crystalY);
        ctx.closePath();
        ctx.fill();

        // White-hot core
        ctx.fillStyle = `rgba(255, 240, 255, ${0.9 * crystalPulse})`;
        ctx.beginPath();
        ctx.arc(sx, crystalY, 3, 0, Math.PI * 2);
        ctx.fill();

        // Light beam connecting crystal to obelisk top
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.35 * timeFrac;
        ctx.strokeStyle = '#bb88ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx, crystalY + 13);
        ctx.lineTo(sx, sy - 40 * pop3);
        ctx.stroke();

        ctx.restore();

        // --- Targeting beam to current enemy ---
        if (t.targetEnemy && t.targetEnemy.state !== 'death') {
            const ePos = tileToScreen(t.targetEnemy.row, t.targetEnemy.col);
            const ex = ePos.x + cameraX;
            const ey = ePos.y + cameraY;

            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            ctx.globalAlpha = 0.18 + Math.sin(t.animTime * 6) * 0.08;
            ctx.strokeStyle = '#bb88ff';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 5]);
            ctx.beginPath();
            ctx.moveTo(sx, crystalY);
            ctx.lineTo(ex, ey);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }
    }

    // --- Duration warning ---
    if (dying) {
        const warn = Math.sin(t.animTime * 14) > 0 ? 0.5 : 0.15;
        ctx.save();
        ctx.globalAlpha = warn;
        ctx.strokeStyle = '#ff5533';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(sx, sy + 4, 18, 8, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }
}

// Draws all tower glow effects (called after darkness layer)
function drawAllTowerGlows() {
    for (const t of summons) {
        drawTowerGlow(t);
    }
}

// ----- DRAW PLACEMENT PREVIEW -----
function drawPlacementPreview() {
    // --- Draw channeling ritual circle ---
    if (placement.channeling) {
        const progress = Math.min(1, placement.channelTimer / placement.channelDuration);
        const pos = tileToScreen(placement.channelRow, placement.channelCol);
        const sx = pos.x + cameraX;
        const sy = pos.y + cameraY;

        ctx.save();
        // Expanding magic circle on ground
        const maxRadius = 35;
        const radius = maxRadius * progress;

        // Outer circle
        ctx.globalAlpha = 0.6 * (1 - progress * 0.3);
        ctx.strokeStyle = '#bb77ff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#9944ff';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, Math.PI * 2);
        ctx.stroke();

        // Inner rune ring (rotating)
        const runeRadius = radius * 0.65;
        const runeCount = 6;
        const runeAngle = placement.channelTimer * 4;
        ctx.globalAlpha = 0.8 * progress;
        ctx.fillStyle = '#cc88ff';
        ctx.font = '10px Georgia';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const runes = ['✦', '◆', '✧', '◇', '⬥', '✶'];
        for (let i = 0; i < runeCount; i++) {
            const a = runeAngle + (i / runeCount) * Math.PI * 2;
            const rx = sx + Math.cos(a) * runeRadius;
            const ry = sy + Math.sin(a) * runeRadius * 0.5; // squash for isometric
            ctx.fillText(runes[i], rx, ry);
        }

        // Central glow buildup
        const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, radius * 0.5);
        glow.addColorStop(0, `rgba(153, 68, 255, ${0.4 * progress})`);
        glow.addColorStop(1, 'rgba(153, 68, 255, 0)');
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(sx, sy, radius * 0.5, 0, Math.PI * 2);
        ctx.fill();

        // Progress ring
        ctx.globalAlpha = 0.9;
        ctx.strokeStyle = '#ddaaff';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(sx, sy - 45, 12, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
        ctx.stroke();

        ctx.restore();
        return; // don't draw placement indicator while channeling
    }

    if (!placement.active) return;

    const pos = tileToScreen(placement.row, placement.col);
    const sx = pos.x + cameraX;
    const sy = pos.y + cameraY;
    const t = performance.now() / 1000; // time for animations

    ctx.save();

    // --- Range circle around player ---
    const pPos = tileToScreen(player.row, player.col);
    const pcx = pPos.x + cameraX;
    const pcy = pPos.y + cameraY;
    // Range in screen units (approximate — 6 tiles)
    const rangePixX = 6 * HALF_DW * 1.2;
    const rangePixY = 6 * HALF_DH * 1.2;
    ctx.globalAlpha = 0.22;
    ctx.strokeStyle = placement.valid ? '#9966ff' : '#663333';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.ellipse(pcx, pcy, rangePixX, rangePixY, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // --- Tower range circle at cursor ---
    const tRangeX = TOWER_RANGE * HALF_DW * 1.1;
    const tRangeY = TOWER_RANGE * HALF_DH * 1.1;
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = placement.valid ? '#7744cc' : '#442222';
    ctx.beginPath();
    ctx.ellipse(sx, sy, tRangeX, tRangeY, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = placement.valid ? '#9966ff' : '#884444';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.ellipse(sx, sy, tRangeX, tRangeY, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // --- Ghost tower preview ---
    if (placement.valid) {
        // Arcane ground glow
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.2 + Math.sin(t * 4) * 0.08;
        const gGrad = ctx.createRadialGradient(sx, sy + 4, 0, sx, sy + 4, 26);
        gGrad.addColorStop(0, 'rgba(120, 70, 220, 0.4)');
        gGrad.addColorStop(1, 'rgba(60, 30, 120, 0)');
        ctx.fillStyle = gGrad;
        ctx.beginPath();
        ctx.ellipse(sx, sy + 4, 26, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // Ghost obelisk silhouette
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 0.35 + Math.sin(t * 3) * 0.1;
        const oH = 42, oW = 14, oTop = 8;
        const baseY = sy + 2;
        const topY = baseY - oH;

        ctx.fillStyle = 'rgba(100, 60, 180, 0.5)';
        ctx.beginPath();
        ctx.moveTo(sx - oTop, topY);
        ctx.lineTo(sx + oTop, topY);
        ctx.lineTo(sx + oW, baseY);
        ctx.lineTo(sx - oW, baseY);
        ctx.closePath();
        ctx.fill();

        // Ghost crystal
        const crystalY = sy - 48 + Math.sin(t * 2.5) * 3;
        ctx.fillStyle = `rgba(180, 130, 255, ${0.4 + Math.sin(t * 5) * 0.15})`;
        ctx.beginPath();
        ctx.moveTo(sx, crystalY - 9);
        ctx.lineTo(sx + 6, crystalY);
        ctx.lineTo(sx, crystalY + 9);
        ctx.lineTo(sx - 6, crystalY);
        ctx.closePath();
        ctx.fill();

        // "Click to place" text
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = '#ccbbee';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('CLICK TO SUMMON', sx, sy + 24);
        ctx.fillText(`${SUMMON_MANA_COST} MP · ${SUMMON_MANA_COST}s`, sx, sy + 34);
    } else {
        // Invalid placement indicator
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = '#882222';
        ctx.lineWidth = 2;
        const crossR = 10;
        ctx.beginPath();
        ctx.moveTo(sx - crossR, sy - crossR * 0.5);
        ctx.lineTo(sx + crossR, sy + crossR * 0.5);
        ctx.moveTo(sx + crossR, sy - crossR * 0.5);
        ctx.lineTo(sx - crossR, sy + crossR * 0.5);
        ctx.stroke();
    }

    ctx.restore();
}

// ----- DRAW TOWER BOLTS -----
function drawTowerBolts() {
    for (const b of towerBolts) {
        const pos = tileToScreen(b.row, b.col);
        const px = pos.x + cameraX;
        const py = pos.y + cameraY;

        if (!b.hit) {
            // Ground shadow for tower bolt
            ctx.save();
            ctx.globalAlpha = 0.12;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(px, py + 6, 6, 2.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        if (b.hit) {
            // Small arcane impact
            const frac = Math.max(0, b.life / 0.2);
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            const r = (1 - frac) * 20 + 4;
            const g = ctx.createRadialGradient(px, py, 0, px, py, r);
            g.addColorStop(0, `rgba(200, 160, 255, ${0.7 * frac})`);
            g.addColorStop(0.5, `rgba(120, 60, 220, ${0.3 * frac})`);
            g.addColorStop(1, 'rgba(60, 20, 140, 0)');
            ctx.fillStyle = g;
            ctx.fillRect(px - r, py - r, r * 2, r * 2);
            ctx.restore();
            continue;
        }

        // Arcane bolt glow
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const bloom = ctx.createRadialGradient(px, py, 0, px, py, 14);
        bloom.addColorStop(0, 'rgba(180, 130, 255, 0.7)');
        bloom.addColorStop(0.4, 'rgba(120, 70, 220, 0.3)');
        bloom.addColorStop(1, 'rgba(60, 20, 140, 0)');
        ctx.fillStyle = bloom;
        ctx.fillRect(px - 14, py - 14, 28, 28);

        // Core
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#e0ccff';
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);
        ctx.fill();

        // Arcane trail
        if (b.trail) {
            for (let ti = 0; ti < b.trail.length; ti++) {
                const t = b.trail[ti];
                const tp = tileToScreen(t.row, t.col);
                const tx = tp.x + cameraX;
                const ty = tp.y + cameraY;
                const frac = ti / b.trail.length;
                const ageFade = Math.max(0, 1 - t.age * 4);
                ctx.globalCompositeOperation = 'screen';
                ctx.globalAlpha = frac * 0.4 * ageFade;
                ctx.fillStyle = `rgba(160, 120, 255, ${frac * 0.5})`;
                ctx.beginPath();
                ctx.arc(tx, ty, 3 * frac, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.restore();
    }
}

function drawRoomAmbientTint() {

function drawFogOfWar() {
    const lightRange = lightRadius;
    const wizPos = tileToScreen(player.row, player.col);
    const lightX = wizPos.x + cameraX;
    const lightY = wizPos.y + cameraY;

    // Radial gradient for light falloff
    const grad = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, lightRange);
    grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
    grad.addColorStop(0.7, 'rgba(0, 0, 0, 0.3)');
    grad.addColorStop(1, 'rgba(0, 0, 0, 0.8)');

    ctx.globalAlpha = 0.6;
    ctx.fillStyle = grad;
    ctx.fillRect(lightX - lightRange, lightY - lightRange, lightRange * 2, lightRange * 2);
}

function drawParticles() {
    ctx.save();
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        // Skip ambient particles (they have no 'type' field — handled by old updateParticles)
        if (!p.type) continue;

        p.life -= 1 / 60;  // assume 60 fps
        if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
        }

        // Physics: velocity and gravity
        if (p.type === 'death' || p.type === 'hitspark') {
            p.vy += 2.5 * (1 / 60);
            p.x += p.vx * (1 / 60);
            p.y += p.vy * (1 / 60);
        } else if (p.type === 'cast') {
            p.vy += 1.5 * (1 / 60);
            p.x += p.vx * (1 / 60);
            p.y += p.vy * (1 / 60);
        }

        // Fade out at end of life
        const ageFrac = Math.max(0, p.life / (p.maxLife || 1));
        ctx.globalAlpha = (p.alpha || 0.5) * ageFrac;
        ctx.fillStyle = p.color || '#ffaa44';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size || 1, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}
