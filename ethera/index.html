<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Ethera - The Awakening</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            transition: opacity 1.5s ease;
        }
        #overlay.fade-out { opacity: 0; pointer-events: none; }
        .intro-line {
            color: #b8a88a; font-size: 22px; opacity: 0;
            margin: 8px 0; letter-spacing: 2px;
            transition: opacity 1.5s ease;
        }
        .intro-line.visible { opacity: 1; }
        #loading-text {
            color: #665544; font-size: 14px; position: fixed;
            bottom: 40px; left: 50%; transform: translateX(-50%);
            letter-spacing: 3px;
        }
        /* cursor managed by JS: default on menu, none in gameplay */
    </style>
</head>
<body>
    <div id="overlay">
        <div class="intro-line" id="line1">You awaken on cold stone.</div>
        <div class="intro-line" id="line2">Darkness presses in from every side.</div>
        <div class="intro-line" id="line3">They left you for dead.</div>
        <div class="intro-line" id="line4" style="margin-top: 24px; color: #d4c4a0; font-style: italic;">They were wrong.</div>
        <div id="loading-text">LOADING...</div>
    </div>
    <canvas id="game"></canvas>
    <input id="nameInput" type="text" maxlength="16" autocomplete="off" spellcheck="false"
           style="position:fixed;top:-100px;left:-100px;opacity:0;pointer-events:none;font-size:16px;">

    <!--
        Script loading: modules are loaded in dependency order.
        Cache-busting: each src gets ?v= appended at load time by the inline
        script below, so browser caches are invalidated on version bumps.
    -->
    <script>
        // Dynamically load all game modules with cache-busting version param.
        // This avoids stale caches after Electron auto-updates.
        (function() {
            var v = '0.4.5'; // must match ETHERA_VERSION in config.js
            var modules = [
                // Core: config, constants, globals
                'src/config.js',
                'src/spacebg.js',
                // Audio
                'src/music.js',
                'src/sfx.js',
                // Form/evolution system (depends on config)
                'src/forms.js',
                // Asset loader (depends on config paths + images global)
                'src/loader.js',
                // Map and world
                'src/maps.js',
                // Procedural dungeon generation
                'src/dungeongen.js',
                // Player state
                'src/player.js',
                // Inventory and items
                'src/inventory.js',
                // Chests, doors, zone loading
                'src/interactables.js',
                // NPCs (townsfolk dialogue system)
                'src/npcs.js',
                // Grimoire (character menu UI)
                'src/grimoire.js',
                // Balance tuning, placement, input, projectile pools
                'src/balance.js',
                // Particles
                'src/particles.js',
                // Coordinate helpers
                'src/collision.js',
                // Rendering
                'src/rendering.js',
                // Player forms
                'src/slime.js',
                'src/lich.js',
                'src/wizard.js',
                'src/evolution.js',
                'src/skeleton.js',
                // Player movement and physics
                'src/movement.js',
                // Ghosts (dodge afterimages)
                'src/ghosts.js',
                // Projectiles
                'src/projectiles.js',
                // Orbit fireballs
                'src/orbit.js',
                // Enemies and waves
                'src/enemies.js',
                // Summoning towers
                'src/towers.js',
                // Level-up screen
                'src/levelup.js',
                // HUD: HP bars, crosshair, pickup text
                'src/ui.js',
                // Unified notification system
                'src/notifications.js',
                // Camera
                'src/camera.js',
                // Save / Load system
                'src/saveload.js',
                // Game loop, menu, init (must be last)
                'src/gameloop.js',
            ];
            for (var i = 0; i < modules.length; i++) {
                document.write('<script src="' + modules[i] + '?v=' + v + '"><\/script>');
            }
        })();
    </script>
</body>
</html>
